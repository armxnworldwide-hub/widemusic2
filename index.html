        function loadArtists() {
            container.innerHTML = "";
            document.getElementById("backBtn").style.display = "none";

            for (let key in artists) {
                container.innerHTML += `
<div class="artist-card" onclick="openArtist('${key}')">
    <img src="${artists[key].image}">
    <div class="hover-play" onclick="event.stopPropagation(); playArtist('${key}')">▶</div>
    <h3>${artists[key].name}</h3>
</div>`;
            }
        }

        function openArtist(key) {
            container.innerHTML = "";
            document.getElementById("backBtn").style.display = "inline-block";
            currentSongs = artists[key].songs;
            document.getElementById("loader").style.display = "flex";
            currentSongs.forEach((song, index) => {
                container.innerHTML += `
<div class="song-card" onclick="playSong(${index})">
    <img src="${song.poster}">
    <div class="hover-play">▶</div>
    <h3>${song.title}</h3>
</div>`;
            });
            setTimeout(() => {
                document.getElementById("loader").style.display = "none";
            }, 400);
        }

        function playArtist(key) {
            currentSongs = artists[key].songs;
            currentIndex = 0;
            playSong(0);
        }


        function playSong(index) {
            if (!currentSongs[index]) return;

            currentIndex = index;
            audio.src = "songs/" + currentSongs[index].file;
            poster.src = currentSongs[index].poster;
            title.innerText = currentSongs[index].title;
            audio.play();
            playBtn.innerText = "⏸";
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        }

        function next() {
            if (currentSongs.length == 0) return;

            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * currentSongs.length);
            } else {
                currentIndex = (currentIndex + 1) % currentSongs.length;
            }

            playSong(currentIndex);
        }

        function previous() {
            if (currentSongs.length == 0) return;
            currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
            playSong(currentIndex);
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;

            if (isShuffle) {
                shuffleBtn.classList.add("active");
                shuffleBtn.innerText = "🔁";
            } else {
                shuffleBtn.classList.remove("active");
                shuffleBtn.innerText = "🔀";
            }
        }


        function toggleRepeat() {
            isRepeat = !isRepeat;
            audio.loop = isRepeat;

            if (isRepeat) {
                repeatBtn.classList.add("active");
                repeatBtn.innerText = "🔂";
            } else {
                repeatBtn.classList.remove("active");
                repeatBtn.innerText = "🔁";
            }
        }

        audio.addEventListener("timeupdate", () => {

            if (!audio.duration) return;
            var percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + "%";
            var currentMinutes = Math.floor(audio.currentTime / 60);
            var currentSeconds = Math.floor(audio.currentTime % 60);
            if (currentSeconds < 10) currentSeconds = "0" + currentSeconds;
            document.getElementById("currentTime").innerText =
                currentMinutes + ":" + currentSeconds;
            var totalMinutes = Math.floor(audio.duration / 60);
            var totalSeconds = Math.floor(audio.duration % 60);
            if (totalSeconds < 10) totalSeconds = "0" + totalSeconds;

            document.getElementById("duration").innerText =
                totalMinutes + ":" + totalSeconds;
        });
        volumeSlider.addEventListener("input", () => {
            audio.volume = volumeSlider.value;
        });
        audio.addEventListener("ended", () => {
            if (isRepeat) {
                audio.play();
            } else {
                next();
            }
        });

        function seek(e) {
            if (!audio.duration) return;
            var width = e.currentTarget.clientWidth;
            var clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        }


        function globalSearch() {
            var input = document.getElementById("searchBar").value.toLowerCase();
            container.innerHTML = "";
            var found = 0;

            for (let key in artists) {
                if (artists[key].name.toLowerCase().includes(input)) {
                    container.innerHTML += `
<div class="artist-card" onclick="openArtist('${key}')">
    <img src="${artists[key].image}">
    <h3>${artists[key].name}</h3>
</div>`;
                    found++;
                }

                artists[key].songs.forEach((song, index) => {
                    if (song.title.toLowerCase().includes(input)) {
                        container.innerHTML += `
<div class="song-card" onclick="playSong(${index})">
<img src="${song.poster}">

<div class="hover-play" onclick="event.stopPropagation(); playSong(${index})">
▶
</div>

<h3>${song.title}</h3>
</div>`;
                        found++;
                    }
                });
            }

            document.getElementById("noResult").style.display =
                found == 0 ? "block" : "none";
        }

        loadArtists();
    </script>
