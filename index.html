<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FalconX</title>
    <link rel="icon" type="image/jpeg" href="images/falcon.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }
        
         :root {
            --bg: #0a0a0a;
            --bg2: #121212;
            --surface: #181818;
            --surface2: #1f1f1f;
            --surface3: #282828;
            --surface4: #333333;
            --accent: #c8f542;
            --accent2: #a8d930;
            --accent3: rgba(200, 245, 66, .08);
            --accent-glow: rgba(200, 245, 66, .2);
            --text: #ffffff;
            --text2: #b3b3b3;
            --muted: #535353;
            --muted2: #727272;
            --border: rgba(255, 255, 255, .06);
            --border2: rgba(255, 255, 255, .1);
            --player-h: 88px;
            --sidebar-w: 280px;
            --radius: 12px;
            --radius-sm: 8px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg)
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-rows: 1fr var(--player-h);
            height: 100dvh;
            font-weight: 400;
        }
        
        .sidebar {
            grid-row: 1;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
            gap: 8px;
            padding: 8px;
        }
        
        .sidebar-logo-block {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px 18px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--text);
        }
        
        .logo-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .logo-icon img {
            width: 34px;
            height: 34px;
            object-fit: cover;
            border-radius: 8px
        }
        
        .sync-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Space Mono', monospace;
            font-size: .5rem;
            color: var(--muted2);
            padding: 3px 8px;
            background: var(--surface2);
            border-radius: 20px;
        }
        
        .sync-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted)
        }
        
        .sync-dot.synced {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(200, 245, 66, .6)
        }
        
        .sync-dot.syncing {
            background: #f5c842;
            animation: blink .7s infinite
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: .3
            }
        }
        
        .sidebar-nav-block {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 8px;
            flex-shrink: 0;
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            background: none;
            border: none;
            color: var(--text2);
            font-family: 'Inter', sans-serif;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            text-align: left;
        }
        
        .nav-btn:hover {
            background: var(--surface2);
            color: var(--text)
        }
        
        .nav-btn.active {
            color: var(--text)
        }
        
        .nav-btn.active .nav-icon-wrap {
            color: var(--accent)
        }
        
        .nav-icon-wrap {
            width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: color .15s;
        }
        
        .sidebar-library-block {
            background: var(--surface);
            border-radius: var(--radius);
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .library-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px 8px;
            flex-shrink: 0;
        }
        
        .library-title {
            font-size: .78rem;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: .5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .library-title span {
            font-size: .9rem
        }
        
        .artists-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .artists-list::-webkit-scrollbar {
            width: 3px
        }
        
        .artists-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 3px
        }
        
        .artist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background .12s;
        }
        
        .artist-item:hover {
            background: var(--surface2)
        }
        
        .artist-item.active {
            background: var(--surface3)
        }
        
        .artist-item img {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .artist-item-name {
            font-size: .8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text2);
        }
        
        .artist-item.active .artist-item-name {
            color: var(--text)
        }
        
        .sidebar-account-block {
            background: var(--surface);
            border-radius: var(--radius);
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 14px 16px;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
            text-align: left;
        }
        
        .google-btn:hover {
            background: var(--surface2)
        }
        
        .google-btn-icon {
            width: 36px;
            height: 36px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .google-btn-icon svg {
            width: 18px;
            height: 18px
        }
        
        .google-btn-text {
            display: flex;
            flex-direction: column;
            gap: 1px
        }
        
        .google-btn-label {
            font-size: .75rem;
            color: var(--text2);
            font-weight: 400
        }
        
        .user-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            flex-shrink: 0;
        }
        
        .user-bar-info {
            flex: 1;
            overflow: hidden
        }
        
        .user-bar-name {
            font-size: .82rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .user-bar-email {
            font-size: .65rem;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .signout-btn {
            background: none;
            border: 1px solid var(--border2);
            color: var(--text2);
            font-family: 'Inter', sans-serif;
            font-size: .7rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .signout-btn:hover {
            color: #ff5555;
            border-color: #ff5555
        }
        
        .main {
            grid-column: 2;
            grid-row: 1;
            overflow-y: auto;
            background: var(--bg2);
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .main::-webkit-scrollbar {
            width: 4px
        }
        
        .main::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 4px
        }
        
        .main-topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(18, 18, 18, .85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .nav-arrows {
            display: flex;
            gap: 6px
        }
        
        .nav-arrow-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, .6);
            border: none;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
            flex-shrink: 0;
        }
        
        .nav-arrow-btn:hover {
            background: rgba(255, 255, 255, .1)
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            flex: 1;
            max-width: 380px;
        }
        
        .search-icon {
            position: absolute;
            left: 13px;
            color: var(--muted2);
            font-size: .9rem;
            pointer-events: none;
            z-index: 1;
        }
        
        .search-box input {
            width: 100%;
            background: var(--surface3);
            border: 2px solid transparent;
            border-radius: 500px;
            padding: 10px 16px 10px 40px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .88rem;
            outline: none;
            transition: all .2s;
        }
        
        .search-box input:focus {
            border-color: var(--text);
            background: var(--surface3);
        }
        
        .search-box input::placeholder {
            color: var(--muted2)
        }
        
        .search-clear {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text2);
            font-size: .8rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            transition: color .15s;
        }
        
        .search-clear.visible {
            display: flex
        }
        
        .search-clear:hover {
            color: var(--text)
        }
        
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto
        }
        
        .topbar-icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0, 0, 0, .4);
            border: none;
            color: var(--text2);
            font-size: .9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }
        
        .topbar-icon-btn:hover {
            background: rgba(255, 255, 255, .1);
            color: var(--text)
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 24px 16px;
        }
        
        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -.3px;
        }
        
        .section-link {
            font-size: .75rem;
            font-weight: 700;
            color: var(--text2);
            background: none;
            border: none;
            cursor: pointer;
            transition: color .15s;
            letter-spacing: .5px;
            text-transform: uppercase;
        }
        
        .section-link:hover {
            color: var(--text);
            text-decoration: underline
        }
        
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            padding: 0 24px 24px;
        }
        
        .artist-card {
            cursor: pointer;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
            transition: background .2s;
            position: relative;
            padding: 16px;
        }
        
        .artist-card:hover {
            background: var(--surface3)
        }
        
        .artist-card-img-wrap {
            position: relative;
            margin-bottom: 12px;
        }
        
        .artist-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
        }
        
        .artist-card-name {
            font-size: .9rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .artist-card-count {
            font-size: .78rem;
            color: var(--text2);
        }
        
        .card-play-btn {
            position: absolute;
            bottom: -4px;
            right: 0;
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            color: #000;
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: translateY(8px);
            transition: all .25s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
        }
        
        .artist-card:hover .card-play-btn {
            opacity: 1;
            transform: translateY(0);
        }
        
        .artist-hero {
            position: relative;
            height: 280px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 32px 28px;
        }
        
        .artist-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 20%;
            filter: blur(0px) brightness(.35);
            transform: scale(1.03);
        }
        
        .artist-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg2) 0%, rgba(18, 18, 18, .6) 50%, transparent 100%);
        }
        
        .artist-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            gap: 24px;
            width: 100%;
        }
        
        .artist-hero-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 60px rgba(0, 0, 0, .8);
            flex-shrink: 0;
        }
        
        .artist-hero-tag {
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 8px;
            opacity: .8;
        }
        
        .artist-hero-name {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 12px;
        }
        
        .artist-hero-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 16px
        }
        
        .songs-section {
            padding: 0 24px 80px
        }
        
        .songs-table-header {
            display: grid;
            grid-template-columns: 40px 1fr auto;
            padding: 0 16px 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }
        
        .th {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text2);
        }
        
        .song-row {
            display: grid;
            grid-template-columns: 40px 1fr auto;
            align-items: center;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background .12s;
            gap: 8px;
        }
        
        .song-row:hover {
            background: rgba(255, 255, 255, .06)
        }
        
        .song-row.playing {
            background: rgba(200, 245, 66, .05)
        }
        
        .song-num {
            font-size: .85rem;
            color: var(--text2);
            text-align: center;
            font-family: 'Space Mono', monospace;
        }
        
        .song-row.playing .song-num {
            color: var(--accent)
        }
        
        .song-row-info {
            display: flex;
            align-items: center;
            gap: 14px
        }
        
        .song-row-info img {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .song-row-text h4 {
            font-size: .9rem;
            font-weight: 600
        }
        
        .song-row.playing .song-row-text h4 {
            color: var(--accent)
        }
        
        .song-row-text p {
            font-size: .78rem;
            color: var(--text2);
            margin-top: 2px
        }
        
        .song-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transition: opacity .15s;
        }
        
        .song-row:hover .song-actions {
            opacity: 1
        }
        
        .like-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: transform .2s;
            line-height: 1;
            color: var(--text2);
        }
        
        .like-btn:hover {
            transform: scale(1.2);
            color: var(--text)
        }
        
        .like-btn.liked {
            color: var(--accent)
        }
        
        .dl-btn {
            background: none;
            border: none;
            color: var(--text2);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .8rem;
            transition: all .2s;
        }
        
        .dl-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .1)
        }
        
        .dl-btn.downloaded {
            color: var(--accent)
        }
        
        .queue-btn {
            background: none;
            border: none;
            color: var(--text2);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .8rem;
            transition: all .2s;
        }
        
        .queue-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .1)
        }
        
        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
            width: 16px;
            margin: 0 auto
        }
        
        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            animation: eq .6s ease-in-out infinite alternate
        }
        
        .eq-bar:nth-child(1) {
            animation-delay: 0s
        }
        
        .eq-bar:nth-child(2) {
            animation-delay: .15s
        }
        
        .eq-bar:nth-child(3) {
            animation-delay: .3s
        }
        
        @keyframes eq {
            from {
                height: 3px
            }
            to {
                height: 13px
            }
        }
        
        .player {
            grid-column: 1/-1;
            grid-row: 2;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr 280px;
            align-items: center;
            padding: 0 16px;
            position: relative;
            z-index: 20;
        }
        
        .player-song {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px;
            overflow: hidden;
        }
        
        .player-poster {
            width: 56px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform .2s;
        }
        
        .player-poster:hover {
            transform: scale(1.05)
        }
        
        .player-song-title {
            font-size: .85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }
        
        .player-song-artist {
            font-size: .75rem;
            color: var(--text2);
            margin-top: 3px;
        }
        
        .player-song-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 3px
        }
        
        .offline-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: .55rem;
            color: var(--accent);
            background: var(--accent3);
            border: 1px solid rgba(200, 245, 66, .18);
            padding: 2px 7px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity .3s;
        }
        
        .offline-badge.visible {
            opacity: 1
        }
        
        .player-like {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 5px;
            flex-shrink: 0;
            transition: transform .2s;
            color: var(--text2);
        }
        
        .player-like:hover {
            transform: scale(1.15);
            color: var(--text)
        }
        
        .player-like.liked {

            top: 0;

            height: 100%;
            width: 150px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .06), transparent);
            animation: shimmer 1.4s infinite
        }

            0% {

            100% {

            100% {

            inset: 0;
            background: var(--bg);

            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: splashOut .5s cubic-bezier(.4, 0, .2, 1) 2.2s forwards;
        }

            text-align: center;
            animation: splashIn 1s cubic-bezier(.16, 1, .3, 1) both
        }

            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
            animation: splashPulse 1.8s ease infinite;
        }
        
        .splash-logo-wrap img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover
        }
        
        .splash-name {
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase
        }
        
        .splash-name span {
            color: var(--accent)
        }
        
        .splash-tagline {
            font-family: 'Space Mono', monospace;
            font-size: .55rem;
            color: var(--text2);
            letter-spacing: 4px;
            margin-top: 8px
        }
        
        .splash-bar {
            width: 100px;
            height: 2px;
            background: var(--surface3);
            border-radius: 2px;
            margin: 18px auto 0;
            overflow: hidden
        }
        
        .splash-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            animation: splashLoad 1.8s ease forwards
        }
        
        @keyframes splashLoad {
            from {
                width: 0
            }
            to {
                width: 100%
            }
        }
        
        @keyframes splashIn {
            from {
                opacity: 0;
                transform: scale(.9) translateY(18px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }
        
        @keyframes splashOut {
            to {
                opacity: 0;
                visibility: hidden
            }
        }
        
        @keyframes splashPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(200, 245, 66, .45)

            50% {

        function queueStats() {
            const q = dlQueue.filter(i => i.status === 'queued').length,
                a = dlQueue.filter(i => i.status === 'active').length,
                d = dlQueue.filter(i => i.status === 'done').length;
            return {
                total: dlQueue.length,
                q,
                a,
                d
            };
        }

        function updateDpStats() {
            const s = queueStats();
            document.getElementById('dpTotal').textContent = s.total;
            document.getElementById('dpActive').textContent = s.a;
            document.getElementById('dpDone').textContent = s.d;
            const badge = document.getElementById('dlQueueBadge');

                badge.textContent = s.a > 0 ? '⏳' : s.q;
                badge.classList.remove('hidden');

        function renderDpItem(item) {
            const container = document.getElementById('dpItems');
            const empty = container.querySelector('.dp-empty');
            if (empty) empty.remove();
            let el = document.getElementById('dpi_' + item.id);
            if (!el) {

                container.appendChild(el);
            }
            el.className = 'dp-item ' + (item.status === 'active' ? 'active' : item.status === 'done' ? 'done' : item.status === 'error' ? 'error' : '');
            el.querySelector('.dp-status-text').textContent = item.status === 'active' ? 'Downloading…' : item.status === 'done' ? 'Saved offline' : item.status === 'error' ? 'Failed' : item.status;
            el.querySelector('.dp-progress-bar').style.width = item.progress + '%';
        }

        function addToDlQueue(song) {
            if (isDownloaded(song.file)) {
                showToast('Already downloaded ✓');
                return;
            }
            if (dlQueue.some(i => i.song.file === song.file)) {
                showToast('Already in queue');
                return;
            }
            const id = 'dl_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5);
            const item = {
                id,
                song,
                status: 'queued',
                progress: 0
            };
            dlQueue.push(item);
            renderDpItem(item);
            updateDpStats();
            dpanel().classList.add('open');
            if (!dlBusy && !dlPaused) processQueue();
            return id;
        }

        async function processQueue() {
            if (dlBusy || dlPaused) return;
            const next = dlQueue.find(i => i.status === 'queued');
            if (!next) return;
            dlBusy = true;
            next.status = 'active';
            next.progress = 10;
            renderDpItem(next);
            updateDpStats();
            try {
                const url = 'songs/' + next.song.file;
                let cache;
                try {
                    cache = await caches.open(CACHE_NAME);
                } catch (e) {
                    throw new Error('Cache API not available');
                }
                const resp = await fetch(url, {
                    method: 'GET'
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const contentLength = resp.headers.get('Content-Length');
                if (contentLength) {
                    const total = parseInt(contentLength, 10);
                    const reader = resp.body.getReader();
                    const chunks = [];
                    let received = 0;
                    while (true) {
                        const {
                            done,
                            value
                        } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        received += value.length;
                        next.progress = Math.round(10 + (received / total) * 85);
                        renderDpItem(next);
                    }
                    const blob = new Blob(chunks);
                    await cache.put(url, new Response(blob, {
                        headers: {
                            'Content-Type': 'audio/mpeg'
                        }
                    }));
                } else {
                    next.progress = 40;
                    renderDpItem(next);
                    await cache.put(url, resp);
                    next.progress = 80;
                    renderDpItem(next);
                }
                try {
                    const ir = await fetch(next.song.poster);
                    if (ir.ok) await cache.put(next.song.poster, ir);
                } catch (e) {}
                downloadedFiles.add(next.song.file);
                saveDownloaded();
                next.status = 'done';
                next.progress = 100;
                renderDpItem(next);
                updateDpStats();
                updatePlayerDlBtn();
                refreshSongRows();
                showToast('"' + next.song.title + '" saved ✓');
                setTimeout(() => {
                    const el = document.getElementById('dpi_' + next.id);
                    if (el) {
                        el.style.opacity = '0';
                        el.style.transition = 'opacity .4s';
                        setTimeout(() => el.remove(), 400);
                    }
                    dlQueue = dlQueue.filter(i => i.id !== next.id);
                    updateDpStats();
                }, 3000);
            } catch (err) {
                next.status = 'error';
                next.progress = 0;
                renderDpItem(next);
                updateDpStats();
                showToast('Download failed');
                console.error('DL error:', err);
            }
            dlBusy = false;
            processQueue();
        }

        function loadPlaybackMemory() {
            try {

                }
                const last = JSON.parse(localStorage.getItem('eq_last_song') || 'null');
                if (!last) return;
                currentSong = {
                    file: last.file,
                    title: last.title,
                    poster: last.poster
                };
                currentArtistKey = last.artistKey;
                if (last.artistKey && artists[last.artistKey]) {
                    currentSongs = artists[last.artistKey].songs;
                    currentIndex = currentSongs.findIndex(s => s.file === last.file);

        function songRowHTML(song,i,artistName) { const playing=currentSong&&currentSong.file===song.file&&!audio.paused; const liked=likedSongs.has(song.file); const dl=isDownloaded(song.file); return`<div class="song-row${playing?' playing':''}" id="row_${i}" onclick="playSong(${i})"><div class="song-num">${playing?'<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>':i+1}</div><div class="song-row-info"><img src="${song.poster}" onerror="this.style.background='#282828'" loading="lazy"><div class="song-row-text"><h4>${escH(song.title)}</h4><p>${escH(artistName)}</p></div></div><div class="song-actions"><button class="like-btn${liked?' liked':''}" onclick="event.stopPropagation();toggleLike('${escA(song.file)}',${i})">${liked?'❤':'♡'}</button><button class="dl-btn${dl?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escA(song.file)}')" title="${dl?'Remove':'Download'}">${dl?'✓':'⬇'}</button><button class="queue-btn" onclick="event.stopPropagation();showAddToPlaylistMenu(event,'${escA(song.file)}',${i})" title="Add to playlist">🎶</button><button class="queue-btn" onclick="event.stopPropagation();addToQueue(${i})" title="Add to queue">+</button></div></div>`; }

        window.handleDlBtn = async(btn,fileId) => { if(isDownloaded(fileId)){if(confirm('Remove from offline?')){await removeCachedSong(fileId);btn.classList.remove('downloaded');btn.textContent='⬇';}}else{let song=null;for(let k in artists){song=artists[k].songs.find(s=>s.file===fileId);if(song){song={...song,artistName:artists[k].name};break;}}if(song)addToDlQueue(song);} };

        window.sortSongs = () => { if(!currentSongs||!currentArtistKey)return; currentSortType=document.getElementById('sortSelect').value; const original=artists[currentArtistKey].songs; if(currentSortType==='default')currentSongs=original.slice(); else if(currentSortType==='title')currentSongs=[...original].sort((a,b)=>a.title.localeCompare(b.title)); else if(currentSortType==='liked')currentSongs=[...original].sort((a,b)=>(likedSongs.has(b.file)?1:0)-(likedSongs.has(a.file)?1:0)); else if(currentSortType==='liked_title')currentSongs=[...original].sort((a,b)=>{const aLiked=likedSongs.has(a.file)?0:1,bLiked=likedSongs.has(b.file)?0:1;return aLiked!==bLiked?aLiked-bLiked:a.title.localeCompare(b.title);}); document.getElementById('songsList').innerHTML=currentSongs.map((s,i)=>songRowHTML(s,i,artists[currentArtistKey].name)).join(''); };

        window.showAddToPlaylistMenu = (e,fileId,rowIdx) => { e.stopPropagation(); closeDropdown(); const song=currentSongs[rowIdx]; if(!song)return; const artistName=currentArtistKey?artists[currentArtistKey].name:''; window.__ctxSong=song; window.__ctxArtist=artistName; const ids=Object.keys(playlists); const dd=document.createElement('div'); dd.className='add-to-playlist-dropdown'; dd.style.position='fixed'; const rect=e.target.getBoundingClientRect(); dd.style.top=(rect.bottom+4)+'px'; dd.style.left=Math.max(10,rect.left-140)+'px'; if(!ids.length){dd.innerHTML=`<div class="no-playlists">No playlists yet.</div><button onclick="closeDropdown();openCreatePlaylistModal()">+ Create playlist</button>`;}else{dd.innerHTML=`<button onclick="closeDropdown();openCreatePlaylistModal()">+ New playlist</button>`+ids.map(id=>`<button onclick="addSongToPlaylistById(window.__ctxSong,window.__ctxArtist,'${escA(id)}');closeDropdown()">${escH(playlists[id].name)}</button>`).join('');}document.body.appendChild(dd);openDropdownEl=dd; };

        // ── PLAY SONG ──
        async function playSong(index) { if(!currentSongs[index])return; currentIndex=index; const song=currentSongs[index]; currentSong=song; if(crossfadeTimer){clearInterval(crossfadeTimer);crossfadeTimer=null;} const targetVol=isMuted?0:(parseFloat(volumeSlider.value)||1); if(!audio.paused&&audio.currentTime>0){audioFade.src=audio.src;audioFade.currentTime=audio.currentTime;audioFade.volume=targetVol;audioFade.play().catch(()=>{});let fv=targetVol;crossfadeTimer=setInterval(()=>{fv=Math.max(0,fv-targetVol/15);audioFade.volume=fv;if(fv<=0){audioFade.pause();audioFade.src='';clearInterval(crossfadeTimer);crossfadeTimer=null;}},50);} const src=await getAudioSrc('songs/'+song.file); audio.src=src; audio.volume=0; posterEl.src=song.poster; playerTitle.textContent=song.title; const artistKey=currentArtistKey||Object.keys(artists).find(k=>artists[k].songs===currentSongs); const artistName=artistKey?artists[artistKey].name:(song.artistName||''); playerArtist.textContent=artistName; updatePlayerLikeBtn(song.file); updatePlayerDlBtn(); audio.play().then(()=>{let v=0;const fi=setInterval(()=>{v=Math.min(targetVol,v+targetVol/15);audio.volume=v;if(v>=targetVol){audio.volume=targetVol;clearInterval(fi);}},50);}).catch(()=>{audio.volume=targetVol;}); playBtn.textContent='⏸'; document.getElementById('fsPoster').src=song.poster; document.getElementById('fsTitle').textContent=song.title; document.getElementById('fsArtist').textContent=artistName; document.getElementById('fsPlay').textContent='⏸'; if(currentArtistKey)refreshSongRows(); shuffleHistory.push(song.file); if(shuffleHistory.length>30)shuffleHistory=shuffleHistory.slice(-30); localStorage.setItem('eq_shuffle_history',JSON.stringify(shuffleHistory)); const sh={file:song.file,title:song.title,poster:song.poster,artistKey:currentArtistKey,artistName}; const ei=continueListening.findIndex(s=>s.file===song.file); if(ei>=0)continueListening.splice(ei,1); continueListening.unshift(sh); if(continueListening.length>10)continueListening=continueListening.slice(0,10); saveContinueListening(); savePlaybackMemory(); renderQueuePanel(); updateFullPlayerUI(); updateNowPlayingIndicator(); if('mediaSession' in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:song.title,artist:artistName,artwork:[{src:song.poster,sizes:'512x512',type:'image/jpeg'}]});} }

        function togglePlay() { if(audio.paused){audio.play();playBtn.textContent='⏸';document.getElementById('fsPlay').textContent='⏸';}else{audio.pause();playBtn.textContent='▶';document.getElementById('fsPlay').textContent='▶';savePlaybackMemory();} updateNowPlayingIndicator(); }

        function next() { if(queue.length>0){const s=queue.shift();localStorage.setItem('eq_queue',JSON.stringify(queue));currentSong=s;const ak=Object.keys(artists).find(k=>artists[k].songs.some(x=>x.file===s.file));const an=ak?artists[ak].name:(s.artistName||'');posterEl.src=s.poster;playerTitle.textContent=s.title;playerArtist.textContent=an;updatePlayerLikeBtn(s.file);updatePlayerDlBtn();getAudioSrc('songs/'+s.file).then(src=>{audio.src=src;audio.play();playBtn.textContent='⏸';updateNowPlayingIndicator();});savePlaybackMemory();renderQueuePanel();updateNowPlayingIndicator();return;} if(!currentSongs.length)return; if(isShuffle){const recent=new Set(shuffleHistory.slice(-Math.min(shuffleHistory.length,Math.floor(currentSongs.length*.5))));const avail=currentSongs.map((_,i)=>i).filter(i=>!recent.has(currentSongs[i].file));currentIndex=avail.length>0?avail[Math.floor(Math.random()*avail.length)]:Math.floor(Math.random()*currentSongs.length);}else{currentIndex=(currentIndex+1)%currentSongs.length;} playSong(currentIndex); }

        // ── PROGRESS ──
        let isDragging = false;
        let activeDragTrack = null;

        function updateNowPlayingIndicator() {
            const bar = document.getElementById('nowPlayingBar');
            const indicator = document.getElementById('nowPlayingIndicator');
            const songEl = document.getElementById('nowPlayingSong');
            const artistEl = document.getElementById('nowPlayingArtist');
            const posterEl = document.getElementById('nowPlayingPoster');
            
            if (currentSong && !audio.paused) {

        function getClientX(e) {
            if (e.touches && e.touches[0]) return e.touches[0].clientX;
            if (e.changedTouches && e.changedTouches[0]) return e.changedTouches[0].clientX;
            return e.clientX;
        }

        function seekFromClientX(trackEl, clientX) {
            if (!trackEl || !audio.duration) return;
            const r = trackEl.getBoundingClientRect();
            const ratio = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
            audio.currentTime = ratio * audio.duration;
        }

        function startDrag(e) {
            const track = document.getElementById('progressTrack');
            if (!track) return;
            isDragging = true;
            activeDragTrack = track;
            track.classList.add('dragging');
            seekFromClientX(track, getClientX(e));
            if (e.cancelable) e.preventDefault();
        }

        function updateProgressFromEvent(e) {
            if (!isDragging || !activeDragTrack) return;
            seekFromClientX(activeDragTrack, getClientX(e));
            if (e.cancelable) e.preventDefault();
        }

        function endDrag() {
            isDragging = false;
            document.getElementById('progressTrack')?.classList.remove('dragging');
            document.getElementById('fsProgressTrack')?.classList.remove('dragging');
            activeDragTrack = null;
        }

        window.addEventListener('mousemove', (e) => { if (isDragging) updateProgressFromEvent(e); });
        window.addEventListener('touchmove', (e) => { if (isDragging) updateProgressFromEvent(e); }, { passive: false });
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        // ── QUEUE ──
        function addToQueue(index) { const song=currentSongs[index]; if(!song)return; const artistKey=currentArtistKey||Object.keys(artists).find(k=>artists[k].songs===currentSongs); const artistName=artistKey?artists[artistKey].name:''; queue.push({...song,artistName}); localStorage.setItem('eq_queue',JSON.stringify(queue)); renderQueuePanel(); showToast('Added to queue ✓'); }

        function renderQueuePanel() { const body=document.getElementById('queuePanelBody'); if(!body)return; let html=''; if(currentSong){html+=`<div class="qp-section">Now Playing</div><div class="qp-item"><img src="${escH(currentSong.poster)}" onerror="this.style.background='#282828'"><div class="qp-item-info"><div class="qp-item-title" style="color:var(--accent)">${escH(currentSong.title)}</div><div class="qp-item-artist">${escH(playerArtist.textContent)}</div></div></div>`;} if(queue.length>0){html+=`<div class="qp-section" style="margin-top:7px">Up Next (${queue.length})</div>`;queue.forEach((s,i)=>{html+=`<div class="qp-item" onclick="playFromQueue(${i})"><img src="${escH(s.poster)}" onerror="this.style.background='#282828'"><div class="qp-item-info"><div class="qp-item-title">${escH(s.title)}</div><div class="qp-item-artist">${escH(s.artistName||'')}</div></div><button class="qp-item-rm" onclick="event.stopPropagation();removeFromQueue(${i})">✕</button></div>`;});html+=`<div style="padding:8px 14px"><button onclick="clearQueue()" style="background:none;border:1px solid rgba(255,85,85,.2);color:rgba(255,85,85,.6);font-family:'DM Sans',sans-serif;font-size:.72rem;cursor:pointer;padding:5px 12px;border-radius:500px;width:100%">Clear Queue</button></div>`;} if(currentSong&&currentArtistKey&&currentSongs.length>1){const nl=currentSongs.slice(currentIndex+1,currentIndex+5);if(nl.length>0){html+=`<div class="qp-section" style="margin-top:7px">Next from ${escH(currentArtistKey&&artists[currentArtistKey]?artists[currentArtistKey].name:'')}</div>`;nl.forEach((s,i)=>{html+=`<div class="qp-item" onclick="playSong(${currentIndex+1+i})"><img src="${escH(s.poster)}" onerror="this.style.background='#282828'"><div class="qp-item-info"><div class="qp-item-title">${escH(s.title)}</div><div class="qp-item-artist">${escH(currentArtistKey&&artists[currentArtistKey]?artists[currentArtistKey].name:'')}</div></div></div>`;});}} if(!currentSong&&!queue.length){html=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--text2);gap:10px;font-size:.85rem"><div style="font-size:2.5rem;opacity:.3">☰</div><p>Your queue is empty</p></div>`;} body.innerHTML=html; }

        window.playFromQueue = (i) => { if(!queue[i])return; const songs=queue.splice(0,i+1); const s=songs[songs.length-1]; localStorage.setItem('eq_queue',JSON.stringify(queue)); currentSong=s; const ak=Object.keys(artists).find(k=>artists[k].songs.some(x=>x.file===s.file)); const an=ak?artists[ak].name:(s.artistName||''); posterEl.src=s.poster; playerTitle.textContent=s.title; playerArtist.textContent=an; updatePlayerLikeBtn(s.file); updatePlayerDlBtn(); getAudioSrc('songs/'+s.file).then(src=>{audio.src=src;audio.play();playBtn.textContent='⏸';updateNowPlayingIndicator();}); savePlaybackMemory(); renderQueuePanel(); updateNowPlayingIndicator(); };

        function globalSearch() {

            setMobileBack(false);
            let artistHtml='',songHtml='',ac=0,sc=0;
            for(let key in artists){ const a=artists[key]; if(a.name.toLowerCase().includes(q)){artistHtml+=`<div class="artist-card" onclick="openArtist('${key}')"><div class="artist-card-img-wrap"><img src="${a.image}"><button class="card-play-btn" onclick="event.stopPropagation();playArtist('${key}')">▶</button></div><div class="artist-card-name">${a.name}</div><div class="artist-card-count">${a.songs.length} songs</div></div>`;ac++;} a.songs.forEach((s,i)=>{if(s.title.toLowerCase().includes(q)){songHtml+=`<div class="song-row" onclick="openArtistAndPlay('${key}',${i})"><div class="song-num">${sc+1}</div><div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#282828'"><div class="song-row-text"><h4>${escH(s.title)}</h4><p>${escH(a.name)}</p></div></div><div class="song-actions" style="opacity:1"><button class="like-btn${likedSongs.has(s.file)?' liked':''}" onclick="event.stopPropagation();toggleLike('${escA(s.file)}')">${likedSongs.has(s.file)?'❤':'♡'}</button><button class="dl-btn${isDownloaded(s.file)?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escA(s.file)}')">${isDownloaded(s.file)?'✓':'⬇'}</button></div></div>`;sc++;}}); }
            const total = ac+sc;
            const mainArea = document.getElementById('mainArea');
            const topbarHTML = `<div class="main-topbar"><div class="nav-arrows"><button class="nav-arrow-btn" onclick="loadArtists()">‹</button></div><div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchBar" value="${escH(document.getElementById('searchBar')?.value||q)}" placeholder="Search artists or songs…" oninput="globalSearch()"><button class="search-clear visible" id="searchClear" onclick="clearSearch()">✕</button></div></div>`;
            mainArea.innerHTML = topbarHTML+`${ac>0?`<div style="padding:20px 24px 0"><div class="section-title" style="margin-bottom:14px">Artists</div><div class="artists-grid" style="padding:0">${artistHtml}</div></div>`:''}<div style="height:20px"></div>${sc>0?`<div class="songs-section"><div style="font-size:1.1rem;font-weight:800;margin-bottom:12px">Songs</div>${songHtml}</div>`:''}${!total?'<div class="empty-state"><div class="emoji">🔍</div><p>No results for "'+escH(q)+'"</p></div>':''}`;
            const newInp = document.getElementById('searchBar'); if(newInp){newInp.focus();newInp.setSelectionRange(newInp.value.length,newInp.value.length);} initSearchClear();
        }

        function openArtistAndPlay(key,index) { currentSongs=artists[key].songs; currentArtistKey=key; openArtist(key); playSong(index); }

        // ── FULLSCREEN PLAYER (Mobile) ──
        window.openFullPlayer = () => { 
            if(!currentSong) return; 
            const fp = document.getElementById('fullscreenPlayer');
            if(!fp) return;
            fp.classList.add('active');
            updateFullPlayerUI();
        }
        window.closeFullPlayer = () => { 
            const fp = document.getElementById('fullscreenPlayer');
            if(!fp) return;
            fp.classList.remove('active');
        }
        function updateFullPlayerUI() {
            if(!currentSong) return;
            const fsPoster = document.getElementById('fsPoster');
            const fsTitle = document.getElementById('fsTitle');
            const fsArtist = document.getElementById('fsArtist');
            const fsPlay = document.getElementById('fsPlay');
            const fsLikeBtn = document.getElementById('fsLikeBtn');
            const fsShuffle = document.getElementById('fsShuffle');
            const fsRepeat = document.getElementById('fsRepeat');
            
            if(fsPoster) fsPoster.src = currentSong.poster || '';
            if(fsTitle) fsTitle.textContent = currentSong.title || 'Unknown';
            if(fsArtist) fsArtist.textContent = currentArtistKey ? artists[currentArtistKey].name : 'Unknown Artist';
            if(fsPlay) fsPlay.textContent = audio.paused ? '▶' : '⏸';
            if(fsLikeBtn) fsLikeBtn.textContent = likedSongs.has(currentSong.file) ? '❤' : '♡';
            if(fsLikeBtn) fsLikeBtn.classList.toggle('liked', likedSongs.has(currentSong.file));
            if(fsShuffle) fsShuffle.classList.toggle('active', isShuffle);
            if(fsRepeat) fsRepeat.classList.toggle('active', isRepeat > 0);
        }
        window.toggleFullPlayerLike = () => {
            if(!currentSong) return;
            toggleLike(currentSong.file);
            updateFullPlayerUI();
        }
                function startDragFullPlayer(e) {
            const track = document.getElementById('fsProgressTrack');
            if (!track) return;
            isDragging = true;
            activeDragTrack = track;
            track.classList.add('dragging');
            seekFromClientX(track, getClientX(e));
            if (e.cancelable) e.preventDefault();
        }

        // ── AUDIO EVENTS ──
        audio.addEventListener('timeupdate',()=>{ 
            if(!audio.duration) return; 
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%'; 
            const fsProgressBar = document.getElementById('fsProgressBar');
            if(fsProgressBar) fsProgressBar.style.width = percent + '%';
            document.getElementById('currentTime').textContent = fmt(audio.currentTime); 
            document.getElementById('duration').textContent = fmt(audio.duration);
            const fsCurrentTime = document.getElementById('fsCurrentTime');
            const fsDuration = document.getElementById('fsDuration');
            if(fsCurrentTime) fsCurrentTime.textContent = fmt(audio.currentTime);
            if(fsDuration) fsDuration.textContent = fmt(audio.duration);
            if(Math.floor(audio.currentTime)%15===0&&audio.currentTime>0) savePlaybackMemory(); 
        });
        audio.addEventListener('ended',()=>{ if(!isRepeat) next(); });
        audio.addEventListener('play',()=>{ 
            playBtn.textContent='⏸'; 
            const fp=document.getElementById('fsPlay'); 
            if(fp) fp.textContent='⏸';
            updateNowPlayingIndicator();
        });
        audio.addEventListener('pause',()=>{ 
            playBtn.textContent='▶'; 
            const fp=document.getElementById('fsPlay'); 
            if(fp) fp.textContent='▶'; 
            savePlaybackMemory();
            updateNowPlayingIndicator();
        });
        volumeSlider.addEventListener('input',()=>{ audio.volume=+volumeSlider.value; isMuted=audio.volume===0; localStorage.setItem('eq_volume',audio.volume); });
        window.addEventListener('beforeunload',()=>savePlaybackMemory());

        // ── MEDIA SESSION ──
        if('mediaSession' in navigator){ navigator.mediaSession.setActionHandler('play',()=>audio.play()); navigator.mediaSession.setActionHandler('pause',()=>audio.pause()); navigator.mediaSession.setActionHandler('nexttrack',()=>next()); navigator.mediaSession.setActionHandler('previoustrack',()=>previous()); navigator.mediaSession.setActionHandler('seekto',(d)=>{if(d.seekTime)audio.currentTime=d.seekTime;}); }

        // ── MOBILE USER MENU ──
        window.showMobileUserMenu = () => {
            // Show simple options: signed in as X + sign out
            const name = document.getElementById('userDisplayName')?.textContent || 'User';
            if(confirm(`Signed in as ${name}\n\nSign out?`)) signOut();
        };

        // ── UTILS ──
        function fmt(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
        function setMobileBack(show) { const b=document.getElementById('mobileBackBtn'); if(b)b.classList.toggle('hidden',!show); }
        function setNavActive(id) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); const e=document.getElementById(id); if(e)e.classList.add('active'); }
        function setSidebarActive(key) { document.querySelectorAll('.artist-item').forEach(e=>e.classList.remove('active')); const e=document.getElementById('sb_'+key); if(e){e.classList.add('active');e.scrollIntoView({block:'nearest'});} }
        function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escA(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

        let toastTimer;
        function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity='0',2200); }

        // Hook into sign in to update mobile button
        const _origSignIn = window.signInWithGoogle;
        // Patch user bar update to also sync mobile button
        function syncMobileAuthUI(isLoggedIn, user) {
            const mobileLoginBtn = document.getElementById('mobileLoginBtn');
            const mobileUserBtn = document.getElementById('mobileUserBtn');
            const mobileUserAvatar = document.getElementById('mobileUserAvatar');
            if(isLoggedIn && user) {
                if(mobileLoginBtn) mobileLoginBtn.style.display = 'none';
                if(mobileUserBtn) mobileUserBtn.style.display = 'flex';
                if(mobileUserAvatar && user.photoURL) mobileUserAvatar.src = user.photoURL;
            } else {
                if(mobileLoginBtn) mobileLoginBtn.style.display = 'flex';
                if(mobileUserBtn) mobileUserBtn.style.display = 'none';
            }
        }
                // MOBILE NAV CLICK HANDLER
        function setupMobileNav() {
            const nav = document.getElementById('mobileNav');
            if (!nav || nav.dataset.bound === '1') return;
            nav.dataset.bound = '1';

            nav.addEventListener('click', (e) => {
                const btn = e.target.closest('.mnav-btn');
                if (!btn) return;

                nav.querySelectorAll('.mnav-btn').forEach((b) => b.classList.remove('active'));
                btn.classList.add('active');

                const tab = btn.dataset.tab;
                if (tab === 'home') {
                    loadArtists();
                } else if (tab === 'search') {
                    loadArtists();
                    setTimeout(() => document.querySelector('.search-box input')?.focus(), 60);
                } else if (tab === 'fav') {
                    showLikedSongs();
                } else if (tab === 'library') {
                    showPlaylists();
                }
            });
        }
        document.addEventListener('DOMContentLoaded', setupMobileNav);

        window.syncMobileAuthUI = syncMobileAuthUI;

        // ── EXPOSE ──
        window.playSong = playSong; window.next = next; window.previous = previous;
        window.togglePlay = togglePlay; window.toggleShuffle = toggleShuffle; window.toggleRepeat = toggleRepeat; window.toggleMute = toggleMute;
        window.toggleQueuePanel = toggleQueuePanel; window.addToQueue = addToQueue;
        window.openArtist = openArtist; window.loadArtists = loadArtists; window.showLikedSongs = showLikedSongs; window.showDownloads = showDownloads; window.showPlaylists = showPlaylists; window.refreshLikedDisplay = refreshLikedDisplay;
        window.playArtist = playArtist; window.shuffleArtist = shuffleArtist; window.toggleLike = toggleLike; window.globalSearch = globalSearch;

        // ── INIT ──
        buildSidebar();
        loadArtists();
        loadPlaybackMemory();
        renderQueuePanel();

        if(!('caches' in window)){ console.warn('Cache API not available.'); document.querySelectorAll('.dl-btn,.player-dl-btn,.dl-queue-btn').forEach(el=>el.style.display='none'); }

        // ── MOBILE PLAYER CLICK HANDLER ──
        if(window.innerWidth <= 768) {
            const playerEl = document.querySelector('.player');
            if(playerEl) {
                playerEl.addEventListener('click', function(e) {
                    if(e.target.closest('button')) return;
                    if(currentSong) openFullPlayer();
                });
            }
        }

        // ── AFTER LOADING ──
        setTimeout(() => { document.body.classList.remove('loading'); }, 100);
    </script>

    <nav class="mobile-nav" id="mobileNav">
        <button class="mnav-btn active" data-tab="home">
            <span>🏠</span>
            <small>Home</small>
        </button>
        <button class="mnav-btn" data-tab="search">
            <span>🔍</span>
            <small>Search</small>
        </button>
        <button class="mnav-btn" data-tab="fav">
            <span>❤️</span>
            <small>Fav</small>
        </button>
        <button class="mnav-btn" data-tab="library">
            <span>🎵</span>
            <small>Library</small>
        </button>
    </nav>
</body>

</html>
