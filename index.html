<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#07070f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EQUIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }
        
         :root {
            --bg: #07070f;
            --surface: #0d0d1c;
            --surface2: #121224;
            --surface3: #1a1a30;
            --surface4: #22223e;
            --accent: #c8f542;
            --accent2: #a8d930;
            --accent3: rgba(200, 245, 66, .10);
            --accent-glow: rgba(200, 245, 66, .25);
            --text: #f0f0f8;
            --muted: #3e3e62;
            --muted2: #6a6a9a;
            --border: rgba(200, 245, 66, .07);
            --border2: rgba(255, 255, 255, .05);
            --player-h: 100px;
            --sidebar-w: 260px;
            --radius: 16px;
            --radius-sm: 10px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg)
        }
        
        body {
            font-family: 'Syne', sans-serif;
            color: var(--text);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-rows: 1fr var(--player-h);
            height: 100dvh;
        }
        /* ── SIDEBAR ── */
        
        .sidebar {
            grid-row: 1;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(200, 245, 66, .25), transparent);
        }
        
        .logo-wrap {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: 5px;
        }
        
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 18px rgba(200, 245, 66, .3);
        }
        
        .logo-icon img {
            width: 38px;
            height: 38px;
            object-fit: cover;
            border-radius: 10px
        }
        
        .sync-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Space Mono', monospace;
            font-size: .54rem;
            color: var(--muted2);
            padding: 3px 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        
        .sync-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted)
        }
        
        .sync-dot.synced {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(200, 245, 66, .6)
        }
        
        .sync-dot.syncing {
            background: #f5c842;
            animation: blink .7s infinite
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: .3
            }
        }
        
        .search-wrap {
            padding: 12px 14px 8px;
            flex-shrink: 0
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center
        }
        
        .search-icon {
            position: absolute;
            left: 11px;
            color: var(--muted);
            font-size: .85rem;
            pointer-events: none
        }
        
        .search-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 8px 10px 8px 33px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .8rem;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        
        .search-box input:focus {
            border-color: rgba(200, 245, 66, .4);
            background: var(--surface3)
        }
        
        .search-box input::placeholder {
            color: var(--muted)
        }
        
        .sidebar-nav {
            padding: 4px 10px 4px;
            flex-shrink: 0
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 9px;
            width: 100%;
            padding: 8px 11px;
            border-radius: 10px;
            background: none;
            border: none;
            color: var(--muted2);
            font-family: 'Syne', sans-serif;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .18s;
            text-align: left;
            margin-bottom: 2px;
        }
        
        .nav-btn:hover {
            background: var(--surface2);
            color: var(--text)
        }
        
        .nav-btn.active {
            background: var(--accent3);
            color: var(--accent);
            border: 1px solid rgba(200, 245, 66, .15);
        }
        
        .nav-icon {
            font-size: .85rem;
            width: 16px;
            flex-shrink: 0
        }
        
        .sidebar-section-label {
            padding: 10px 22px 5px;
            font-family: 'Space Mono', monospace;
            font-size: .56rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
        }
        
        .artists-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .artists-list::-webkit-scrollbar {
            width: 3px
        }
        
        .artists-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 3px
        }
        
        .artist-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background .15s;
        }
        
        .artist-item:hover {
            background: var(--surface2)
        }
        
        .artist-item.active {
            background: var(--surface3)
        }
        
        .artist-item img {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            object-fit: cover;
            flex-shrink: 0
        }
        
        .artist-item-name {
            font-size: .76rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .user-bar {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .user-bar img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--accent);
            flex-shrink: 0;
        }
        
        .user-bar-info {
            flex: 1;
            overflow: hidden
        }
        
        .user-bar-name {
            font-size: .76rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .user-bar-email {
            font-size: .64rem;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .signout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: .66rem;
            cursor: pointer;
            padding: 3px 7px;
            border-radius: 5px;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .signout-btn:hover {
            color: #ff5555;
            border-color: #ff5555
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: calc(100% - 22px);
            margin: 12px 11px;
            padding: 11px 16px;
            background: #fff;
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: 999px;
            color: #111;
            font-family: 'Syne', sans-serif;
            font-size: .82rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform .18s, box-shadow .18s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
        }
        
        .google-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, .3)
        }
        
        .google-btn svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0
        }
        /* ── MAIN ── */
        
        .main {
            grid-column: 2;
            grid-row: 1;
            overflow-y: auto;
            background: var(--bg);
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .main::-webkit-scrollbar {
            width: 4px
        }
        
        .main::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 4px
        }
        
        .main-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(7, 7, 15, .92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 16px 26px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .main-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px
        }
        
        .main-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            color: var(--muted2);
            margin-top: 2px;
            letter-spacing: 1px
        }
        
        .header-actions {
            display: flex;
            gap: 7px;
            align-items: center
        }
        
        .btn {
            padding: 7px 18px;
            border-radius: 50px;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: .76rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted2);
        }
        
        .btn-outline:hover {
            border-color: rgba(200, 245, 66, .4);
            color: var(--accent)
        }
        
        .btn-accent {
            background: var(--accent);
            color: #000
        }
        
        .btn-accent:hover {
            background: var(--accent2);
            transform: scale(1.04);
            box-shadow: 0 5px 22px rgba(200, 245, 66, .3);
        }
        /* ── ARTIST HERO ── */
        
        .artist-hero {
            position: relative;
            height: 220px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 24px 26px;
        }
        
        .artist-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            filter: blur(3px) brightness(.28);
            transform: scale(1.08);
        }
        
        .artist-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, rgba(7, 7, 15, .5) 60%, transparent 100%);
        }
        
        .artist-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            gap: 20px;
            width: 100%;
        }
        
        .artist-hero-img {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(200, 245, 66, .25);
            box-shadow: 0 0 40px rgba(0, 0, 0, .8), 0 0 25px rgba(200, 245, 66, .08);
            flex-shrink: 0;
        }
        
        .artist-hero-tag {
            font-family: 'Space Mono', monospace;
            font-size: .54rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }
        
        .artist-hero-name {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1
        }
        
        .artist-hero-count {
            font-size: .74rem;
            color: var(--muted2);
            margin-top: 5px
        }
        
        .artist-hero-actions {
            display: flex;
            gap: 7px;
            align-items: center;
            margin-top: 10px
        }
        /* ── ARTISTS GRID ── */
        
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 16px;
            padding: 22px 26px;
        }
        
        .artist-card {
            cursor: pointer;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: transform .28s cubic-bezier(.34, 1.56, .64, 1), box-shadow .28s, border-color .28s;
            position: relative;
            aspect-ratio: 1;
        }
        
        .artist-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .65), 0 0 30px rgba(200, 245, 66, .08);
            border-color: rgba(200, 245, 66, .25);
        }
        
        .artist-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .4s;
        }
        
        .artist-card:hover img {
            transform: scale(1.07)
        }
        
        .artist-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(7, 7, 15, .95) 38%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 14px;
        }
        
        .artist-card-name {
            font-size: .8rem;
            font-weight: 700;
            letter-spacing: .5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .artist-card-count {
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            color: var(--muted2);
            margin-top: 3px
        }
        
        .card-play-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            color: #000;
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: scale(.65) translateY(8px);
            transition: all .22s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 5px 20px rgba(200, 245, 66, .4);
        }
        
        .artist-card:hover .card-play-btn {
            opacity: 1;
            transform: scale(1) translateY(0)
        }
        /* ── SONGS TABLE ── */
        
        .songs-section {
            padding: 0 26px 26px
        }
        
        .songs-table-header {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            padding: 0 12px 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }
        
        .th {
            font-family: 'Space Mono', monospace;
            font-size: .56rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }
        
        .song-row {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            padding: 7px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .15s;
            gap: 4px;
        }
        
        .song-row:hover {
            background: var(--surface)
        }
        
        .song-row.playing {
            background: rgba(200, 245, 66, .05);
            border: 1px solid rgba(200, 245, 66, .1);
        }
        
        .song-num {
            font-family: 'Space Mono', monospace;
            font-size: .76rem;
            color: var(--muted);
            text-align: center
        }
        
        .song-row.playing .song-num {
            color: var(--accent)
        }
        
        .song-row-info {
            display: flex;
            align-items: center;
            gap: 12px
        }
        
        .song-row-info img {
            width: 44px;
            height: 44px;
            border-radius: 9px;
            object-fit: cover;
            flex-shrink: 0;
            transition: transform .2s;
        }
        
        .song-row:hover .song-row-info img {
            transform: scale(1.06)
        }
        
        .song-row-text h4 {
            font-size: .85rem;
            font-weight: 700
        }
        
        .song-row.playing .song-row-text h4 {
            color: var(--accent)
        }
        
        .song-row-text p {
            font-size: .7rem;
            color: var(--muted2);
            margin-top: 2px
        }
        
        .song-actions {
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0;
            transition: opacity .2s;
        }
        
        .song-row:hover .song-actions {
            opacity: 1
        }
        
        .like-btn {
            background: none;
            border: none;
            font-size: .95rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: transform .2s;
            line-height: 1;
        }
        
        .like-btn:hover {
            transform: scale(1.3)
        }
        
        .like-btn.liked {
            color: var(--accent)
        }
        /* ── DOWNLOAD BUTTON ── */
        
        .dl-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted2);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .72rem;
            transition: all .22s;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            font-family: 'Space Mono', monospace;
        }
        
        .dl-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent3)
        }
        
        .dl-btn.downloaded {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent3);
        }
        
        .dl-btn.downloading {
            border-color: rgba(200, 245, 66, .4);
            color: var(--accent);
        }
        
        .dl-btn.downloading::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--accent);
            animation: dlProg 1.8s linear infinite;
        }
        
        @keyframes dlProg {
            from {
                width: 0;
                left: 0
            }
            50% {
                width: 100%;
                left: 0
            }
            51% {
                width: 100%;
                left: 0
            }
            to {
                width: 0;
                left: 100%
            }
        }
        
        .queue-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted2);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .8rem;
            transition: all .2s;
        }
        
        .queue-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }
        /* ── EQ BARS ── */
        
        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
            width: 16px;
            margin: 0 auto
        }
        
        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            animation: eq .6s ease-in-out infinite alternate
        }
        
        .eq-bar:nth-child(1) {
            animation-delay: 0s
        }
        
        .eq-bar:nth-child(2) {
            animation-delay: .15s
        }
        
        .eq-bar:nth-child(3) {
            animation-delay: .3s
        }
        
        @keyframes eq {
            from {
                height: 3px
            }
            to {
                height: 13px
            }
        }
        /* ── PLAYER ── */
        
        .player {
            grid-column: 1/-1;
            grid-row: 2;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr 280px;
            align-items: center;
            padding: 0 20px 0 0;
            position: relative;
            z-index: 20;
        }
        
        .player::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent 0%, var(--accent) 35%, var(--accent) 65%, transparent 100%);
            opacity: .25;
        }
        
        .player-song {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 14px;
            overflow: hidden;
        }
        
        .player-poster {
            width: 52px;
            height: 52px;
            border-radius: 11px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border);
            box-shadow: 0 3px 20px rgba(0, 0, 0, .5);
            transition: transform .3s;
            cursor: pointer;
        }
        
        .player-poster:hover {
            transform: scale(1.06)
        }
        
        .player-song-title {
            font-size: .83rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }
        
        .player-song-artist {
            font-size: .68rem;
            color: var(--muted2);
            margin-top: 2px
        }
        
        .player-song-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 3px
        }
        
        .offline-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;

        .playlist-shuffle-btn:hover {
            background: rgba(200, 245, 66, .08);
            transform: translateY(-2px)
        }
        
        .playlist-song-list {
            padding: 18px 26px 26px
        }
        
        .playlist-song-header {
            display: grid;
            grid-template-columns: 38px 1fr auto;
            padding: 0 10px 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
            font-family: 'Space Mono', monospace;
            font-size: .56rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }
        
        .playlist-song-row {
            display: grid;
            grid-template-columns: 38px 1fr auto;
            align-items: center;
            padding: 7px 10px;
            border-radius: 11px;
            cursor: pointer;
            transition: background .15s;
            border: 1px solid transparent;
        }
        
        .playlist-song-row:hover {
            background: rgba(200, 245, 66, .04);
            border-color: rgba(200, 245, 66, .07)
        }
        
        .playlist-song-row.playing {
            background: rgba(200, 245, 66, .07);
            border-color: rgba(200, 245, 66, .14)
        }
        
        .ps-num {
            font-family: 'Space Mono', monospace;
            font-size: .76rem;
            color: var(--muted);
            text-align: center
        }
        
        .playlist-song-row.playing .ps-num {
            color: var(--accent)
        }
        
        .ps-info {
            display: flex;
            align-items: center;
            gap: 11px;
            overflow: hidden
        }
        
        .ps-info img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            transition: transform .2s;
        }
        
        .playlist-song-row:hover .ps-info img {
            transform: scale(1.05)
        }
        
        .ps-text h4 {
            font-size: .84rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .playlist-song-row.playing .ps-text h4 {
            color: var(--accent)
        }
        
        .ps-text p {
            font-size: .68rem;
            color: var(--muted2);
            margin-top: 2px
        }
        
        .ps-actions {
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0;
            transition: opacity .2s;
        }
        
        .playlist-song-row:hover .ps-actions {
            opacity: 1
        }
        
        .ps-remove {
            background: none;
            border: none;
            color: var(--muted);
            font-size: .78rem;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 5px;
            transition: color .2s;
        }
        
        .ps-remove:hover {
            color: #ff5555
        }
        /* ── MODAL ── */
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .72);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            width: 340px;
            max-width: 90vw;
            box-shadow: 0 20px 70px rgba(0, 0, 0, .75);
        }
        
        .modal-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 18px
        }
        
        .modal-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .88rem;
            outline: none;
            transition: border-color .2s;
            margin-bottom: 14px;
        }
        
        .modal-input:focus {
            border-color: rgba(200, 245, 66, .45)
        }
        
        .modal-actions {
            display: flex;
            gap: 9px;
            justify-content: flex-end
        }
        
        .modal-cancel {
            background: none;
            border: 1px solid var(--border2);
            color: var(--muted2);
            font-family: 'Syne', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all .2s;
        }
        
        .modal-cancel:hover {
            color: var(--text)
        }
        
        .modal-confirm {
            background: var(--accent);
            color: #000;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all .2s;
        }
        
        .modal-confirm:hover {
            background: var(--accent2);
            transform: scale(1.03)
        }
        /* ── CONTINUE STRIP ── */
        
        .continue-strip {
            padding: 18px 26px;
            background: linear-gradient(135deg, rgba(200, 245, 66, .03), rgba(200, 245, 66, .01));
            border-bottom: 1px solid var(--border);
        }
        
        .continue-label {
            font-family: 'Space Mono', monospace;
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }
        
        .continue-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: rgba(200, 245, 66, .18) transparent;
            padding-bottom: 6px;
        }
        
        .continue-scroll::-webkit-scrollbar {
            height: 3px
        }
        
        .continue-scroll::-webkit-scrollbar-thumb {
            background: rgba(200, 245, 66, .18);
            border-radius: 2px
        }
        
        .continue-card {
            flex-shrink: 0;
            width: 130px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--surface2);
            border: 1px solid var(--border);
            transition: all .26s cubic-bezier(.34, 1.56, .64, 1);
            display: flex;
            flex-direction: column;
        }
        
        .continue-card:hover {
            transform: translateY(-4px);
            border-color: rgba(200, 245, 66, .28);
            box-shadow: 0 7px 20px rgba(200, 245, 66, .12);
        }
        
        .continue-card img {
            width: 100%;
            height: 74px;
            object-fit: cover;
            background: var(--surface3)
        }
        
        .continue-card-info {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1
        }
        
        .continue-card-title {
            font-size: .7rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text)
        }
        
        .continue-card-artist {
            font-size: .6rem;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        /* ── RECOMMEND ── */
        
        .recommend-strip {
            padding: 0 26px 22px
        }
        
        .recommend-label {
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            padding-bottom: 7px;
            border-bottom: 1px solid var(--border);
        }
        
        .recommend-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none
        }
        
        .recommend-scroll::-webkit-scrollbar {
            display: none
        }
        
        .recommend-card {
            flex-shrink: 0;
            width: 112px;
            cursor: pointer;
            border-radius: 11px;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: transform .22s, border-color .22s;
        }
        
        .recommend-card:hover {
            transform: translateY(-4px);
            border-color: rgba(200, 245, 66, .28)
        }
        
        .recommend-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block
        }
        
        .recommend-card-info {
            padding: 7px 9px
        }
        
        .recommend-card-title {
            font-size: .7rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .recommend-card-artist {
            font-size: .6rem;
            color: var(--muted2);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        /* ── TOAST ── */
        
        #toast {
            position: fixed;
            bottom: calc(var(--player-h) + 14px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            font-family: 'Syne', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 50px;
            z-index: 9999;
            opacity: 0;
            transition: opacity .22s;
            pointer-events: none;
            box-shadow: 0 5px 24px rgba(200, 245, 66, .4);
        }
        /* ── EMPTY STATE ── */
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            color: var(--muted2);
            gap: 12px
        }
        
        .empty-state .emoji {
            font-size: 2.8rem;
            opacity: .45
        }
        
        .empty-state p {
            font-size: .88rem
        }
        /* ── DROPDOWN ── */
        
        .add-to-playlist-dropdown {
            position: fixed;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 170px;
            z-index: 100;
            padding: 5px 0;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .6);
        }
        
        .add-to-playlist-dropdown button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px 13px;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .78rem;
            cursor: pointer;
            transition: background .15s;
        }
        
        .add-to-playlist-dropdown button:hover {
            background: var(--surface3);
            color: var(--accent)
        }
        
        .add-to-playlist-dropdown .no-playlists {
            display: block;
            padding: 8px 13px;
            font-size: .74rem;
            color: var(--muted2)
        }
        /* ── SKELETON ── */
        
        .skeleton {
            position: relative;
            overflow: hidden;
            background: var(--surface3);
            border-radius: var(--radius-sm);
        }
        
        .skeleton::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150px;
            height: 100%;
            width: 150px;
            background: linear-gradient(90deg, transparent, rgba(200, 245, 66, .08), transparent);
            animation: shimmer 1.4s infinite;
        }
        
        @keyframes shimmer {
            0% {
                transform: translateX(0)
            }
            100% {
                transform: translateX(400%)
            }
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: .7
            }
        }
        
        .skeleton-loader {
            grid-column: 2;
            grid-row: 1;
            overflow-y: auto;
            background: var(--bg);
            display: none
        }
        
        body.loading .skeleton-loader {
            display: block
        }
        
        body.loading .main {
            display: none
        }
        
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            padding: 22px
        }
        
        .skeleton-card {
            display: flex;
            flex-direction: column;
            gap: 9px
        }
        /* ── FULLSCREEN PLAYER ── */
        
        #fullscreenPlayer {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 9998;
        }
        
        #fullscreenPlayer img {
            width: 230px;
            height: 230px;
            border-radius: 20px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, .8);
        }
        
        #fsTitle {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px
        }
        
        .fsControls {
            display: flex;
            gap: 20px;
            align-items: center
        }
        
        .fsControls button {
            font-size: 1rem;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #closePlayer {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.8rem;
            cursor: pointer
        }
        /* ── MOBILE HEADER ELEMENTS ── */
        
        .mobile-back-btn {
            display: none
        }
        
        .fav-mobile-btn {
            display: none
        }
        /* ── SPLASH ── */
        
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: splashOut .5s cubic-bezier(.4, 0, .2, 1) 2.2s forwards;
        }
        
        .splash-inner {
            text-align: center;
            animation: splashIn 1s cubic-bezier(.16, 1, .3, 1) both
        }
        
        .splash-logo-wrap {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
            box-shadow: 0 0 0 0 rgba(200, 245, 66, .5);
            animation: splashPulse 1.8s ease infinite;
        }
        
        .splash-logo-wrap img {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            object-fit: cover
        }
        
        .splash-name {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 9px;
            text-transform: uppercase
        }
        
        .splash-name span {
            color: var(--accent)
        }
        
        .splash-tagline {
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            color: var(--muted2);
            letter-spacing: 4px;
            margin-top: 8px
        }
        
        .splash-bar {
            width: 110px;
            height: 2px;
            background: var(--surface3);
            border-radius: 2px;
            margin: 16px auto 0;
            overflow: hidden
        }
        
        .splash-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            animation: splashLoad 1.8s ease forwards
        }
        
        @keyframes splashLoad {
            from {
                width: 0
            }
            to {
                width: 100%
            }
        }
        
        @keyframes splashIn {
            from {
                opacity: 0;
                transform: scale(.88) translateY(20px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }
        
        @keyframes splashOut {
            to {
                opacity: 0;
                visibility: hidden
            }
        }
        
        @keyframes splashPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(200, 245, 66, .45), 0 0 50px rgba(200, 245, 66, .3)
            }
            50% {
                box-shadow: 0 0 0 16px rgba(200, 245, 66, 0), 0 0 80px rgba(200, 245, 66, .6)
            }
        }
        /* ── MOBILE ── */
        
        @media(max-width:768px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: 56px 1fr auto;
                --player-h: auto;
                overflow: hidden;
            }
            .sidebar {
                grid-column: 1;
                grid-row: 1;
                flex-direction: row;
                align-items: center;
                overflow: hidden;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 0 10px;
                gap: 8px;
                height: 56px;
            }
            .logo-wrap {
                padding: 0;
                border-bottom: none;
                flex-shrink: 0
            }
            .logo {
                font-size: 1.2rem;
                letter-spacing: 3px
            }
            .logo-icon {
                width: 28px;
                height: 28px;
                border-radius: 7px
            }
            .logo-icon img {
                width: 28px;
                height: 28px
            }
            .sync-chip,
            .sidebar-nav,
            .sidebar-section-label,
            .artists-list,
            .user-bar {
                display: none!important
            }
            .search-wrap {
                flex: 1;
                padding: 0
            }
            .search-box input {
                font-size: .78rem;
                padding: 7px 9px 7px 30px
            }
            .fav-mobile-btn {
                display: block;
                background: none;
                border: none;
                font-size: 1.1rem;
                cursor: pointer;
                flex-shrink: 0;
                padding: 4px;
            }
            .mobile-back-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                background: none;
                border: none;
                color: var(--accent);
                font-size: 1.3rem;
                cursor: pointer;
                flex-shrink: 0;
                padding: 2px 5px;
                border-radius: 7px;
                transition: background .2s;
            }
            .mobile-back-btn:hover {
                background: var(--surface2)
            }
            .mobile-back-btn.hidden {
                display: none!important
            }
            .google-btn {
                display: none!important
            }
            .main {
                grid-column: 1;
                grid-row: 2;
                overflow-y: auto;
            }
            .main-header {
                padding: 10px 12px
            }
            .main-title {
                font-size: 1.15rem
            }
            .main-subtitle {
                display: none
            }
            .btn {
                padding: 5px 11px;
                font-size: .7rem
            }
            .artists-grid {
                grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
                gap: 10px;
                padding: 12px
            }
            .artist-hero {
                height: 160px;
                padding: 14px 12px
            }
            .artist-hero-img {
                width: 68px;
                height: 68px
            }
            .artist-hero-name {
                font-size: 1.45rem
            }
            .songs-section {
                padding: 0 12px 20px
            }
            .songs-table-header {
                display: none
            }
            .song-row {
                grid-template-columns: 1fr auto;
                gap: 5px;
                padding: 7px 7px
            }
            .song-num {
                display: none
            }
            .song-row-info img {
                width: 38px;
                height: 38px
            }
            .song-actions {
                opacity: 1
            }
            /* Mobile Player — stacked layout */
            .player {
                grid-column: 1;
                grid-row: 3;
                display: flex;
                flex-direction: column;
                padding: 10px 14px calc(12px + var(--safe-bottom)) 14px;
                gap: 8px;
                min-height: unset;
                grid-template-columns: unset;
            }
            .player-song {
                padding: 0;
                width: 100%;
                gap: 10px
            }
            .player-song-title {
                max-width: none;
                font-size: .8rem;
                flex: 1
            }
            .player-song-artist {
                display: none
            }
            .player-poster {
                width: 42px;
                height: 42px;
                border-radius: 9px
            }
            .player-center {
                width: 100%;
                gap: 5px
            }
            .player-progress {
                width: 100%;
                max-width: 100%;
                gap: 7px
            }
            .player-right {
                display: none!important
            }
            .volume-wrap {
                display: none!important
            }
            .play-btn {
                width: 42px;
                height: 42px;
                font-size: 1rem
            }
            .player-controls {
                gap: 10px
            }
            .queue-btn-player {
                font-size: .62rem;
                padding: 4px 8px
            }
            .time-label {
                font-size: .58rem;
                min-width: 22px;
                display: block
            }
            .queue-panel {
                width: 100%;
                bottom: 0
            }
            .download-panel {
                width: calc(100% - 28px);
                bottom: calc(100px + var(--safe-bottom));
                right: 14px;
                left: 14px;
            }
            .playlists-wrap {
                padding: 0 12px 20px
            }
            .playlist-grid {
                grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
                gap: 10px
            }
            .playlist-page-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 18px 14px;
                min-height: auto;
                gap: 12px
            }
            .playlist-page-title {
                font-size: 1.7rem
            }
            .playlist-song-list {
                padding: 10px 12px 20px
            }
        }
        /* Cache info bar */
        
        .cache-info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 14px;
            margin: 0 26px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 11px;
            font-size: .76rem;
            gap: 9px;
        }
        
        .cache-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 7px rgba(200, 245, 66, .55)
        }
        
        .clear-cache-btn {
            background: none;
            border: 1px solid rgba(255, 85, 85, .2);
            color: rgba(255, 85, 85, .6);
            font-family: 'Syne', sans-serif;
            font-size: .68rem;
            cursor: pointer;
            padding: 3px 9px;
            border-radius: 6px;
            transition: all .2s;
            white-space: nowrap;
        }
        
        .clear-cache-btn:hover {
            color: #ff5555;
            border-color: #ff5555
        }
        /* fav section label */
        
        .fav-section-label {
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 4px 9px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 7px;
        }
    </style>
</head>

        function queueStats() {

            const d = dlQueue.filter(i => i.status === 'done').length;
            return {
                total: dlQueue.length,
                q,
                a,
                d
            };
        }

        function updateDpStats() {
            const s = queueStats();
            document.getElementById('dpTotal').textContent = s.total;
            document.getElementById('dpActive').textContent = s.a;
            document.getElementById('dpDone').textContent = s.d;
            const badge = document.getElementById('dlQueueBadge');
            if (s.q + s.a > 0) {
                badge.textContent = s.a > 0 ? '⏳' : s.q;
                badge.classList.remove('hidden');

                badge.classList.add('hidden');

        function renderDpItem(item) {
            const container = document.getElementById('dpItems');
            // Remove empty state
            const empty = container.querySelector('.dp-empty');
            if (empty) empty.remove();
            // Check if already exists
            let el = document.getElementById('dpi_' + item.id);
            if (!el) {
                el = document.createElement('div');
                el.id = 'dpi_' + item.id;
                el.innerHTML = `
      <img src="${escH(item.song.poster)}" onerror="this.style.background='var(--surface3)'">
      <div class="dp-item-info">
        <div class="dp-item-title">${escH(item.song.title)}</div>
        <div class="dp-item-status"><div class="dp-dot"></div><span class="dp-status-text">${item.status}</span></div>
        <div class="dp-progress"><div class="dp-progress-bar" style="width:0%"></div></div>
      </div>
      <button class="dp-item-del" onclick="removeFromDlQueue('${item.id}')">✕</button>`;
                container.appendChild(el);
            }
            el.className = 'dp-item ' + (item.status === 'active' ? 'active' : item.status === 'done' ? 'done' : item.status === 'error' ? 'error' : '');
            el.querySelector('.dp-status-text').textContent = item.status === 'active' ? 'Downloading…' : item.status === 'done' ? 'Saved offline' : item.status === 'error' ? 'Failed' : item.status;
            el.querySelector('.dp-progress-bar').style.width = item.progress + '%';
        }

        function addToDlQueue(song) {
            if (isDownloaded(song.file)) {
                showToast('Already downloaded ✓');
                return;
            }
            if (dlQueue.some(i => i.song.file === song.file)) {
                showToast('Already in queue');
                return;
            }
            const id = 'dl_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5);
            const item = {
                id,
                song,
                status: 'queued',
                progress: 0
            };
            dlQueue.push(item);
            renderDpItem(item);
            updateDpStats();
            dpanel().classList.add('open');
            if (!dlBusy && !dlPaused) processQueue();
            return id;
        }

        async function processQueue() {
            if (dlBusy || dlPaused) return;
            const next = dlQueue.find(i => i.status === 'queued');
            if (!next) return;
            dlBusy = true;
            next.status = 'active';
            next.progress = 10;
            renderDpItem(next);
            updateDpStats();
            try {
                const url = 'songs/' + next.song.file;
                // Use fetch with progress simulation since Response doesn't expose body length on mobile always
                let cache;
                try {
                    cache = await caches.open(CACHE_NAME);
                } catch (e) {
                    throw new Error('Cache API not available');
                }

                // Try to get content-length for real progress
                const resp = await fetch(url, {
                    method: 'GET'
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);

                const contentLength = resp.headers.get('Content-Length');
                if (contentLength) {
                    const total = parseInt(contentLength, 10);
                    const reader = resp.body.getReader();
                    const chunks = [];
                    let received = 0;
                    while (true) {
                        const {
                            done,
                            value
                        } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        received += value.length;
                        next.progress = Math.round(10 + (received / total) * 85);
                        renderDpItem(next);
                    }
                    const blob = new Blob(chunks);
                    await cache.put(url, new Response(blob, {
                        headers: {
                            'Content-Type': 'audio/mpeg'
                        }
                    }));
                } else {
                    // No content-length — simulate progress
                    next.progress = 40;
                    renderDpItem(next);
                    const cloned = resp.clone();
                    await cache.put(url, resp);
                    next.progress = 80;
                    renderDpItem(next);
                }

                // Cache poster
                try {
                    const ir = await fetch(next.song.poster);
                    if (ir.ok) await cache.put(next.song.poster, ir);
                } catch (e) {}

                downloadedFiles.add(next.song.file);
                saveDownloaded();
                next.status = 'done';
                next.progress = 100;
                renderDpItem(next);
                updateDpStats();
                updatePlayerDlBtn();
                refreshSongRows();
                showToast('"' + next.song.title + '" saved ✓');
                // Auto-remove done items after 3s
                setTimeout(() => {
                    const el = document.getElementById('dpi_' + next.id);
                    if (el) {
                        el.style.opacity = '0';
                        el.style.transition = 'opacity .4s';
                        setTimeout(() => el.remove(), 400);
                    }
                    dlQueue = dlQueue.filter(i => i.id !== next.id);
                    updateDpStats();
                }, 3000);
            } catch (err) {
                next.status = 'error';
                next.progress = 0;
                renderDpItem(next);
                updateDpStats();
                showToast('Download failed — check connection');
                console.error('DL error:', err);
            }
            dlBusy = false;
            processQueue(); // process next
        }

        function loadPlaybackMemory() {
            try {
                const vol = parseFloat(localStorage.getItem('eq_volume') || '1');
                audio.volume = isNaN(vol) ? 1 : vol;
                volumeSlider.value = audio.volume;
                if (localStorage.getItem('eq_shuffle') === 'true') {
                    isShuffle = true;
                    document.getElementById('shuffleBtn').classList.add('on');
                }
                if (localStorage.getItem('eq_repeat') === 'true') {
                    isRepeat = true;
                    audio.loop = true;
                    document.getElementById('repeatBtn').classList.add('on');
                }
                const last = JSON.parse(localStorage.getItem('eq_last_song') || 'null');
                if (!last) return;
                currentSong = {
                    file: last.file,
                    title: last.title,
                    poster: last.poster
                };
                currentArtistKey = last.artistKey;
                if (last.artistKey && artists[last.artistKey]) {
                    currentSongs = artists[last.artistKey].songs;
                    currentIndex = currentSongs.findIndex(s => s.file === last.file);
                    if (currentIndex < 0) currentIndex = 0;
                }
                posterEl.src = last.poster;
                playerTitle.textContent = last.title;
                playerArtist.textContent = last.artistName || '';
                document.getElementById('fsPoster').src = last.poster;
                document.getElementById('fsTitle').textContent = last.title;
                document.getElementById('fsArtist').textContent = last.artistName || '';
                updatePlayerLikeBtn(last.file);
                updatePlayerDlBtn();
                getAudioSrc('songs/' + last.file).then(src => {
                    audio.src = src;
                    audio.addEventListener('loadedmetadata', () => {
                        if (last.currentTime > 0) audio.currentTime = Math.min(last.currentTime, audio.duration - 1);
                    }, {
                        once: true
                    });
                });
            } catch (e) {}
        }

        async function getAudioSrc(filePath) {
            try {
                const cache = await caches.open(CACHE_NAME);
                const match = await cache.match(filePath);
                if (match) {
                    const blob = await match.blob();
                    return URL.createObjectURL(blob);
                }
            } catch (e) {}
            return filePath;
        }

// ── PLAY SONG ──
async function playSong(index){
  if(!currentSongs[index])return;
  currentIndex=index;const song=currentSongs[index];currentSong=song;
  if(crossfadeTimer){clearInterval(crossfadeTimer);crossfadeTimer=null;}
  const targetVol=isMuted?0:(parseFloat(volumeSlider.value)||1);
  if(!audio.paused&&audio.currentTime>0){
    audioFade.src=audio.src;audioFade.currentTime=audio.currentTime;audioFade.volume=targetVol;
    audioFade.play().catch(()=>{});
    let fv=targetVol;crossfadeTimer=setInterval(()=>{fv=Math.max(0,fv-targetVol/15);audioFade.volume=fv;if(fv<=0){audioFade.pause();audioFade.src='';clearInterval(crossfadeTimer);crossfadeTimer=null;}},50);
  }
  const src=await getAudioSrc('songs/'+song.file);
  audio.src=src;audio.volume=0;
  posterEl.src=song.poster;playerTitle.textContent=song.title;
  const artistKey=currentArtistKey||Object.keys(artists).find(k=>artists[k].songs===currentSongs);
  const artistName=artistKey?artists[artistKey].name:(song.artistName||'');
  playerArtist.textContent=artistName;
  updatePlayerLikeBtn(song.file);updatePlayerDlBtn();
  audio.play().then(()=>{let v=0;const fi=setInterval(()=>{v=Math.min(targetVol,v+targetVol/15);audio.volume=v;if(v>=targetVol){audio.volume=targetVol;clearInterval(fi);}},50);}).catch(()=>{audio.volume=targetVol;});
  playBtn.textContent='⏸';
  document.getElementById('fsPoster').src=song.poster;document.getElementById('fsTitle').textContent=song.title;document.getElementById('fsArtist').textContent=artistName;document.getElementById('fsPlay').textContent='⏸';
  refreshSongRows();
  shuffleHistory.push(song.file);if(shuffleHistory.length>30)shuffleHistory=shuffleHistory.slice(-30);
  localStorage.setItem('eq_shuffle_history',JSON.stringify(shuffleHistory));
  const sh={file:song.file,title:song.title,poster:song.poster,artistKey:currentArtistKey,artistName};
  const ei=continueListening.findIndex(s=>s.file===song.file);if(ei>=0)continueListening.splice(ei,1);
  continueListening.unshift(sh);if(continueListening.length>10)continueListening=continueListening.slice(0,10);
  saveContinueListening();savePlaybackMemory();renderQueuePanel();
  if('mediaSession' in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:song.title,artist:artistName,artwork:[{src:song.poster,sizes:'512x512',type:'image/jpeg'}]});}
}

function togglePlay(){if(audio.paused){audio.play();playBtn.textContent='⏸';document.getElementById('fsPlay').textContent='⏸';}else{audio.pause();playBtn.textContent='▶';document.getElementById('fsPlay').textContent='▶';savePlaybackMemory();}}

function next(){
  if(queue.length>0){
    const s=queue.shift();localStorage.setItem('eq_queue',JSON.stringify(queue));currentSong=s;
    const ak=Object.keys(artists).find(k=>artists[k].songs.some(x=>x.file===s.file));
    const an=ak?artists[ak].name:(s.artistName||'');
    posterEl.src=s.poster;playerTitle.textContent=s.title;playerArtist.textContent=an;
    updatePlayerLikeBtn(s.file);updatePlayerDlBtn();
    getAudioSrc('songs/'+s.file).then(src=>{audio.src=src;audio.play();playBtn.textContent='⏸';});
    savePlaybackMemory();renderQueuePanel();return;
  }
  if(!currentSongs.length)return;
  if(isShuffle){
    const recent=new Set(shuffleHistory.slice(-Math.min(shuffleHistory.length,Math.floor(currentSongs.length*.5))));
    const avail=currentSongs.map((_,i)=>i).filter(i=>!recent.has(currentSongs[i].file));
    currentIndex=avail.length>0?avail[Math.floor(Math.random()*avail.length)]:Math.floor(Math.random()*currentSongs.length);
  }else{currentIndex=(currentIndex+1)%currentSongs.length;}
  playSong(currentIndex);
}

function previous(){
  if(!currentSongs.length)return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  currentIndex=(currentIndex-1+currentSongs.length)%currentSongs.length;playSong(currentIndex);
}

function playArtist(key){currentSongs=artists[key].songs;currentArtistKey=key;currentIndex=0;playSong(0);}
function shuffleArtist(key){currentSongs=artists[key].songs;currentArtistKey=key;currentIndex=Math.floor(Math.random()*currentSongs.length);playSong(currentIndex);}
window.playFromHistory=async(fileId,artistKey)=>{if(!artists[artistKey])return;currentArtistKey=artistKey;currentSongs=artists[artistKey].songs;const idx=currentSongs.findIndex(s=>s.file===fileId);if(idx>=0)await playSong(idx);};

// ── PROGRESS ──
let isDragging=false;
function startDrag(e){isDragging=true;updateProgressFromEvent(e);}
function updateProgressFromEvent(e){
  if(!isDragging||!audio.duration)return;
  const r=document.getElementById('progressTrack').getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  audio.currentTime=Math.max(0,Math.min(((cx-r.left)/r.width)*audio.duration,audio.duration));
}
window.addEventListener('mousemove',e=>{if(isDragging)updateProgressFromEvent(e);});
window.addEventListener('touchmove',e=>{if(isDragging)updateProgressFromEvent(e);},{passive:true});
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('touchend',()=>isDragging=false);

// ── QUEUE ──
function addToQueue(index){
  const song=currentSongs[index];if(!song)return;
  const artistKey=currentArtistKey||Object.keys(artists).find(k=>artists[k].songs===currentSongs);
  const artistName=artistKey?artists[artistKey].name:'';
  queue.push({...song,artistName});localStorage.setItem('eq_queue',JSON.stringify(queue));renderQueuePanel();showToast('Added to queue ✓');
}

function toggleShuffle(){isShuffle=!isShuffle;document.getElementById('shuffleBtn').classList.toggle('on',isShuffle);localStorage.setItem('eq_shuffle',isShuffle);showToast(isShuffle?'Shuffle on 🔀':'Shuffle off');}
function toggleRepeat(){isRepeat=!isRepeat;audio.loop=isRepeat;document.getElementById('repeatBtn').classList.toggle('on',isRepeat);}
function toggleMute(){if(isMuted){audio.volume=prevVol;volumeSlider.value=prevVol;isMuted=false;}else{prevVol=audio.volume||1;audio.volume=0;volumeSlider.value=0;isMuted=true;}}

function toggleQueuePanel(){queuePanelOpen=!queuePanelOpen;document.getElementById('queuePanel').classList.toggle('open',queuePanelOpen);document.getElementById('queueToggleBtn').classList.toggle('active',queuePanelOpen);if(queuePanelOpen)renderQueuePanel();}

function renderQueuePanel(){
  const body=document.getElementById('queuePanelBody');if(!body)return;
  let html='';
  if(currentSong){html+=`<div class="qp-section">Now Playing</div><div class="qp-item"><img src="${escH(currentSong.poster)}" onerror="this.style.background='#16162a'"><div class="qp-item-info"><div class="qp-item-title" style="color:var(--accent)">${escH(currentSong.title)}</div><div class="qp-item-artist">${escH(playerArtist.textContent)}</div></div></div>`;}
  if(queue.length>0){html+=`<div class="qp-section" style="margin-top:7px">Up Next (${queue.length})</div>`;queue.forEach((s,i)=>{html+=`<div class="qp-item" onclick="playFromQueue(${i})"><img src="${escH(s.poster)}" onerror="this.style.background='#16162a'"><div class="qp-item-info"><div class="qp-item-title">${escH(s.title)}</div><div class="qp-item-artist">${escH(s.artistName||'')}</div></div><button class="qp-item-rm" onclick="event.stopPropagation();removeFromQueue(${i})">✕</button></div>`;});html+=`<div style="padding:8px 14px"><button onclick="clearQueue()" style="background:none;border:1px solid rgba(255,85,85,.18);color:rgba(255,85,85,.55);font-family:'Syne',sans-serif;font-size:.68rem;cursor:pointer;padding:4px 11px;border-radius:6px;width:100%">Clear Queue</button></div>`;}
  if(currentSong&&currentArtistKey&&currentSongs.length>1){const nl=currentSongs.slice(currentIndex+1,currentIndex+5);if(nl.length>0){html+=`<div class="qp-section" style="margin-top:7px">Next from ${escH(currentArtistKey&&artists[currentArtistKey]?artists[currentArtistKey].name:'')}</div>`;nl.forEach((s,i)=>{html+=`<div class="qp-item" onclick="playSong(${currentIndex+1+i})"><img src="${escH(s.poster)}" onerror="this.style.background='#16162a'"><div class="qp-item-info"><div class="qp-item-title">${escH(s.title)}</div><div class="qp-item-artist">${escH(currentArtistKey&&artists[currentArtistKey]?artists[currentArtistKey].name:'')}</div></div></div>`;});}}
  if(!currentSong&&!queue.length){html=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 20px;color:var(--muted2);gap:9px;font-size:.8rem"><div style="font-size:2rem;opacity:.35">☰</div><p>Your queue is empty</p></div>`;}
  body.innerHTML=html;
}

window.playFromQueue=(i)=>{if(!queue[i])return;const songs=queue.splice(0,i+1);const s=songs[songs.length-1];localStorage.setItem('eq_queue',JSON.stringify(queue));currentSong=s;const ak=Object.keys(artists).find(k=>artists[k].songs.some(x=>x.file===s.file));const an=ak?artists[ak].name:(s.artistName||'');posterEl.src=s.poster;playerTitle.textContent=s.title;playerArtist.textContent=an;updatePlayerLikeBtn(s.file);updatePlayerDlBtn();getAudioSrc('songs/'+s.file).then(src=>{audio.src=src;audio.play();playBtn.textContent='⏸';});savePlaybackMemory();renderQueuePanel();};
window.removeFromQueue=(i)=>{queue.splice(i,1);localStorage.setItem('eq_queue',JSON.stringify(queue));renderQueuePanel();showToast('Removed from queue');};
window.clearQueue=()=>{queue=[];localStorage.setItem('eq_queue',JSON.stringify(queue));renderQueuePanel();showToast('Queue cleared');};

// ── LIKES ──
function toggleLike(fileId,rowIndex){if(likedSongs.has(fileId))likedSongs.delete(fileId);else likedSongs.add(fileId);saveLiked();if(rowIndex!==undefined)refreshSongRows();updatePlayerLikeBtn(fileId);}
window.togglePlayerLike=()=>{if(!currentSong)return;toggleLike(currentSong.file);}
function updatePlayerLikeBtn(f){const btn=document.getElementById('playerLikeBtn');btn.textContent=likedSongs.has(f)?'❤':'♡';btn.classList.toggle('liked',likedSongs.has(f));}

function showLikedSongs(){
  setNavActive('navFav');setMobileBack(true);
  const liked=[];
  for(let key in artists)artists[key].songs.forEach(s=>{if(likedSongs.has(s.file))liked.push({...s,artistName:artists[key].name,artistKey:key});});
  document.getElementById('mainArea').innerHTML=`
    <div class="main-header">
      <div><div class="main-title">Favorites</div><div class="main-subtitle">${liked.length} LIKED</div></div>
    </div>
    <div class="songs-section" style="padding-top:18px">
      <div class="fav-section-label">❤ Liked Songs</div>
      ${liked.length===0?'<div class="empty-state"><div class="emoji">🎵</div><p>No favorites yet. Like songs to see them here.</p></div>'
        :`<div id="songsList">${liked.map((s,i)=>`<div class="song-row" onclick="playLikedSong(${i})"><div class="song-num">${i+1}</div><div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy"><div class="song-row-text"><h4>${escH(s.title)}</h4><p>${escH(s.artistName)}</p></div></div><div class="song-actions"><button class="like-btn liked" onclick="event.stopPropagation();toggleLikeFav('${escA(s.file)}',this)">❤</button><button class="dl-btn${isDownloaded(s.file)?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escA(s.file)}')">${isDownloaded(s.file)?'✓':'⬇'}</button></div></div>`).join('')}</div>`}
    </div>`;
  window.__likedList=liked;
}
window.playLikedSong=(i)=>{const s=window.__likedList[i];currentSongs=window.__likedList;currentArtistKey=null;currentIndex=i;playSong(i);};
window.toggleLikeFav=(fileId,btn)=>{likedSongs.delete(fileId);saveLiked();btn.closest('.song-row').style.opacity='0';btn.closest('.song-row').style.transition='opacity .3s';setTimeout(()=>showLikedSongs(),300);};

// ── SEARCH ──
function globalSearch(){
  const q=document.getElementById('searchBar').value.toLowerCase().trim();
  if(!q){loadArtists();return;}
  setMobileBack(false);
  let artistHtml='',songHtml='',ac=0,sc=0;
  for(let key in artists){
    const a=artists[key];
    if(a.name.toLowerCase().includes(q)){artistHtml+=`<div class="artist-card" onclick="openArtist('${key}')"><img src="${a.image}"><div class="artist-card-overlay"><div class="artist-card-name">${a.name}</div><div class="artist-card-count">${a.songs.length} songs</div></div><button class="card-play-btn" onclick="event.stopPropagation();playArtist('${key}')">▶</button></div>`;ac++;}
    a.songs.forEach((s,i)=>{if(s.title.toLowerCase().includes(q)){songHtml+=`<div class="song-row" style="background:var(--surface);border-radius:12px;margin-bottom:4px" onclick="openArtistAndPlay('${key}',${i})"><div class="song-num">${sc+1}</div><div class="song-row-info"><img src="${s.poster}" style="width:42px;height:42px;border-radius:9px;object-fit:cover;flex-shrink:0"><div class="song-row-text"><h4>${escH(s.title)}</h4><p>${escH(a.name)}</p></div></div><div class="song-actions" style="opacity:1"><button class="like-btn${likedSongs.has(s.file)?' liked':''}" onclick="event.stopPropagation();toggleLike('${escA(s.file)}')">${likedSongs.has(s.file)?'❤':'♡'}</button><button class="dl-btn${isDownloaded(s.file)?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escA(s.file)}')">${isDownloaded(s.file)?'✓':'⬇'}</button></div></div>`;sc++;}});
  }
  const total=ac+sc;
  document.getElementById('mainArea').innerHTML=`
    <div class="main-header"><div><div class="main-title">Search</div><div class="main-subtitle">${total} RESULTS FOR "${q.toUpperCase()}"</div></div></div>
    ${ac>0?`<div style="padding:18px 26px 0"><div style="font-family:'Space Mono',monospace;font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Artists</div><div class="artists-grid" style="padding:0">${artistHtml}</div></div>`:''}
    ${sc>0?`<div class="songs-section" style="padding-top:18px"><div style="font-family:'Space Mono',monospace;font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Songs</div>${songHtml}</div>`:''}
    ${!total?'<div class="empty-state"><div class="emoji">🔍</div><p>No results found.</p></div>':''}`;
}
function openArtistAndPlay(key,index){currentSongs=artists[key].songs;currentArtistKey=key;openArtist(key);playSong(index);}

// ── FULLSCREEN ──
window.openFullPlayer=()=>{if(!currentSong)return;document.getElementById('fullscreenPlayer').style.display='flex';}
window.closeFullPlayer=()=>{document.getElementById('fullscreenPlayer').style.display='none';}

// ── AUDIO EVENTS ──
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  progressBar.style.width=(audio.currentTime/audio.duration*100)+'%';
  document.getElementById('currentTime').textContent=fmt(audio.currentTime);
  document.getElementById('duration').textContent=fmt(audio.duration);
  if(Math.floor(audio.currentTime)%15===0&&audio.currentTime>0)savePlaybackMemory();
});
audio.addEventListener('ended',()=>{if(!isRepeat)next();});
audio.addEventListener('play',()=>{playBtn.textContent='⏸';const fp=document.getElementById('fsPlay');if(fp)fp.textContent='⏸';});
audio.addEventListener('pause',()=>{playBtn.textContent='▶';const fp=document.getElementById('fsPlay');if(fp)fp.textContent='▶';savePlaybackMemory();});
volumeSlider.addEventListener('input',()=>{audio.volume=+volumeSlider.value;isMuted=audio.volume===0;localStorage.setItem('eq_volume',audio.volume);});
window.addEventListener('beforeunload',()=>savePlaybackMemory());

// ── MEDIA SESSION ──
if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',()=>audio.play());
  navigator.mediaSession.setActionHandler('pause',()=>audio.pause());
  navigator.mediaSession.setActionHandler('nexttrack',()=>next());
  navigator.mediaSession.setActionHandler('previoustrack',()=>previous());
  navigator.mediaSession.setActionHandler('seekto',(d)=>{if(d.seekTime)audio.currentTime=d.seekTime;});
}



// ── UTILS ──
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function setMobileBack(show){const b=document.getElementById('mobileBackBtn');if(b)b.classList.toggle('hidden',!show);}
function setNavActive(id){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const e=document.getElementById(id);if(e)e.classList.add('active');}
function setSidebarActive(key){document.querySelectorAll('.artist-item').forEach(e=>e.classList.remove('active'));const e=document.getElementById('sb_'+key);if(e){e.classList.add('active');e.scrollIntoView({block:'nearest'});}}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.style.opacity='0',2000);}

// ── EXPOSE GLOBALS ──
window.playSong=playSong;window.next=next;window.previous=previous;
window.togglePlay=togglePlay;window.toggleShuffle=toggleShuffle;window.toggleRepeat=toggleRepeat;window.toggleMute=toggleMute;
window.toggleQueuePanel=toggleQueuePanel;window.addToQueue=addToQueue;
window.openArtist=openArtist;window.loadArtists=loadArtists;window.showLikedSongs=showLikedSongs;window.showDownloads=showDownloads;window.showPlaylists=showPlaylists;
window.playArtist=playArtist;window.shuffleArtist=shuffleArtist;window.toggleLike=toggleLike;window.globalSearch=globalSearch;

// ── INIT ──
buildSidebar();
loadArtists();

loadPlaybackMemory();
renderQueuePanel();

// Check if running in PWA / check Cache API availability
if(!('caches' in window)){
  console.warn('Cache API not available. Downloads will not work.');
  document.querySelectorAll('.dl-btn,.player-dl-btn,.dl-queue-btn').forEach(el=>el.style.display='none');
}
    </script>
</body>

</html>
