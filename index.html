<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
         :root {
            --bg: #07070f;
            --surface: #0d0d1c;
            --surface2: #121224;
            --surface3: #1a1a30;
            --surface4: #22223e;
            --accent: #c8f542;
            --accent2: #a8d930;
            --accent3: rgba(200, 245, 66, 0.10);
            --accent-glow: rgba(200, 245, 66, 0.25);
            --text: #f0f0f8;
            --muted: #3e3e62;
            --muted2: #6a6a9a;
            --border: rgba(200, 245, 66, 0.07);
            --border2: rgba(255, 255, 255, 0.05);
            --player-h: 100px;
            --sidebar-w: 270px;
            --glow: 0 0 60px rgba(200, 245, 66, 0.18);
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.85);
            --radius: 18px;
            --radius-sm: 10px;
        }
        
        html,
        body {
            height: 100%;
            overflow: hidden
        }
        
        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-rows: 1fr var(--player-h);
            height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: .35;
        }
        
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(200, 245, 66, 0.04) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
            z-index: 0;
            animation: ambientFloat 12s ease-in-out infinite alternate;
        }
        
        @keyframes ambientFloat {
            from {
                transform: translate(0, 0) scale(1)
            }
            to {
                transform: translate(120px, 80px) scale(1.3)
            }
        }
        
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: splashOut 0.6s cubic-bezier(.4, 0, .2, 1) 2.4s forwards;
        }
        
        .splash-inner {
            text-align: center;
            animation: splashIn 1.1s cubic-bezier(.16, 1, .3, 1) both
        }
        
        .splash-logo-wrap {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            box-shadow: 0 0 0 0 rgba(200, 245, 66, .6);
            animation: splashPulse 1.8s ease infinite;
            position: relative;
        }
        
        .splash-logo-wrap::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1.5px solid rgba(200, 245, 66, .25);
            animation: ringExpand 1.8s ease infinite;
        }
        
        .splash-logo-wrap::after {
            content: '';
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            border: 1px solid rgba(200, 245, 66, .12);
            animation: ringExpand 1.8s ease infinite 0.3s;
        }
        
        @keyframes ringExpand {
            0% {
                transform: scale(0.9);
                opacity: 1
            }
            100% {
                transform: scale(1.4);
                opacity: 0
            }
        }
        
        .splash-logo-wrap img {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            object-fit: cover
        }
        
        .splash-name {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 10px;
            color: var(--text);
            text-transform: uppercase;
        }
        
        .splash-name span {
            color: var(--accent)
        }
        
        .splash-tagline {
            font-family: 'Space Mono', monospace;
            font-size: .62rem;
            color: var(--muted2);
            letter-spacing: 4px;
            margin-top: 10px;
        }
        
        .splash-bar {
            width: 120px;
            height: 2px;
            background: var(--surface3);
            border-radius: 2px;
            margin: 18px auto 0;
            overflow: hidden;
        }
        
        .splash-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            animation: splashLoad 2s ease forwards;
        }
        
        @keyframes splashLoad {
            from {
                width: 0
            }
            to {
                width: 100%
            }
        }
        
        @keyframes splashIn {
            from {
                opacity: 0;
                transform: scale(.88) translateY(24px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }
        
        @keyframes splashOut {
            to {
                opacity: 0;
                visibility: hidden
            }
        }
        
        @keyframes splashPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(200, 245, 66, .5), 0 0 60px rgba(200, 245, 66, .4)
            }
            50% {
                box-shadow: 0 0 0 18px rgba(200, 245, 66, 0), 0 0 100px rgba(200, 245, 66, .7)
            }
        }
        
        .sidebar {
            grid-row: 1;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(200, 245, 66, .3), transparent);
        }
        
        .logo-wrap {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 11px;
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: 5px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 11px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(200, 245, 66, .3);
        }
        
        .logo-icon img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 11px
        }
        
        .logo-text {
            color: var(--text)
        }
        
        .logo-text b {
            color: var(--accent)
        }
        
        .sync-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Space Mono', monospace;
            font-size: .56rem;
            color: var(--muted2);
            padding: 3px 9px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        
        .sync-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted)
        }
        
        .sync-dot.synced {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(200, 245, 66, .6)
        }
        
        .sync-dot.syncing {
            background: #f5c842;
            animation: blink .7s infinite
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: .3
            }
        }
        
        .search-wrap {
            padding: 14px 16px 10px;
            flex-shrink: 0
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center
        }
        
        .search-icon {
            position: absolute;
            left: 12px;
            color: var(--muted);
            font-size: .9rem;
            pointer-events: none
        }
        
        .search-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 9px 12px 9px 36px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .82rem;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        
        .search-box input:focus {
            border-color: rgba(200, 245, 66, .4);
            background: var(--surface3)
        }
        
        .search-box input::placeholder {
            color: var(--muted)
        }
        
        .sidebar-nav {
            padding: 4px 12px 6px;
            flex-shrink: 0
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 9px 12px;
            border-radius: 11px;
            background: none;
            border: none;
            color: var(--muted2);
            font-family: 'Syne', sans-serif;
            font-size: .84rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .18s;
            text-align: left;
            margin-bottom: 2px;
        }
        
        .nav-btn:hover {
            background: var(--surface2);
            color: var(--text)
        }
        
        .nav-btn.active {
            background: var(--accent3);
            color: var(--accent);
            border: 1px solid rgba(200, 245, 66, .15);
            box-shadow: inset 0 0 20px rgba(200, 245, 66, .04);
        }
        
        .nav-icon {
            font-size: .9rem;
            width: 18px;
            flex-shrink: 0
        }
        
        .sidebar-section-label {
            padding: 12px 24px 6px;
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
        }
        
        .artists-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .artists-list::-webkit-scrollbar {
            width: 3px
        }
        
        .artists-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 3px
        }
        
        .artist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            border-radius: 11px;
            cursor: pointer;
            transition: background .15s;
        }
        
        .artist-item:hover {
            background: var(--surface2)
        }
        
        .artist-item.active {
            background: var(--surface3)
        }
        
        .artist-item img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0
        }
        
        .artist-item-name {
            font-size: .78rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .user-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .user-bar img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--accent);
            flex-shrink: 0;
        }
        
        .user-bar-info {
            flex: 1;
            overflow: hidden
        }
        
        .user-bar-name {
            font-size: .78rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .user-bar-email {
            font-size: .66rem;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .signout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: .68rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .signout-btn:hover {
            color: #ff5555;
            border-color: #ff5555
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: calc(100% - 24px);
            margin: 12px;
            padding: 11px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        
        .google-btn:hover {
            border-color: rgba(200, 245, 66, .4);
            background: var(--surface3);
            transform: translateY(-1px);
        }
        
        .main {
            grid-column: 2;
            grid-row: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
            background: var(--bg);
            position: relative;
        }
        
        .main::-webkit-scrollbar {
            width: 4px
        }
        
        .main::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 4px
        }
        
        .main-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(7, 7, 15, .92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            padding: 18px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .main-title {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: 1px
        }
        
        .main-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: .63rem;
            color: var(--muted2);
            margin-top: 3px;
            letter-spacing: 1px
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted2);
        }
        
        .btn-outline:hover {
            border-color: rgba(200, 245, 66, .4);
            color: var(--accent)
        }
        
        .btn-accent {
            background: var(--accent);
            color: #000
        }
        
        .btn-accent:hover {
            background: var(--accent2);
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(200, 245, 66, .35);
        }
        
        .artist-hero {
            position: relative;
            height: 240px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 28px 30px;
        }
        
        .artist-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            filter: blur(3px) brightness(.3);
            transform: scale(1.08);
        }
        
        .artist-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, rgba(7, 7, 15, .55) 60%, transparent 100%);
        }
        
        .artist-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            gap: 22px;
            width: 100%;
        }
        
        .artist-hero-img {
            width: 110px;
            height: 110px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid rgba(200, 245, 66, .3);
            box-shadow: 0 0 50px rgba(0, 0, 0, .9), 0 0 30px rgba(200, 245, 66, .1);
            flex-shrink: 0;
        }
        
        .artist-hero-tag {
            font-family: 'Space Mono', monospace;
            font-size: .56rem;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 7px;
        }
        
        .artist-hero-name {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1
        }
        
        .artist-hero-count {
            font-size: .76rem;
            color: var(--muted2);
            margin-top: 7px
        }
        
        .artist-hero-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 12px
        }
        
        .continue-strip {
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(200, 245, 66, 0.03) 0%, rgba(200, 245, 66, 0.01) 100%);
            border-bottom: 1px solid var(--border);
        }
        
        .continue-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
        }
        
        .continue-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: rgba(200, 245, 66, 0.2) transparent;
            padding-bottom: 8px;
        }
        
        .continue-scroll::-webkit-scrollbar {
            height: 4px;
        }
        
        .continue-scroll::-webkit-scrollbar-thumb {
            background: rgba(200, 245, 66, 0.2);
            border-radius: 2px;
        }
        
        .continue-card {
            flex-shrink: 0;
            width: 140px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--surface2);
            border: 1px solid var(--border);
            transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
        }
        
        .continue-card:hover {
            transform: translateY(-4px);
            border-color: rgba(200, 245, 66, 0.3);
            box-shadow: 0 8px 24px rgba(200, 245, 66, 0.15);
        }
        
        .continue-card img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            background: var(--surface3);
        }
        
        .continue-card-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        
        .continue-card-title {
            font-size: 0.72rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        
        .continue-card-artist {
            font-size: 0.62rem;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            padding: 26px 30px;
        }
        
        .artist-card {
            cursor: pointer;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: transform .28s cubic-bezier(.34, 1.56, .64, 1), box-shadow .28s, border-color .28s;
            position: relative;
            aspect-ratio: 1;
        }
        
        .artist-card:hover {
            transform: translateY(-7px) scale(1.02);
            box-shadow: 0 24px 60px rgba(0, 0, 0, .7), 0 0 40px rgba(200, 245, 66, .1);
            border-color: rgba(200, 245, 66, .3);
        }
        
        .artist-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .45s;
        }
        
        .artist-card:hover img {
            transform: scale(1.08)
        }
        
        .artist-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(7, 7, 15, .95) 40%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
        }
        
        .artist-card-name {
            font-size: .82rem;
            font-weight: 700;
            letter-spacing: .5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .artist-card-count {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            color: var(--muted2);
            margin-top: 3px
        }
        
        .card-play-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            color: #000;
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: scale(.65) translateY(8px);
            transition: all .22s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 6px 24px rgba(200, 245, 66, .45);
        }
        
        .artist-card:hover .card-play-btn {
            opacity: 1;
            transform: scale(1) translateY(0)
        }
        
        .songs-section {
            padding: 0 30px 30px
        }
        
        .songs-table-header {
            display: grid;
            grid-template-columns: 52px 1fr auto;
            padding: 0 14px 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 6px;
        }
        
        .th {
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }
        
        .song-row {
            display: grid;
            grid-template-columns: 52px 1fr auto;
            align-items: center;
            padding: 8px 14px;
            border-radius: 13px;
            cursor: pointer;
            transition: background .15s;
            gap: 4px;
        }
        
        .song-row:hover {
            background: var(--surface)
        }
        
        .song-row.playing {

        const CACHE_NAME = 'equify-offline-v1';
        let downloadedFiles = new Set();

        function loadDownloadedList() {
            try {
                downloadedFiles = new Set(JSON.parse(localStorage.getItem('eq_downloaded') || '[]'));
            } catch (e) {}
        }

        function saveDownloadedList() {
            localStorage.setItem('eq_downloaded', JSON.stringify([...downloadedFiles]));
        }

        function isDownloaded(fileId) {
            return downloadedFiles.has(fileId);
        }

        async function downloadSong(song, btn) {
            const url = 'songs/' + song.file;
            if (isDownloaded(song.file)) {
                showToast('Already downloaded ✓');
                return;
            }
            if (btn) {
                btn.classList.add('downloading');
                btn.textContent = '⏳';
            }
            try {
                const cache = await caches.open(CACHE_NAME);
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network error');
                await cache.put(url, response.clone());
                try {
                    const ir = await fetch(song.poster);
                    if (ir.ok) await cache.put(song.poster, ir.clone());
                } catch (e) {}
                downloadedFiles.add(song.file);
                saveDownloadedList();
                if (btn) {
                    btn.classList.remove('downloading');
                    btn.classList.add('downloaded');
                    btn.textContent = '✓';
                }
                updatePlayerDlBtn();
                refreshSongRows();
                showToast(`"${song.title}" saved for offline ✓`);
            } catch (err) {
                if (btn) {
                    btn.classList.remove('downloading');
                    btn.textContent = '⬇';
                }
                showToast('Download failed — check connection');
            }
        }

        async function removeCachedSong(fileId) {
            try {
                const cache = await caches.open(CACHE_NAME);
                await cache.delete('songs/' + fileId);
                downloadedFiles.delete(fileId);
                saveDownloadedList();
                refreshSongRows();
                updatePlayerDlBtn();
                showToast('Removed from offline ✓');
            } catch (e) {
                showToast('Could not remove');
            }
        }

        async function getDownloadedCount() {
            try {
                const cache = await caches.open(CACHE_NAME);
                const keys = await cache.keys();
                return keys.filter(k => k.url.includes('.mp3')).length;
            } catch (e) {
                return 0;
            }
        }

        function updatePlayerDlBtn() {
            const btn = document.getElementById('playerDlBtn');
            const badge = document.getElementById('offlineBadge');
            if (!currentSong) return;
            const dl = isDownloaded(currentSong.file);
            btn.classList.toggle('downloaded', dl);
            btn.textContent = dl ? '✓' : '⬇';
            btn.title = dl ? 'Downloaded — click to remove' : 'Download for offline';
            badge.classList.toggle('visible', dl);
        }

        window.downloadCurrentSong = async() => {
            if (!currentSong) return;
            if (isDownloaded(currentSong.file)) {
                if (confirm(`Remove "${currentSong.title}" from offline cache?`)) {
                    await removeCachedSong(currentSong.file);
                }
                return;
            }
            const btn = document.getElementById('playerDlBtn');
            btn.textContent = '⏳';
            await downloadSong(currentSong, null);
            updatePlayerDlBtn();
        };

        async function showDownloads() {
            setNavActive('navDownloads');
            setMobileBack(true);
            const count = await getDownloadedCount();
            const dlSongs = [];
            for (let key in artists) artists[key].songs.forEach(s => {
                if (isDownloaded(s.file)) dlSongs.push({...s,
                    artistName: artists[key].name,
                    artistKey: key
                });
            });
            document.getElementById('mainArea').innerHTML = `
    <div class="main-header">
      <div><div class="main-title">Downloads</div><div class="main-subtitle">${count} CACHED FOR OFFLINE</div></div>
      ${count>0?`<div class="header-actions"><button class="btn btn-outline" onclick="clearAllDownloads()">🗑 Clear All</button></div>`:''}
    </div>
    <div class="songs-section" style="padding-top:20px">
    ${dlSongs.length===0
      ?`<div class="empty-state"><div class="emoji">⬇</div><p>No songs downloaded yet.</p><p style="font-size:.8rem;margin-top:8px;color:var(--muted)">Tap ⬇ on any song to save it for offline.</p></div>`
      :`<div>${dlSongs.map((s,i)=>`
        <div class="song-row" onclick="playDownloadedSong(${i})">
          <div class="song-num">${i+1}</div>
          <div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy"><div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div></div>
          <div class="song-actions" style="opacity:1">
            <button class="like-btn" style="color:var(--accent);font-size:.75rem;border:1px solid rgba(200,245,66,.2);background:var(--accent3);border-radius:6px;padding:3px 7px;font-family:'Space Mono',monospace" onclick="event.stopPropagation()">⬇ Saved</button>
            <button class="queue-btn" onclick="event.stopPropagation();removeCachedSong('${escAttr(s.file)}')" title="Remove">✕</button>
          </div>
        </div>`).join('')}</div>`}
    </div>`;
  window.__dlSongs=dlSongs;
}

window.playDownloadedSong=(i)=>{
  if(!window.__dlSongs)return;
  const s=window.__dlSongs[i];
  currentSongs=window.__dlSongs;currentArtistKey=null;currentIndex=i;
  audio.src='songs/'+s.file;posterEl.src=s.poster;playerTitle.textContent=s.title;playerArtist.textContent=s.artistName||'';
  updatePlayerLikeBtn(s.file);updatePlayerDlBtn();audio.play();playBtn.textContent='⏸';
};

window.clearAllDownloads=async()=>{
  if(!confirm('Remove all downloaded songs from offline cache?'))return;
  try{await caches.delete(CACHE_NAME);downloadedFiles.clear();saveDownloadedList();refreshSongRows();updatePlayerDlBtn();showToast('All downloads cleared');showDownloads();}
  catch(e){showToast('Error clearing cache');}
};

async function getAudioSrc(filePath){
  try{const cache=await caches.open(CACHE_NAME);const match=await cache.match(filePath);if(match){const blob=await match.blob();return URL.createObjectURL(blob);}}catch(e){}
  return filePath;
}

function loadState(){

  try{playlists=JSON.parse(localStorage.getItem('eq_playlists')||'{}');}catch(e){}

}

function saveLiked(){localStorage.setItem('eq_liked',JSON.stringify([...likedSongs]));if(window._saveToCloud)window._saveToCloud();}
function savePlaylists(){localStorage.setItem('eq_playlists',JSON.stringify(playlists));if(window._saveToCloud)window._saveToCloud();}

function savePlaybackMemory(){
  if(!currentSong)return;
  localStorage.setItem('eq_last_song',JSON.stringify({file:currentSong.file,title:currentSong.title,poster:currentSong.poster,artistKey:currentArtistKey,artistName:playerArtist.textContent,currentTime:audio.currentTime,volume:audio.volume,isShuffle,isRepeat}));
}

function loadPlaybackMemory(){
  try{
    const vol=parseFloat(localStorage.getItem('eq_volume')||'1');audio.volume=isNaN(vol)?1:vol;volumeSlider.value=audio.volume;
    if(localStorage.getItem('eq_shuffle')==='true'){isShuffle=true;document.getElementById('shuffleBtn').classList.add('on');}
    if(localStorage.getItem('eq_repeat')==='true'){isRepeat=true;audio.loop=true;document.getElementById('repeatBtn').classList.add('on');}
    const lastSong=JSON.parse(localStorage.getItem('eq_last_song')||'null');
    if(!lastSong)return;
    currentSong={file:lastSong.file,title:lastSong.title,poster:lastSong.poster};
    currentArtistKey=lastSong.artistKey;
    if(lastSong.artistKey&&artists[lastSong.artistKey]){currentSongs=artists[lastSong.artistKey].songs;currentIndex=currentSongs.findIndex(s=>s.file===lastSong.file);if(currentIndex<0)currentIndex=0;}
    posterEl.src=lastSong.poster;playerTitle.textContent=lastSong.title;playerArtist.textContent=lastSong.artistName||'';
    document.getElementById('fsPoster').src=lastSong.poster;document.getElementById('fsTitle').textContent=lastSong.title;document.getElementById('fsArtist').textContent=lastSong.artistName||'';
    updatePlayerLikeBtn(lastSong.file);updatePlayerDlBtn();
    getAudioSrc('songs/'+lastSong.file).then(src=>{audio.src=src;audio.addEventListener('loadedmetadata',()=>{if(lastSong.currentTime>0)audio.currentTime=Math.min(lastSong.currentTime,audio.duration-1);},{once:true});});
  }catch(e){}
}

        <div class="playlist-page-actions">

window.playFromPlaylist=(plId,i)=>{
  const pl=playlists[plId];if(!pl)return;
  const songs=pl.songs||[];if(!songs[i])return;
  currentSongs=songs.map(s=>({...s}));currentArtistKey=null;currentIndex=i;
  playSong(i);
};

window.playPlaylistById=(id)=>{
  const pl=playlists[id];if(!pl||!pl.songs||!pl.songs.length)return;
  currentSongs=pl.songs.map(s=>({...s}));currentArtistKey=null;currentIndex=0;
  playSong(0);showToast(`Playing ${pl.name}`);
};

window.shufflePlaylistById=(id)=>{
  const pl=playlists[id];if(!pl||!pl.songs||!pl.songs.length)return;
  currentSongs=pl.songs.map(s=>({...s}));currentArtistKey=null;
  currentIndex=Math.floor(Math.random()*currentSongs.length);
  playSong(currentIndex);showToast(`Shuffling ${pl.name}`);
};

window.deletePlaylist=(id)=>{
  if(!confirm(`Delete playlist "${playlists[id]?.name}"?`))return;
  delete playlists[id];savePlaylists();showToast('Playlist deleted');
  if(currentPlaylistId===id)currentPlaylistId=null;
  showPlaylists();
};

window.removeSongFromPlaylist=(plId,i)=>{
  if(!playlists[plId])return;
  playlists[plId].songs.splice(i,1);savePlaylists();openPlaylist(plId);showToast('Song removed');
};

function addSongToPlaylistById(song,artistName,plId){
  if(!playlists[plId])return;
  const already=playlists[plId].songs.some(s=>s.file===song.file);
  if(already){showToast('Already in playlist');return;}
  playlists[plId].songs.push({...song,artistName,addedAt:Date.now()});
  savePlaylists();showToast(`Added to "${playlists[plId].name}" ✓`);
}

// Continue Listening Swipe Functionality
document.addEventListener('DOMContentLoaded',()=>{
  document.addEventListener('touchstart',(e)=>{
    const scrollEls=document.querySelectorAll('.continue-scroll');
    for(let el of scrollEls){
      if(el.contains(e.target)){
        el._touchStart=e.touches[0].clientX;
        el._touchStartTime=Date.now();
      }
    }
  },false);
  
  document.addEventListener('touchend',(e)=>{
    const scrollEls=document.querySelectorAll('.continue-scroll');
    for(let el of scrollEls){
      if(el.contains(e.target)&&el._touchStart!=null){
        const touchEnd=e.changedTouches[0].clientX;
        const diff=el._touchStart-touchEnd;
        const timeDiff=Date.now()-el._touchStartTime;
        if(Math.abs(diff)>30&&timeDiff<300){
          const scrollDist=Math.sign(diff)*120;
          el.scrollBy({left:scrollDist,behavior:'smooth'});
        }
        el._touchStart=null;
      }
    }
  },false);
});

    document.getElementById('mobileAuthName').textContent=user.displayName||'User';
    document.getElementById('mobileAuthEmail').textContent=user.email||'—';
    const photoURL=user.photoURL||'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22%3E%3Crect width=%2248%22 height=%2248%22 fill=%22%230d0d1c%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2224%22 fill=%22%233e3e62%22%3E👤%3C/text%3E%3C/svg%3E';
    document.getElementById('mobileAuthAvatar').src=photoURL;

function getRecommendations(artistKey,currentFile){
  if(!artistKey||!artists[artistKey])return[];
  const pool=artists[artistKey].songs.filter(s=>s.file!==currentFile);
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  return shuffled.slice(0,8).map(s=>({...s,artistName:artists[artistKey].name,artistKey}));
}

function buildRecommendStrip(artistKey,currentFile){
  const recs=getRecommendations(artistKey,currentFile);
  if(!recs.length)return'';
  return`<div class="recommend-strip">
    <div class="recommend-label">♠ You might also like</div>
    <div class="recommend-scroll">
      ${recs.map(s=>`<div class="recommend-card" onclick="playRecommendation('${escAttr(s.file)}','${escAttr(s.artistKey)}')"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy"><div class="recommend-card-info"><div class="recommend-card-title">${escHtml(s.title)}</div><div class="recommend-card-artist">${escHtml(s.artistName)}</div></div></div>`).join('')}
    </div>
  </div>`;
}

window.playRecommendation=(fileId,artistKey)=>{
  const idx=artists[artistKey].songs.findIndex(s=>s.file===fileId);
  if(idx<0)return;currentSongs=artists[artistKey].songs;currentArtistKey=artistKey;playSong(idx);
};

      <button class="like-btn${liked?' liked':''}" onclick="event.stopPropagation();toggleLike('${escAttr(song.file)}',${i})">${liked?'❤':'❤'}</button>
      <button class="dl-btn${dl?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(song.file)}')" title="${dl?'Downloaded — click to remove':'Download for offline'}">${dl?'✓':'⬇'}</button>

  </div>`;
}

window.showAddToPlaylistMenu=(e,fileId,rowIdx)=>{
  e.stopPropagation();closeDropdown();
  const song=currentSongs[rowIdx];if(!song)return;
  const artistName=currentArtistKey?artists[currentArtistKey].name:'';
  window.__ctxSong=song;window.__ctxArtist=artistName;
  const ids=Object.keys(playlists);
  const dropdown=document.createElement('div');
  dropdown.className='add-to-playlist-dropdown';
  dropdown.style.position='fixed';
  const rect=e.target.getBoundingClientRect();
  dropdown.style.top=(rect.bottom+4)+'px';dropdown.style.left=Math.max(10,rect.left-120)+'px';
  if(!ids.length){
    dropdown.innerHTML=`<div class="no-playlists">No playlists yet.</div><button onclick="closeDropdown();openCreatePlaylistModal()">+ Create playlist</button>`;
  }else{
    dropdown.innerHTML=`<button onclick="closeDropdown();openCreatePlaylistModal()">+ New playlist</button>`+ids.map(id=>`<button onclick="addSongToPlaylistById(window.__ctxSong,window.__ctxArtist,'${escAttr(id)}');closeDropdown()">${escHtml(playlists[id].name)}</button>`).join('');
  }
  document.body.appendChild(dropdown);openDropdownEl=dropdown;
};

window.handleDlBtn=async(btn,fileId)=>{
  if(isDownloaded(fileId)){btn.textContent='⏳';btn.classList.add('downloading');await removeCachedSong(fileId);btn.classList.remove('downloading','downloaded');btn.textContent='⬇';}
  else{let song=null;for(let key in artists){song=artists[key].songs.find(s=>s.file===fileId);if(song)break;}if(song)await downloadSong(song,btn);}
};

function refreshSongRows(){
  if(!currentArtistKey)return;const list=document.getElementById('songsList');if(!list)return;
  list.innerHTML=artists[currentArtistKey].songs.map((s,i)=>songRowHTML(s,i,artists[currentArtistKey].name)).join('');
}

window.sortSongs=()=>{
  if(!currentSongs||!currentArtistKey)return;
  const type=document.getElementById('sortSelect').value;
  if(type==='default'){currentSongs=artists[currentArtistKey].songs;}
  else if(type==='name'){currentSongs=[...currentSongs].sort((a,b)=>a.title.localeCompare(b.title));}
  else if(type==='liked'){currentSongs=[...currentSongs].sort((a,b)=>(likedSongs.has(b.file)?1:0)-(likedSongs.has(a.file)?1:0));}
  document.getElementById('songsList').innerHTML=currentSongs.map((s,i)=>songRowHTML(s,i,artists[currentArtistKey].name)).join('');
};

async function playFromHistory(fileId,artistKey){
  if(!artists[artistKey])return;
  currentArtistKey=artistKey;
  currentSongs=artists[artistKey].songs;
  const idx=currentSongs.findIndex(s=>s.file===fileId);
  if(idx>=0)await playSong(idx);
}
window.playFromHistory=playFromHistory;

async function playSong(index){
  if(!currentSongs[index])return;
  currentIndex=index;const song=currentSongs[index];currentSong=song;
  if(crossfadeTimer){clearInterval(crossfadeTimer);crossfadeTimer=null;}
  const targetVol=isMuted?0:(parseFloat(volumeSlider.value)||1);
  if(!audio.paused&&audio.currentTime>0){
    audioFade.src=audio.src;audioFade.currentTime=audio.currentTime;audioFade.volume=targetVol;audioFade.play().catch(()=>{});
    let fadeVol=targetVol;
    crossfadeTimer=setInterval(()=>{fadeVol=Math.max(0,fadeVol-targetVol/15);audioFade.volume=fadeVol;if(fadeVol<=0){audioFade.pause();audioFade.src='';clearInterval(crossfadeTimer);crossfadeTimer=null;}},50);
  }
  const src=await getAudioSrc('songs/'+song.file);
  audio.src=src;audio.volume=0;
  posterEl.src=song.poster;playerTitle.textContent=song.title;
  const artistKey=currentArtistKey||Object.keys(artists).find(k=>artists[k].songs===currentSongs);
  const artistName=artistKey?artists[artistKey].name:(song.artistName||'');
  playerArtist.textContent=artistName;
  updatePlayerLikeBtn(song.file);updatePlayerDlBtn();
  audio.play().then(()=>{
    let vol=0;const fadeIn=setInterval(()=>{vol=Math.min(targetVol,vol+targetVol/15);audio.volume=vol;if(vol>=targetVol){audio.volume=targetVol;clearInterval(fadeIn);}},50);
  }).catch(()=>{audio.volume=targetVol;});
  playBtn.textContent='⏸';
  document.getElementById('fsPoster').src=song.poster;document.getElementById('fsTitle').textContent=song.title;document.getElementById('fsArtist').textContent=artistName;document.getElementById('fsPlay').textContent='⏸';
  refreshSongRows();
  shuffleHistory.push(song.file);if(shuffleHistory.length>30)shuffleHistory=shuffleHistory.slice(-30);
  localStorage.setItem('eq_shuffle_history',JSON.stringify(shuffleHistory));
  const songForHistory={file:song.file,title:song.title,poster:song.poster,artistKey:currentArtistKey,artistName:artistName,album:song.album};
  const existingIdx=continueListening.findIndex(s=>s.file===song.file);
  if(existingIdx>=0)continueListening.splice(existingIdx,1);
  continueListening.unshift(songForHistory);
  if(continueListening.length>10)continueListening=continueListening.slice(0,10);
  saveContinueListening();
  savePlaybackMemory();renderQueuePanel();
  if('mediaSession' in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:song.title,artist:artistName,artwork:[{src:song.poster}]});}
}

function togglePlay(){
  if(audio.paused){audio.play();playBtn.textContent='⏸';document.getElementById('fsPlay').textContent='⏸';}
  else{audio.pause();playBtn.textContent='▶';document.getElementById('fsPlay').textContent='▶';savePlaybackMemory();}
}

function next(){
  if(queue.length>0){
    const s=queue.shift();localStorage.setItem('eq_queue',JSON.stringify(queue));currentSong=s;
    const artistKey=Object.keys(artists).find(k=>artists[k].songs.some(x=>x.file===s.file));
    const artistName=artistKey?artists[artistKey].name:(s.artistName||'');
    posterEl.src=s.poster;playerTitle.textContent=s.title;playerArtist.textContent=artistName;
    updatePlayerLikeBtn(s.file);updatePlayerDlBtn();
    getAudioSrc('songs/'+s.file).then(src=>{audio.src=src;audio.play();playBtn.textContent='⏸';});
    savePlaybackMemory();renderQueuePanel();return;
  }
  if(!currentSongs.length)return;
  if(isShuffle){
    const recentFiles=new Set(shuffleHistory.slice(-Math.min(shuffleHistory.length,Math.floor(currentSongs.length*.5))));
    const available=currentSongs.map((s,i)=>i).filter(i=>!recentFiles.has(currentSongs[i].file));
    currentIndex=available.length>0?available[Math.floor(Math.random()*available.length)]:Math.floor(Math.random()*currentSongs.length);
  }else{currentIndex=(currentIndex+1)%currentSongs.length;}
  playSong(currentIndex);
}

function previous(){
  if(!currentSongs.length)return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  currentIndex=(currentIndex-1+currentSongs.length)%currentSongs.length;playSong(currentIndex);
}

function playArtist(key){currentSongs=artists[key].songs;currentArtistKey=key;currentIndex=0;playSong(0);}
function shuffleArtist(key){currentSongs=artists[key].songs;currentArtistKey=key;currentIndex=Math.floor(Math.random()*currentSongs.length);playSong(currentIndex);}

function seek(e){
  if(!audio.duration)return;
  const r=document.getElementById('progressTrack').getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
}

function addToQueue(index){
  const song=currentSongs[index];if(!song)return;
  const artistKey=currentArtistKey||Object.keys(artists).find(k=>artists[k].songs===currentSongs);
  const artistName=artistKey?artists[artistKey].name:'';
  queue.push({...song,artistName});localStorage.setItem('eq_queue',JSON.stringify(queue));
  renderQueuePanel();showToast('Added to queue ✓');
}

function toggleShuffle(){isShuffle=!isShuffle;document.getElementById('shuffleBtn').classList.toggle('on',isShuffle);localStorage.setItem('eq_shuffle',isShuffle);showToast(isShuffle?'Smart shuffle on 🔀':'Shuffle off');}
function toggleRepeat(){isRepeat=!isRepeat;audio.loop=isRepeat;document.getElementById('repeatBtn').classList.toggle('on',isRepeat);localStorage.setItem('eq_repeat',isRepeat);}
function toggleMute(){if(isMuted){audio.volume=prevVol;volumeSlider.value=prevVol;isMuted=false;}else{prevVol=audio.volume||1;audio.volume=0;volumeSlider.value=0;isMuted=true;}}

function toggleQueuePanel(){
  queuePanelOpen=!queuePanelOpen;
  document.getElementById('queuePanel').classList.toggle('open',queuePanelOpen);
  document.getElementById('queueToggleBtn').classList.toggle('active',queuePanelOpen);
  if(queuePanelOpen)renderQueuePanel();
}

function renderQueuePanel(){
  const body=document.getElementById('queuePanelBody');if(!body)return;
  let html='';
  if(currentSong){html+=`<div class="queue-section-label">Now Playing</div><div class="queue-item"><img src="${escHtml(currentSong.poster)}" onerror="this.style.background='#16162a'"><div class="queue-item-info"><div class="queue-item-title" style="color:var(--accent)">${escHtml(currentSong.title)}</div><div class="queue-item-artist">${escHtml(playerArtist.textContent)}</div></div></div>`;}
  if(queue.length>0){
    html+=`<div class="queue-section-label" style="margin-top:8px">Up Next (${queue.length})</div>`;
    queue.forEach((s,i)=>{html+=`<div class="queue-item" onclick="playFromQueue(${i})"><img src="${escHtml(s.poster)}" onerror="this.style.background='#16162a'"><div class="queue-item-info"><div class="queue-item-title">${escHtml(s.title)}</div><div class="queue-item-artist">${escHtml(s.artistName||'')}</div></div><button class="queue-item-remove" onclick="event.stopPropagation();removeFromQueue(${i})" title="Remove">✕</button></div>`;});
    html+=`<div style="padding:10px 16px"><button onclick="clearQueue()" style="background:none;border:1px solid rgba(255,85,85,.2);color:rgba(255,85,85,.6);font-family:'Syne',sans-serif;font-size:.7rem;cursor:pointer;padding:5px 12px;border-radius:7px;width:100%">Clear Queue</button></div>`;
  }
  if(currentSong&&currentArtistKey&&currentSongs.length>1){
    const nextInLine=currentSongs.slice(currentIndex+1,currentIndex+5);
    if(nextInLine.length>0){
      html+=`<div class="queue-section-label" style="margin-top:8px">Next from ${escHtml(artists[currentArtistKey]?artists[currentArtistKey].name:'')}</div>`;
      nextInLine.forEach((s,i)=>{html+=`<div class="queue-item" onclick="playSong(${currentIndex+1+i})"><img src="${escHtml(s.poster)}" onerror="this.style.background='#16162a'"><div class="queue-item-info"><div class="queue-item-title">${escHtml(s.title)}</div><div class="queue-item-artist">${escHtml(currentArtistKey&&artists[currentArtistKey]?artists[currentArtistKey].name:'')}</div></div></div>`;});
    }
  }
  if(!currentSong&&!queue.length){html=`<div class="queue-empty"><div style="font-size:2rem;opacity:.4">☰</div><p>Your queue is empty</p><p style="font-size:.75rem;color:var(--muted);margin-top:4px">Tap + next to any song to add it</p></div>`;}
  body.innerHTML=html;
}

window.playFromQueue=(i)=>{
  if(!queue[i])return;
  const songs=queue.splice(0,i+1);const s=songs[songs.length-1];
  localStorage.setItem('eq_queue',JSON.stringify(queue));currentSong=s;
  const artistKey=Object.keys(artists).find(k=>artists[k].songs.some(x=>x.file===s.file));
  const artistName=artistKey?artists[artistKey].name:(s.artistName||'');
  posterEl.src=s.poster;playerTitle.textContent=s.title;playerArtist.textContent=artistName;
  updatePlayerLikeBtn(s.file);updatePlayerDlBtn();
  getAudioSrc('songs/'+s.file).then(src=>{audio.src=src;audio.play();playBtn.textContent='⏸';});
  savePlaybackMemory();renderQueuePanel();
};

window.removeFromQueue=(i)=>{queue.splice(i,1);localStorage.setItem('eq_queue',JSON.stringify(queue));renderQueuePanel();showToast('Removed from queue');};
window.clearQueue=()=>{queue=[];localStorage.setItem('eq_queue',JSON.stringify(queue));renderQueuePanel();showToast('Queue cleared');};

function toggleLike(fileId,rowIndex){
  if(likedSongs.has(fileId))likedSongs.delete(fileId);else likedSongs.add(fileId);
  saveLiked();if(rowIndex!==undefined)refreshSongRows();updatePlayerLikeBtn(fileId);
}

function togglePlayerLike(){if(!currentSong)return;toggleLike(currentSong.file);}
function updatePlayerLikeBtn(f){const btn=document.getElementById('playerLikeBtn');btn.textContent=likedSongs.has(f)?'❤':'♡';btn.classList.toggle('liked',likedSongs.has(f));}

function showLikedSongs(){
  setNavActive('navFav');setMobileBack(true);
  const liked=[];
  for(let key in artists)artists[key].songs.forEach(s=>{if(likedSongs.has(s.file))liked.push({...s,artistName:artists[key].name,artistKey:key});});
  document.getElementById('mainArea').innerHTML=`
    <div class="main-header">
      <div><div class="main-title">Favorites</div><div class="main-subtitle">${liked.length} LIKED</div></div>
      <div class="header-actions">
        <select id="sortSelect" onchange="sortLikedSongs()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:8px;font-family:'Syne',sans-serif;font-size:.78rem;outline:none;cursor:pointer;">
          <option value="default">Default</option>
          <option value="title">Title A–Z</option>
          <option value="artist">Artist</option>
        </select>
      </div>
    </div>
    <div class="songs-section" style="padding-top:20px">
      <div class="fav-section-label">❤ Liked Songs</div>
      ${liked.length===0
        ?'<div class="empty-state"><div class="emoji">🎵</div><p>No favorites yet. Like songs to see them here.</p></div>'
        :`<div id="songsList">${liked.map((s,i)=>`
          <div class="song-row" onclick="playLikedSong(${i})">
            <div class="song-num">${i+1}</div>
            <div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy"><div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div></div>
            <div class="song-actions">
              <button class="like-btn liked" onclick="event.stopPropagation();toggleLikeFav('${escAttr(s.file)}',this)">❤</button>
              <button class="dl-btn${isDownloaded(s.file)?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(s.file)}')">${isDownloaded(s.file)?'✓':'⬇'}</button>
            </div>
          </div>`).join('')}</div>`}
    </div>`;
  window.__likedList=liked;
}

function playLikedSong(i){
  const s=window.__likedList[i];
  currentSongs=window.__likedList;currentArtistKey=null;currentIndex=i;
  audio.src='songs/'+s.file;posterEl.src=s.poster;playerTitle.textContent=s.title;playerArtist.textContent=s.artistName||'';
  updatePlayerLikeBtn(s.file);updatePlayerDlBtn();audio.play();playBtn.textContent='⏸';
}

window.sortLikedSongs=()=>{
  if(!window.__likedList)return;
  const type=document.getElementById('sortSelect').value;
  if(type==='title')window.__likedList=[...window.__likedList].sort((a,b)=>a.title.localeCompare(b.title));
  else if(type==='artist')window.__likedList=[...window.__likedList].sort((a,b)=>(a.artistName||'').localeCompare(b.artistName||''));
  else window.__likedList=[...window.__likedList];
  const list=document.getElementById('songsList');if(!list)return;
  list.innerHTML=window.__likedList.map((s,i)=>`
    <div class="song-row" onclick="playLikedSong(${i})">
      <div class="song-num">${i+1}</div>
      <div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy"><div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div></div>
      <div class="song-actions">
        <button class="like-btn liked" onclick="event.stopPropagation();toggleLikeFav('${escAttr(s.file)}',this)">❤</button>
        <button class="dl-btn${isDownloaded(s.file)?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(s.file)}')">${isDownloaded(s.file)?'✓':'⬇'}</button>
      </div>
    </div>`).join('');
};

function toggleLikeFav(fileId,btn){
  likedSongs.delete(fileId);saveLiked();
  btn.closest('.song-row').style.opacity='0';btn.closest('.song-row').style.transition='opacity .3s';
  setTimeout(()=>showLikedSongs(),300);
}

function globalSearch(){
  const q=document.getElementById('searchBar').value.toLowerCase().trim();
  if(!q){loadArtists();return;}
  setMobileBack(false);
  let artistHtml='',songHtml='',ac=0,sc=0;
  for(let key in artists){
    const a=artists[key];
    if(a.name.toLowerCase().includes(q)){
      artistHtml+=`<div class="artist-card" onclick="openArtist('${key}')"><img src="${a.image}"><div class="artist-card-overlay"><div class="artist-card-name">${a.name}</div><div class="artist-card-count">${a.songs.length} songs</div></div><button class="card-play-btn" onclick="event.stopPropagation();playArtist('${key}')">▶</button></div>`;ac++;
    }
    a.songs.forEach((s,i)=>{
      if(s.title.toLowerCase().includes(q)){
        songHtml+=`<div class="song-row" style="background:var(--surface);border-radius:13px;margin-bottom:4px" onclick="openArtistAndPlay('${key}',${i})">
          <div class="song-num">${sc+1}</div>
          <div class="song-row-info"><img src="${s.poster}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0"><div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(a.name)}</p></div></div>
          <div class="song-actions" style="opacity:1">
            <button class="like-btn${likedSongs.has(s.file)?' liked':''}" onclick="event.stopPropagation();toggleLike('${escAttr(s.file)}')">${likedSongs.has(s.file)?'❤':'♡'}</button>
            <button class="dl-btn${isDownloaded(s.file)?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(s.file)}')">${isDownloaded(s.file)?'✓':'⬇'}</button>
          </div>
        </div>`;sc++;
      }
    });
  }
  const total=ac+sc;
  document.getElementById('mainArea').innerHTML=`
    <div class="main-header"><div><div class="main-title">Search</div><div class="main-subtitle">${total} RESULTS FOR "${q.toUpperCase()}"</div></div></div>
    ${ac>0?`<div style="padding:20px 30px 0"><div style="font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px">Artists</div><div class="artists-grid" style="padding:0">${artistHtml}</div></div>`:''}
    ${sc>0?`<div class="songs-section" style="padding-top:20px"><div style="font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Songs</div>${songHtml}</div>`:''}
    ${!total?'<div class="empty-state"><div class="emoji">🔍</div><p>No results found.</p></div>':''}`;
}

function openArtistAndPlay(key,index){currentSongs=artists[key].songs;currentArtistKey=key;openArtist(key);playSong(index);}

function openFullPlayer(){if(!currentSong)return;document.getElementById('fullscreenPlayer').style.display='flex';}
function closeFullPlayer(){document.getElementById('fullscreenPlayer').style.display='none';}

audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  progressBar.style.width=(audio.currentTime/audio.duration*100)+'%';
  document.getElementById('currentTime').textContent=fmt(audio.currentTime);
  document.getElementById('duration').textContent=fmt(audio.duration);
  if(Math.floor(audio.currentTime)%10===0&&audio.currentTime>0)savePlaybackMemory();
});

audio.addEventListener('ended',()=>{if(!isRepeat)next();});
audio.addEventListener('play',()=>{playBtn.textContent='⏸';const fp=document.getElementById('fsPlay');if(fp)fp.textContent='⏸';});
audio.addEventListener('pause',()=>{playBtn.textContent='▶';const fp=document.getElementById('fsPlay');if(fp)fp.textContent='▶';savePlaybackMemory();});

volumeSlider.addEventListener('input',()=>{audio.volume=+volumeSlider.value;isMuted=audio.volume===0;localStorage.setItem('eq_volume',audio.volume);});

if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',()=>audio.play());
  navigator.mediaSession.setActionHandler('pause',()=>audio.pause());
  navigator.mediaSession.setActionHandler('nexttrack',()=>next());
  navigator.mediaSession.setActionHandler('previoustrack',()=>previous());
}

window.addEventListener('beforeunload',()=>savePlaybackMemory());

function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function setMobileBack(show){const b=document.getElementById('mobileBackBtn');if(b)b.classList.toggle('hidden',!show);}
function setNavActive(id){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const e=document.getElementById(id);if(e)e.classList.add('active');}
function setSidebarActive(key){document.querySelectorAll('.artist-item').forEach(e=>e.classList.remove('active'));const e=document.getElementById('sb_'+key);if(e){e.classList.add('active');e.scrollIntoView({block:'nearest'});}}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.style.opacity='0',1900);}

buildSidebar();
loadArtists();
document.querySelector('.fav-mobile-btn')&&(document.querySelector('.fav-mobile-btn').style.display='');
loadPlaybackMemory();
renderQueuePanel();
    </script>
</body>

</html>
