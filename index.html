<!DOCTYPE html>
<html>

<head>
    <title>WIDE MUSIC</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #1abc9c, #16a085);
            text-align: center;
            color: white;
            padding-top: 120px;
            padding-bottom: 170px;
        }
        
        .search-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        
        #searchBar {
            padding: 12px 20px;
            width: 320px;
            border-radius: 30px;
            border: none;
            outline: none;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }
        
        .artist-card {
            width: 200px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .artist-card img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .artist-card:hover {
            transform: scale(1.08);
        }
        
        .song-card {
            width: 200px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
        }
        
        .song-card img {
            width: 160px;
            height: 160px;
            border-radius: 15px;
            object-fit: cover;
        }
        
        .song-card:hover {
            transform: scale(1.08);
        }
        
        button {
            margin-top: 10px;
            padding: 6px 12px;
            border: none;
            border-radius: 20px;
            background: #ff4757;
            color: white;
            cursor: pointer;
        }
        
        #backBtn {
            display: none;
            margin: 20px;
            background: black;
        }
        
        .player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: #181818;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .song-info {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 25%;
        }
        
        .song-info img {
            width: 55px;
            height: 55px;
            border-radius: 6px;
            object-fit: cover;
            background: #222;
        }
        
        .center {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .controls {
            display: flex;
            gap: 22px;
            margin-bottom: 6px;
            align-items: center;
        }
        
        .controls button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .controls button.active {
            color: #1db954;
            transform: scale(1.2);
        }
        
        .controls button:hover {
            color: #1db954;
            transform: scale(1.1);
        }
        
        .active {
            color: #1db954 !important;
        }
        
        .play {
            background: white;
            color: black;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress {
            width: 70%;
            height: 3px;
            background: #444;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .progress-bar {
            height: 3px;
            background: #1db954;
            width: 0%;
            border-radius: 5px;
        }
        
        #noResult {
            display: none;
            color: yellow;
        }
    </style>
</head>

                <button onclick="next()">⏭</button>
                <button id="repeatBtn" onclick="toggleRepeat()">🔁</button>

            <div class="progress" onclick="seek(event)">

        function loadArtists() {
            container.innerHTML = "";
            document.getElementById("backBtn").style.display = "none";
            for (let key in artists) {
                container.innerHTML += `
<div class="artist-card">
<img src="${artists[key].image}">
<h3>${artists[key].name}</h3>
<button onclick="openArtist('${key}')">Open</button>
</div>`;
            }
        }


        function openArtist(key) {
            container.innerHTML = "";
            document.getElementById("backBtn").style.display = "inline-block";
            currentSongs = artists[key].songs;

            currentSongs.forEach((song, index) => {
                container.innerHTML += `
<div class="song-card">
<img src="${song.poster}">
<h3>${song.title}</h3>
<button onclick="playSong(${index})">Play</button>
</div>`;
            });
        }


        function playSong(index) {
            currentIndex = index;
            audio.src = "songs/" + currentSongs[index].file;
            poster.src = currentSongs[index].poster;
            title.innerText = currentSongs[index].title;
            audio.play();
            playBtn.innerText = "⏸";
        }


        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        }

        function next() {
            if (currentSongs.length == 0) return;

            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * currentSongs.length);
            } else {
                currentIndex = (currentIndex + 1) % currentSongs.length;
            }

            playSong(currentIndex);
        }

        function previous() {
            if (currentSongs.length == 0) return;
            currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
            playSong(currentIndex);
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;

            if (isShuffle) {
                shuffleBtn.classList.add("active");
            } else {
                shuffleBtn.classList.remove("active");
            }
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;

            if (isShuffle) {
                shuffleBtn.classList.add("active");
                shuffleBtn.innerText = "🔁";
            } else {
                shuffleBtn.classList.remove("active");
                shuffleBtn.innerText = "🔀";
            }
        }


        function toggleRepeat() {
            isRepeat = !isRepeat;
            audio.loop = isRepeat;

            if (isRepeat) {
                repeatBtn.classList.add("active");
                repeatBtn.innerText = "🔂";
            } else {
                repeatBtn.classList.remove("active");
                repeatBtn.innerText = "🔁";
            }
        }



        audio.addEventListener("timeupdate", () => {
            if (!audio.duration) return;
            var percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + "%";
        });
        audio.addEventListener("ended", () => {
            if (isRepeat) {
                audio.play();
            } else {
                next();
            }
        });

        function seek(e) {
            if (!audio.duration) return;
            var width = e.currentTarget.clientWidth;
            var clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        }


        function globalSearch() {
            var input = document.getElementById("searchBar").value.toLowerCase();
            container.innerHTML = "";
            var found = 0;

            for (let key in artists) {
                if (artists[key].name.toLowerCase().includes(input)) {
                    container.innerHTML += `
<div class="artist-card">
<img src="${artists[key].image}">
<h3>${artists[key].name}</h3>
<button onclick="openArtist('${key}')">Open</button>
</div>`;
                    found++;
                }

                artists[key].songs.forEach((song, index) => {
                    if (song.title.toLowerCase().includes(input)) {
                        container.innerHTML += `
<div class="song-card">
<img src="${song.poster}">
<h3>${song.title}</h3>
<button onclick="playSong(${index})">Play</button>
</div>`;
                        found++;
                    }
                });
            }

            document.getElementById("noResult").style.display =
                found == 0 ? "block" : "none";
        }

        loadArtists();
    </script>

</body>

</html>
