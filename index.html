<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
         :root {
            --bg: #07070f;
            --surface: #0d0d1c;
            --surface2: #121224;
            --surface3: #1a1a30;
            --surface4: #22223e;
            --accent: #c8f542;
            --accent2: #a8d930;
            --accent3: rgba(200, 245, 66, 0.10);
            --accent-glow: rgba(200, 245, 66, 0.25);
            --text: #f0f0f8;
            --muted: #3e3e62;
            --muted2: #6a6a9a;
            --border: rgba(200, 245, 66, 0.07);
            --border2: rgba(255, 255, 255, 0.05);
            --player-h: 100px;
            --sidebar-w: 270px;
            --glow: 0 0 60px rgba(200, 245, 66, 0.18);
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.85);
            --radius: 18px;
            --radius-sm: 10px;
        }
        
        html,
        body {
            height: 100%;
            overflow: hidden
        }
        
        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-rows: 1fr var(--player-h);
            height: 100vh;
        }
        /* NOISE TEXTURE */
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: .35;
        }
        /* AMBIENT BG GLOW */
        
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(200, 245, 66, 0.04) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
            z-index: 0;
            animation: ambientFloat 12s ease-in-out infinite alternate;
        }
        
        @keyframes ambientFloat {
            from {
                transform: translate(0, 0) scale(1);
            }
            to {
                transform: translate(120px, 80px) scale(1.3);
            }
        }
        /* ─── SPLASH ─────────────────────────────── */
        
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: splashOut 0.6s cubic-bezier(.4, 0, .2, 1) 2.4s forwards;
        }
        
        .splash-inner {
            text-align: center;
            animation: splashIn 1.1s cubic-bezier(.16, 1, .3, 1) both
        }
        
        .splash-logo-wrap {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            box-shadow: 0 0 0 0 rgba(200, 245, 66, .6);
            animation: splashPulse 1.8s ease infinite;
            position: relative;
        }
        
        .splash-logo-wrap::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1.5px solid rgba(200, 245, 66, .25);
            animation: ringExpand 1.8s ease infinite;
        }
        
        .splash-logo-wrap::after {
            content: '';
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            border: 1px solid rgba(200, 245, 66, .12);
            animation: ringExpand 1.8s ease infinite 0.3s;
        }
        
        @keyframes ringExpand {
            0% {
                transform: scale(0.9);
                opacity: 1;
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }
        
        .splash-logo-wrap img {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            object-fit: cover
        }
        
        .splash-name {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 10px;
            color: var(--text);
            text-transform: uppercase;
        }
        
        .splash-name span {
            color: var(--accent)
        }
        
        .splash-tagline {
            font-family: 'Space Mono', monospace;
            font-size: .62rem;
            color: var(--muted2);
            letter-spacing: 4px;
            margin-top: 10px;
        }
        
        .splash-bar {
            width: 120px;
            height: 2px;
            background: var(--surface3);
            border-radius: 2px;
            margin: 18px auto 0;
            overflow: hidden;
        }
        
        .splash-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            animation: splashLoad 2s ease forwards;
        }
        
        @keyframes splashLoad {
            from {
                width: 0
            }
            to {
                width: 100%
            }
        }
        
        @keyframes splashIn {
            from {
                opacity: 0;
                transform: scale(.88) translateY(24px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }
        
        @keyframes splashOut {
            to {
                opacity: 0;
                visibility: hidden
            }
        }
        
        @keyframes splashPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(200, 245, 66, .5), 0 0 60px rgba(200, 245, 66, .4)
            }
            50% {
                box-shadow: 0 0 0 18px rgba(200, 245, 66, 0), 0 0 100px rgba(200, 245, 66, .7)
            }
        }
        /* ─── SIDEBAR ─────────────────────────────── */
        
        .sidebar {
            grid-row: 1;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(200, 245, 66, .3), transparent);
        }
        
        .logo-wrap {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 11px;
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: 5px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 11px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(200, 245, 66, .3);
        }
        
        .logo-icon img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 11px
        }
        
        .logo-text {
            color: var(--text)
        }
        
        .logo-text b {
            color: var(--accent)
        }
        
        .sync-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Space Mono', monospace;
            font-size: .56rem;
            color: var(--muted2);
            padding: 3px 9px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        
        .sync-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted)
        }
        
        .sync-dot.synced {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(200, 245, 66, .6)
        }
        
        .sync-dot.syncing {
            background: #f5c842;
            animation: blink .7s infinite
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: .3
            }
        }
        
        .search-wrap {
            padding: 14px 16px 10px;
            flex-shrink: 0
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center
        }
        
        .search-icon {
            position: absolute;
            left: 12px;
            color: var(--muted);
            font-size: .9rem;
            pointer-events: none
        }
        
        .search-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 9px 12px 9px 36px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .82rem;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        
        .search-box input:focus {
            border-color: rgba(200, 245, 66, .4);
            background: var(--surface3)
        }
        
        .search-box input::placeholder {
            color: var(--muted)
        }
        
        .sidebar-nav {
            padding: 4px 12px 6px;
            flex-shrink: 0
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 9px 12px;
            border-radius: 11px;
            background: none;
            border: none;
            color: var(--muted2);
            font-family: 'Syne', sans-serif;
            font-size: .84rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .18s;
            text-align: left;
            margin-bottom: 2px;
        }
        
        .nav-btn:hover {
            background: var(--surface2);
            color: var(--text)
        }
        
        .nav-btn.active {
            background: var(--accent3);
            color: var(--accent);
            border: 1px solid rgba(200, 245, 66, .15);
            box-shadow: inset 0 0 20px rgba(200, 245, 66, .04);
        }
        
        .nav-icon {
            font-size: .9rem;
            width: 18px;
            flex-shrink: 0
        }
        
        .sidebar-section-label {
            padding: 12px 24px 6px;
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
        }
        
        .artists-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .artists-list::-webkit-scrollbar {
            width: 3px
        }
        
        .artists-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 3px
        }
        
        .artist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            border-radius: 11px;
            cursor: pointer;
            transition: background .15s;
        }
        
        .artist-item:hover {
            background: var(--surface2)
        }
        
        .artist-item.active {
            background: var(--surface3)
        }
        
        .artist-item img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0
        }
        
        .artist-item-name {
            font-size: .78rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .recent-section {
            padding: 0 10px 8px;
            flex-shrink: 0
        }
        
        .recent-label {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 12px 5px;
        }
        
        .recent-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background .15s;
        }
        
        .recent-item:hover {
            background: var(--surface2)
        }
        
        .recent-item img {
            width: 26px;
            height: 26px;
            border-radius: 5px;
            object-fit: cover;
            flex-shrink: 0
        }
        
        .recent-item-title {
            font-size: .74rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .recent-item-artist {
            font-size: .65rem;
            color: var(--muted2)
        }
        
        .user-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .user-bar img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--accent);
            flex-shrink: 0;
        }
        
        .user-bar-info {
            flex: 1;
            overflow: hidden
        }
        
        .user-bar-name {
            font-size: .78rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .user-bar-email {
            font-size: .66rem;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .signout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: .68rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .signout-btn:hover {
            color: #ff5555;
            border-color: #ff5555
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: calc(100% - 24px);
            margin: 12px;
            padding: 11px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        
        .google-btn:hover {
            border-color: rgba(200, 245, 66, .4);
            background: var(--surface3);
            transform: translateY(-1px);
        }
        /* ─── MAIN ─────────────────────────────── */
        
        .main {
            grid-column: 2;
            grid-row: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
            background: var(--bg);
            position: relative;
        }
        
        .main::-webkit-scrollbar {
            width: 4px
        }
        
        .main::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 4px
        }
        
        .main-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(7, 7, 15, .92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            padding: 18px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .main-title {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: 1px
        }
        
        .main-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: .63rem;
            color: var(--muted2);
            margin-top: 3px;
            letter-spacing: 1px
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted2);
        }
        
        .btn-outline:hover {
            border-color: rgba(200, 245, 66, .4);
            color: var(--accent)
        }
        
        .btn-accent {
            background: var(--accent);
            color: #000
        }
        
        .btn-accent:hover {
            background: var(--accent2);
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(200, 245, 66, .35);
        }
        /* ─── ARTIST HERO ─────────────────────────── */
        
        .artist-hero {
            position: relative;
            height: 240px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 28px 30px;
        }
        
        .artist-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            filter: blur(3px) brightness(.3);
            transform: scale(1.08);
        }
        
        .artist-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, rgba(7, 7, 15, .55) 60%, transparent 100%);
        }
        
        .artist-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            gap: 22px;
            width: 100%;
        }
        
        .artist-hero-img {
            width: 110px;
            height: 110px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid rgba(200, 245, 66, .3);
            box-shadow: 0 0 50px rgba(0, 0, 0, .9), 0 0 30px rgba(200, 245, 66, .1);
            flex-shrink: 0;
        }
        
        .artist-hero-tag {
            font-family: 'Space Mono', monospace;
            font-size: .56rem;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 7px;
        }
        
        .artist-hero-name {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1
        }
        
        .artist-hero-count {
            font-size: .76rem;
            color: var(--muted2);
            margin-top: 7px
        }
        
        .artist-hero-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 12px
        }
        /* ─── ARTISTS GRID ─────────────────────────── */
        
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            padding: 26px 30px;
        }
        
        .artist-card {
            cursor: pointer;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: transform .28s cubic-bezier(.34, 1.56, .64, 1), box-shadow .28s, border-color .28s;
            position: relative;
            aspect-ratio: 1;
        }
        
        .artist-card:hover {
            transform: translateY(-7px) scale(1.02);
            box-shadow: 0 24px 60px rgba(0, 0, 0, .7), 0 0 40px rgba(200, 245, 66, .1);
            border-color: rgba(200, 245, 66, .3);
        }
        
        .artist-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .45s;
        }
        
        .artist-card:hover img {
            transform: scale(1.08)
        }
        
        .artist-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(7, 7, 15, .95) 40%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
        }
        
        .artist-card-name {
            font-size: .82rem;
            font-weight: 700;
            letter-spacing: .5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .artist-card-count {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            color: var(--muted2);
            margin-top: 3px
        }
        
        .card-play-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            color: #000;
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: scale(.65) translateY(8px);
            transition: all .22s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 6px 24px rgba(200, 245, 66, .45);
        }
        
        .artist-card:hover .card-play-btn {
            opacity: 1;
            transform: scale(1) translateY(0)
        }
        /* ─── SONGS TABLE ─────────────────────────── */
        
        .songs-section {
            padding: 0 30px 30px
        }
        
        .songs-table-header {
            display: grid;
            grid-template-columns: 52px 1fr auto;
            padding: 0 14px 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 6px;
        }
        
        .th {
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }
        
        .song-row {
            display: grid;
            grid-template-columns: 52px 1fr auto;
            align-items: center;
            padding: 8px 14px;
            border-radius: 13px;
            cursor: pointer;
            transition: background .15s;
            gap: 4px;
        }
        
        .song-row:hover {
            background: var(--surface)
        }
        
        .song-row.playing {
            background: rgba(200, 245, 66, .05);
            border: 1px solid rgba(200, 245, 66, .12);
        }
        
        .song-num {
            font-family: 'Space Mono', monospace;
            font-size: .78rem;
            color: var(--muted);
            text-align: center
        }
        
        .song-row.playing .song-num {
            color: var(--accent)
        }
        
        .song-row-info {
            display: flex;
            align-items: center;
            gap: 14px
        }
        
        .song-row-info img {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            transition: transform .2s;
        }
        
        .song-row:hover .song-row-info img {
            transform: scale(1.06)
        }
        
        .song-row-text h4 {
            font-size: .87rem;
            font-weight: 700
        }
        
        .song-row.playing .song-row-text h4 {
            color: var(--accent)
        }
        
        .song-row-text p {
            font-size: .72rem;
            color: var(--muted2);
            margin-top: 2px
        }
        
        .song-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity .2s;
        }
        
        .song-row:hover .song-actions {
            opacity: 1
        }
        
        .like-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 7px;
            transition: transform .2s;
            line-height: 1;
        }
        
        .like-btn:hover {
            transform: scale(1.3)
        }
        
        .like-btn.liked {
            opacity: 1!important
        }
        
        .queue-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted2);
            width: 28px;
            height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .85rem;
            transition: all .2s;
        }
        
        .queue-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }
        /* ─── DOWNLOAD BUTTON ─────────────────────── */
        
        .dl-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted2);
            width: 28px;
            height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .75rem;
            transition: all .22s;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .dl-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent3)
        }
        
        .dl-btn.downloaded {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent3);
        }
        
        .dl-btn.downloading {
            border-color: rgba(200, 245, 66, .4);
            color: var(--accent);
        }
        
        .dl-btn.downloading::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--accent);
            animation: dlProgress 2s linear infinite;
        }
        
        @keyframes dlProgress {
            from {
                width: 0;
                left: 0
            }
            50% {
                width: 100%;
                left: 0
            }
            51% {
                width: 100%;
                left: 0
            }
            to {
                width: 0;
                left: 100%
            }
        }
        /* Offline badge on player */
        
        .offline-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: 'Space Mono', monospace;
            font-size: .52rem;
            color: var(--accent);
            background: var(--accent3);
            border: 1px solid rgba(200, 245, 66, .2);
            padding: 2px 7px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity .3s;
        }
        
        .offline-badge.visible {
            opacity: 1
        }
        /* ─── EQ BARS ─────────────────────────── */
        
        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 15px;
            width: 18px;
            margin: 0 auto
        }
        
        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            animation: eq .65s ease-in-out infinite alternate
        }
        
        .eq-bar:nth-child(1) {
            animation-delay: 0s
        }
        
        .eq-bar:nth-child(2) {
            animation-delay: .15s
        }
        
        .eq-bar:nth-child(3) {
            animation-delay: .3s
        }
        
        @keyframes eq {
            from {
                height: 3px
            }
            to {
                height: 14px
            }
        }
        /* ─── PLAYER ─────────────────────────────── */
        
        .player {
            grid-column: 1/-1;
            grid-row: 2;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr 300px;
            align-items: center;
            padding: 0 22px 0 0;
            position: relative;
            z-index: 20;
        }
        
        .player::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent 0%, var(--accent) 35%, var(--accent) 65%, transparent 100%);
            opacity: .3;
        }
        /* subtle player glow */
        
        .player::after {
            content: '';
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 40px;
            background: radial-gradient(ellipse, rgba(200, 245, 66, .07) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .player-song {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 0 16px;
            overflow: hidden;
        }
        
        .player-poster {
            width: 54px;
            height: 54px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, .6);
            transition: transform .3s;
        }
        
        .player-poster:hover {
            transform: scale(1.07)
        }
        
        .player-song-title {
            font-size: .85rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 145px;
        }
        
        .player-song-artist {
            font-size: .7rem;
            color: var(--muted2);
            margin-top: 2px
        }
        
        .player-song-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px
        }
        
        .player-like {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
            transition: transform .2s;
        }
        
        .player-like:hover {
            transform: scale(1.2)
        }
        /* player download btn */
        
        .player-dl-btn {
            background: none;
            border: none;
            font-size: .85rem;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
            color: var(--muted);
            transition: color .2s, transform .2s;
            line-height: 1;
        }
        
        .player-dl-btn:hover {
            color: var(--accent);
            transform: scale(1.15)
        }
        
        .player-dl-btn.downloaded {
            color: var(--accent)
        }
        
        .player-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 18px
        }
        
        .ctrl-btn {
            background: none;
            border: none;
            color: var(--muted2);
            font-size: 1rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .18s;
        }
        
        .ctrl-btn:hover {
            color: var(--text);
            background: var(--surface2)
        }
        
        .ctrl-btn.on {
            color: var(--accent)
        }
        
        .play-btn {
            width: 48px;
            height: 48px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all .22s;
            flex-shrink: 0;
            box-shadow: 0 0 0 0 rgba(200, 245, 66, .4);
        }
        
        .play-btn:hover {
            background: var(--accent2);
            transform: scale(1.12);
            box-shadow: 0 0 0 10px rgba(200, 245, 66, 0), 0 0 36px rgba(200, 245, 66, .55);
        }
        
        .play-btn:active {
            transform: scale(.96)
        }
        
        .player-progress {
            display: flex;
            align-items: center;
            gap: 11px;
            width: 100%;
            max-width: 500px;
        }
        
        .time-label {
            font-family: 'Space Mono', monospace;
            font-size: .63rem;
            color: var(--muted);
            min-width: 30px;
        }
        
        .time-label:last-child {
            text-align: right
        }
        
        .progress-track {
            flex: 1;
            height: 3px;
            background: var(--surface3);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: height .15s;
        }
        
        .progress-track:hover {
            height: 5px
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent2), var(--accent));
            border-radius: 4px;
            width: 0%;
            transition: width .2s linear;
            position: relative;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 11px;
            height: 11px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            transition: opacity .15s;
            box-shadow: 0 0 10px rgba(200, 245, 66, .7);
        }
        
        .progress-track:hover .progress-fill::after {
            opacity: 1
        }
        
        .player-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 9px
        }
        
        .vol-icon {
            color: var(--muted2);
            font-size: .85rem;
            cursor: pointer
        }
        
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: var(--surface3);
            height: 3px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 11px;
            height: 11px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }
        
        #volumeSlider {
            width: 85px
        }
        /* ─── PLAYLIST UI ─────────────────────────── */
        
        .playlist-create-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 20px;
        }
        
        .playlist-create-title {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 13px;
        }
        
        .playlist-create-row {
            display: flex;
            gap: 8px;
            align-items: center
        }
        
        .playlist-create-row input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .84rem;
            outline: none;
            transition: border-color .2s;
        }
        
        .playlist-create-row input:focus {
            border-color: rgba(200, 245, 66, .4)
        }
        
        .playlist-create-row input::placeholder {
            color: var(--muted)
        }
        
        .playlist-create-row button {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 11px;
            padding: 10px 20px;
            font-family: 'Syne', sans-serif;
            font-size: .8rem;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }
        
        .playlist-create-row button:hover {
            background: var(--accent2);
            transform: scale(1.03)
        }
        
        .playlists-list-wrap {
            margin-bottom: 26px
        }
        
        .playlists-list-title {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 4px 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }
        
        .playlist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 13px;
            cursor: pointer;
            transition: background .15s;
            gap: 10px;
        }
        
        .playlist-item:hover {
            background: var(--surface)
        }
        
        .playlist-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden
        }
        
        .playlist-item-icon {
            width: 42px;
            height: 42px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
        }
        
        .playlist-item-name {
            font-size: .87rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .playlist-item-count {
            font-size: .7rem;
            color: var(--muted2);
            margin-top: 2px
        }
        
        .playlist-item-delete {
            background: none;
            border: none;
            color: var(--muted);
            font-size: .8rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            flex-shrink: 0;
            opacity: 0;
            transition: all .2s;
        }
        
        .playlist-item:hover .playlist-item-delete {
            opacity: 1
        }
        
        .playlist-item-delete:hover {
            color: #ff5555
        }
        
        .fav-section-label {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 4px 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }
        
        .add-to-playlist-wrap {
            position: relative;
            display: inline-block
        }
        
        .add-to-playlist-dropdown {
            position: absolute;
            right: 0;
            top: 110%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 13px;
            min-width: 180px;
            z-index: 100;
            padding: 6px 0;
            box-shadow: 0 14px 48px rgba(0, 0, 0, .65);
        }
        
        .add-to-playlist-dropdown button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 9px 15px;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .8rem;
            cursor: pointer;
            transition: background .15s;
        }
        
        .add-to-playlist-dropdown button:hover {
            background: var(--surface3);
            color: var(--accent)
        }
        
        .add-to-playlist-dropdown .no-playlists {
            display: block;
            padding: 9px 15px;
            font-size: .76rem;
            color: var(--muted2)
        }
        /* ─── EMPTY STATE ─────────────────────────── */
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 90px 24px;
            color: var(--muted2);
            gap: 14px;
        }
        
        .empty-state .emoji {
            font-size: 3rem;
            opacity: .5
        }
        
        .empty-state p {
            font-size: .9rem
        }
        /* ─── TOAST ─────────────────────────────── */
        
        #toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            font-family: 'Syne', sans-serif;
            font-size: .8rem;
            font-weight: 700;
            padding: 9px 22px;
            border-radius: 50px;
            z-index: 9999;
            opacity: 0;
            transition: opacity .22s;
            pointer-events: none;
            box-shadow: 0 6px 28px rgba(200, 245, 66, .45);
        }
        /* ─── FULLSCREEN PLAYER ─────────────────── */
        
        #fullscreenPlayer {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            z-index: 9998;
        }
        
        #fullscreenPlayer img {
            width: 250px;
            height: 250px;
            border-radius: 22px;
            box-shadow: var(--shadow), 0 0 80px rgba(200, 245, 66, .12);
        }
        
        #fsTitle {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: 1px
        }
        
        .fsControls {
            display: flex;
            gap: 22px;
            align-items: center
        }
        
        .fsControls button {
            font-size: 1.1rem;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 54px;
            height: 54px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #closePlayer {
            position: absolute;
            top: 22px;
            left: 22px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.9rem;
            cursor: pointer;
        }
        /* ─── OFFLINE CACHE SECTION ─────────────── */
        
        .cache-info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            margin: 0 30px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: .78rem;
            gap: 10px;
        }
        
        .cache-info-left {
            display: flex;
            align-items: center;
            gap: 10px
        }
        
        .cache-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px rgba(200, 245, 66, .6)
        }
        
        .cache-label {
            font-weight: 700
        }
        
        .cache-count {
            color: var(--muted2);
            font-family: 'Space Mono', monospace;
            font-size: .62rem
        }
        
        .clear-cache-btn {
            background: none;
            border: 1px solid rgba(255, 85, 85, .2);
            color: rgba(255, 85, 85, .6);
            font-family: 'Syne', sans-serif;
            font-size: .7rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 7px;
            transition: all .2s;
            white-space: nowrap;
        }
        
        .clear-cache-btn:hover {
            color: #ff5555;
            border-color: #ff5555
        }
        /* ─── MOBILE ─────────────────────────────── */
        
        .mobile-back-btn {
            display: none
        }
        
        @media(max-width:768px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: 56px 1fr var(--player-h);
                --player-h: 170px;
                overflow: hidden;
            }
            .sidebar {
                grid-column: 1;
                grid-row: 1;
                flex-direction: row;
                align-items: center;
                overflow: hidden;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 0 12px;
                gap: 10px;
                height: 56px;
            }
            .logo-wrap {
                padding: 0;
                border-bottom: none;
                flex-shrink: 0
            }
            .logo {
                font-size: 1.3rem;
                letter-spacing: 3px
            }
            .logo-icon {
                width: 30px;
                height: 30px;
                border-radius: 7px
            }
            .logo-icon img {
                width: 30px;
                height: 30px
            }
            .sync-chip,
            .sidebar-nav,
            .sidebar-section-label,
            .artists-list,
            .user-bar,
            .recent-section,
            .recent-label {
                display: none!important
            }
            .search-wrap {
                flex: 1;
                padding: 0
            }
            .search-box input {
                font-size: .8rem;
                padding: 8px 10px 8px 32px
            }
            .fav-mobile-btn {
                background: none;
                border: none;
                font-size: 1.2rem;
                cursor: pointer;
                flex-shrink: 0;
                padding: 4px;
            }
            .mobile-back-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                background: none;
                border: none;
                color: var(--accent);
                font-size: 1.4rem;
                cursor: pointer;
                flex-shrink: 0;
                padding: 2px 6px;
                border-radius: 8px;
                transition: background .2s;
            }
            .mobile-back-btn:hover {
                background: var(--surface2)
            }
            .mobile-back-btn.hidden {
                display: none!important
            }
            .main {
                grid-column: 1;
                grid-row: 2
            }
            .main-header {
                padding: 12px 14px
            }
            .main-title {
                font-size: 1.2rem
            }
            .main-subtitle {
                display: none
            }
            .btn {
                padding: 6px 12px;
                font-size: .72rem
            }
            .artists-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
                padding: 14px
            }
            .artist-hero {
                height: 170px;
                padding: 16px 14px
            }
            .artist-hero-img {
                width: 72px;
                height: 72px;
                border-radius: 13px
            }
            .artist-hero-name {
                font-size: 1.55rem
            }
            .songs-section {
                padding: 0 14px 22px
            }
            .songs-table-header {
                display: none
            }
            .song-row {
                grid-template-columns: 1fr auto;
                gap: 6px;
                padding: 8px 8px
            }
            .song-num {
                display: none
            }
            .song-row-info img {
                width: 40px;
                height: 40px
            }
            .song-actions {
                opacity: 1
            }
            .player {
                grid-column: 1;
                grid-row: 3;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 8px 14px 12px;
                gap: 6px;
                grid-template-columns: unset;
            }
            .player-song {
                padding: 0;
                width: 100%;
                gap: 10px
            }
            .player-song-title {
                max-width: 130px;
                font-size: .8rem
            }
            .player-song-artist,
            .player-like {
                display: none
            }
            .player-poster {

        /* ═══════════════════════════════════════
           CACHE / OFFLINE SYSTEM (Cache API)
        ═══════════════════════════════════════ */
        const CACHE_NAME = 'equify-offline-v1';

        // Track download state in memory + localStorage
        let downloadedFiles = new Set();

        function loadDownloadedList() {
            try {
                const saved = JSON.parse(localStorage.getItem('eq_downloaded') || '[]');
                downloadedFiles = new Set(saved);
            } catch (e) {}
        }

        function saveDownloadedList() {
            localStorage.setItem('eq_downloaded', JSON.stringify([...downloadedFiles]));
        }

        function isDownloaded(fileId) {
            return downloadedFiles.has(fileId);
        }

        async function downloadSong(song, btn) {
            const url = 'songs/' + song.file;
            if (isDownloaded(song.file)) {
                showToast('Already downloaded ✓');
                return;
            }

            if (btn) {
                btn.classList.add('downloading');
                btn.textContent = '↻';
            }

            try {
                const cache = await caches.open(CACHE_NAME);
                // Fetch and cache the audio file
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network error');
                await cache.put(url, response.clone());

                // Also cache the poster image
                try {
                    const imgResp = await fetch(song.poster);
                    if (imgResp.ok) await cache.put(song.poster, imgResp.clone());
                } catch (e) {}

                downloadedFiles.add(song.file);
                saveDownloadedList();

                if (btn) {
                    btn.classList.remove('downloading');
                    btn.classList.add('downloaded');
                    btn.textContent = '✓';
                }

                // update player dl btn if this is the current song
                updatePlayerDlBtn();
                refreshSongRows();
                showToast(`"${song.title}" saved for offline ✓`);
            } catch (err) {
                if (btn) {
                    btn.classList.remove('downloading');
                    btn.textContent = '⬇';
                }
                showToast('Download failed — check connection');
            }
        }

        async function removeCachedSong(fileId) {
            try {
                const cache = await caches.open(CACHE_NAME);
                await cache.delete('songs/' + fileId);
                downloadedFiles.delete(fileId);
                saveDownloadedList();
                refreshSongRows();
                updatePlayerDlBtn();
                showToast('Removed from offline ✓');
            } catch (e) {
                showToast('Could not remove');
            }
        }

        async function getDownloadedCount() {
            try {
                const cache = await caches.open(CACHE_NAME);
                const keys = await cache.keys();
                return keys.filter(k => k.url.includes('.mp3')).length;
            } catch (e) {
                return 0;
            }
        }

        function updatePlayerDlBtn() {
            const btn = document.getElementById('playerDlBtn');
            const badge = document.getElementById('offlineBadge');
            if (!currentSong) return;
            const dl = isDownloaded(currentSong.file);
            btn.classList.toggle('downloaded', dl);
            btn.textContent = dl ? '✓' : '⬇';
            btn.title = dl ? 'Downloaded — click to remove' : 'Download for offline';
            badge.classList.toggle('visible', dl);
        }

        window.downloadCurrentSong = async() => {
            if (!currentSong) return;
            if (isDownloaded(currentSong.file)) {
                // toggle remove
                if (confirm(`Remove "${currentSong.title}" from offline cache?`)) {
                    await removeCachedSong(currentSong.file);
                }
                return;
            }
            const btn = document.getElementById('playerDlBtn');
            btn.textContent = '↻';
            await downloadSong(currentSong, null);
            updatePlayerDlBtn();
        };

        async function showDownloads() {
            setNavActive('navDownloads');
            setMobileBack(true);
            const count = await getDownloadedCount();

            // gather downloaded song objects
            const dlSongs = [];
            for (let key in artists) {
                artists[key].songs.forEach(s => {
                    if (isDownloaded(s.file)) dlSongs.push({...s,
                        artistName: artists[key].name,
                        artistKey: key
                    });
                });
            }

            document.getElementById('mainArea').innerHTML = `
                <div class="main-header">
                    <div><div class="main-title">Downloads</div><div class="main-subtitle">${count} CACHED FOR OFFLINE</div></div>
                    ${count > 0 ? `<div class="header-actions"><button class="btn btn-outline" onclick="clearAllDownloads()">🗑 Clear All</button></div>` : ''}
                </div>
                <div class="songs-section" style="padding-top:20px">
                ${dlSongs.length === 0
                    ? `<div class="empty-state"><div class="emoji">⬇️</div><p>No songs downloaded yet.</p><p style="font-size:.8rem;margin-top:8px;color:var(--muted)">Tap ⬇ on any song to save it for offline.</p></div>`
                    : `<div>${dlSongs.map((s,i) => `
                        <div class="song-row" onclick="playDownloadedSong(${i})">
                            <div class="song-num">${i+1}</div>
                            <div class="song-row-info">
                                <img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy">
                                <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div>
                            </div>
                            <div class="song-actions" style="opacity:1">
                                <button class="like-btn ${isDownloaded(s.file) ? 'liked' : ''}" style="color:var(--accent);font-size:.75rem;border:1px solid rgba(200,245,66,.2);background:var(--accent3);border-radius:6px;padding:3px 7px;font-family:'Space Mono',monospace" onclick="event.stopPropagation()">⬇ Saved</button>
                                <button class="queue-btn" onclick="event.stopPropagation();removeCachedSong('${escAttr(s.file)}')" title="Remove">✕</button>
                            </div>
                        </div>`).join('')}</div>`}
                </div>`;
            window.__dlSongs = dlSongs;
        }

        window.playDownloadedSong = (i) => {
            if (!window.__dlSongs) return;
            const s = window.__dlSongs[i];
            currentSongs = window.__dlSongs;
            currentArtistKey = null;
            currentIndex = i;
            audio.src = 'songs/' + s.file;
            posterEl.src = s.poster;
            playerTitle.textContent = s.title;
            playerArtist.textContent = s.artistName || '';
            updatePlayerLikeBtn(s.file);
            updatePlayerDlBtn();
            audio.play();
            playBtn.textContent = '⏸';
            addToRecentlyPlayed(s, s.artistName);
        };

        window.clearAllDownloads = async () => {
            if (!confirm('Remove all downloaded songs from offline cache?')) return;
            try {
                await caches.delete(CACHE_NAME);
                downloadedFiles.clear();
                saveDownloadedList();
                refreshSongRows();
                updatePlayerDlBtn();
                showToast('All downloads cleared');
                showDownloads();
            } catch(e) {
                showToast('Error clearing cache');
            }
        };

        // Override audio src to prefer cache when available
        async function getAudioSrc(filePath) {
            try {
                const cache = await caches.open(CACHE_NAME);
                const match = await cache.match(filePath);
                if (match) {
                    const blob = await match.blob();
                    return URL.createObjectURL(blob);
                }
            } catch(e) {}
            return filePath;
        }

        /* ═══════════════════════════════════════
           CORE PLAYER STATE
        ═══════════════════════════════════════ */
        const audio = document.getElementById('audio');
        const progressBar = document.getElementById('progressBar');
        const playBtn = document.getElementById('playBtn');
        const posterEl = document.getElementById('poster');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const volumeSlider = document.getElementById('volumeSlider');

        let currentSongs = [], currentIndex = 0, currentSong = null, currentArtistKey = null;
        let isShuffle = false, isRepeat = false, isMuted = false, prevVol = 1;
        let queue = [], likedSongs = {}, playlists = {}, recentlyPlayed = [];

        function loadState() {
            try { likedSongs = JSON.parse(localStorage.getItem('eq_liked') || '{}') } catch(e) {}
            try { playlists = JSON.parse(localStorage.getItem('eq_playlists') || '{}') } catch(e) {}
            try { recentlyPlayed = JSON.parse(localStorage.getItem('eq_recent') || '[]') } catch(e) {}
        }

        window._saveLiked = () => localStorage.setItem('eq_liked', JSON.stringify(likedSongs));
        window._savePlaylists = () => localStorage.setItem('eq_playlists', JSON.stringify(playlists));
        window._saveRecent = () => localStorage.setItem('eq_recent', JSON.stringify(recentlyPlayed));

        loadState();
        loadDownloadedList();

        /* ─── RECENTLY PLAYED ─────────────────── */
        function addToRecentlyPlayed(song, artistName) {
            recentlyPlayed = recentlyPlayed.filter(r => r.file !== song.file);
            recentlyPlayed.unshift({ title: song.title, file: song.file, poster: song.poster, artistName });
            if (recentlyPlayed.length > 20) recentlyPlayed = recentlyPlayed.slice(0, 20);
            window._saveRecent();
            renderSidebarRecent();
        }

        function renderSidebarRecent() {
            const wrap = document.getElementById('sidebarRecent');
            const list = document.getElementById('sidebarRecentList');
            if (!recentlyPlayed.length) { wrap.style.display = 'none'; return; }
            wrap.style.display = 'block';
            list.innerHTML = recentlyPlayed.slice(0, 5).map(r => `
                <div class="recent-item" onclick="playRecentSong('${escAttr(r.file)}')">

                    <div><div class="recent-item-title">${escHtml(r.title)}</div><div class="recent-item-artist">${escHtml(r.artistName)}</div></div>
                </div>`).join('');
        }

        function playRecentSong(fileId) {
            for (let key in artists) {
                const idx = artists[key].songs.findIndex(s => s.file === fileId);
                if (idx !== -1) {
                    currentSongs = artists[key].songs;
                    currentArtistKey = key;
                    openArtist(key);
                    playSong(idx);
                    return;
                }
            }
        }

        function showRecentlyPlayed() {
            setNavActive('navRecent');
            setMobileBack(true);
            document.getElementById('mainArea').innerHTML = `
                <div class="main-header">
                    <div><div class="main-title">Recently Played</div><div class="main-subtitle">${recentlyPlayed.length} TRACKS</div></div>
