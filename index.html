<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FalconX</title>
    <link rel="icon" type="image/jpeg" href="images/falcon.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }
        
         :root {
            --bg: #0a0a0a;
            --bg2: #121212;
            --surface: #181818;
            --surface2: #1f1f1f;
            --surface3: #282828;
            --surface4: #333333;
            --accent: #c8f542;
            --accent2: #a8d930;
            --accent3: rgba(200, 245, 66, .08);
            --accent-glow: rgba(200, 245, 66, .2);
            --text: #ffffff;
            --text2: #b3b3b3;
            --muted: #535353;
            --muted2: #727272;
            --border: rgba(255, 255, 255, .06);
            --border2: rgba(255, 255, 255, .1);
            --player-h: 88px;
            --sidebar-w: 280px;
            --radius: 12px;
            --radius-sm: 8px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        body {
            background: radial-gradient(circle at top, #1a1a1a 0%, #0a0a0a 60%);
        }
        
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg)
        }
        
        body {
            font-family: 'Circular Std', 'Circular', 'Spotify Mix', 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: var(--text);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-rows: 1fr var(--player-h);
            height: 100dvh;
            font-weight: 400;
        }
        
        .sidebar {
            grid-row: 1;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
            gap: 8px;
            padding: 8px;
        }
        
        .sidebar-logo-block {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px 18px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 4px;
            color: var(--text);
        }
        
        .logo-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .logo-icon img {
            width: 34px;
            height: 34px;
            object-fit: cover;
            border-radius: 8px
        }
        
        .sync-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Circular Std', 'Circular', 'Spotify Mix', 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: .5rem;
            color: var(--muted2);
            padding: 3px 8px;
            background: var(--surface2);
            border-radius: 20px;
        }
        
        .sync-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted)
        }
        
        .sync-dot.synced {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(200, 245, 66, .6)
        }
        
        .sync-dot.syncing {
            background: #f5c842;
            animation: blink .7s infinite
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: .3
            }
        }
        
        .sidebar-nav-block {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 8px;
            flex-shrink: 0;
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            background: none;
            border: none;
            color: var(--text2);
            font-family: 'Circular Std', 'Circular', 'Spotify Mix', 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            text-align: left;
        }
        
        .nav-btn:hover {
            background: var(--surface2);
            color: var(--text)
        }
        
        .nav-btn.active {
            color: var(--text)
        }
        
        .nav-btn.active .nav-icon-wrap {
            color: var(--accent)
        }
        
        .nav-icon-wrap {
            width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: color .15s;
        }
        
        .sidebar-library-block {
            background: var(--surface);
            border-radius: var(--radius);
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .library-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px 8px;
            flex-shrink: 0;
        }
        
        .library-title {
            font-size: .78rem;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: .5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .library-title span {
            font-size: .9rem
        }
        
        .artists-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .artists-list::-webkit-scrollbar {
            width: 3px
        }
        
        .artists-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 3px
        }
        
        .artist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background .12s;
        }
        
        .artist-item:hover {
            background: var(--surface2)
        }
        
        .artist-item.active {
            background: var(--surface3)
        }
        
        .artist-item img {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .artist-item-name {
            font-size: .8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text2);
        }
        
        .artist-item.active .artist-item-name {
            color: var(--text)
        }
        
        .sidebar-account-block {
            background: var(--surface);
            border-radius: var(--radius);
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 14px 16px;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'Circular Std', 'Circular', 'Spotify Mix', 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
            text-align: left;
        }
        
        .google-btn:hover {
            background: var(--surface2)
        }
        
        .google-btn-icon {
            width: 36px;
            height: 36px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .google-btn-icon svg {
            width: 18px;
            height: 18px
        }
        
        .google-btn-text {
            display: flex;
            flex-direction: column;
            gap: 1px
        }
        
        .google-btn-label {
            font-size: .75rem;
            color: var(--text2);
            font-weight: 400
        }
        
        .user-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            flex-shrink: 0;
        }
        
        .user-bar-info {
            flex: 1;
            overflow: hidden
        }
        
        .user-bar-name {
            font-size: .82rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .user-bar-email {
            font-size: .65rem;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .signout-btn {
            background: none;
            border: 1px solid var(--border2);
            color: var(--text2);
            font-family: 'Circular Std', 'Circular', 'Spotify Mix', 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: .7rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .signout-btn:hover {
            color: #ff5555;
            border-color: #ff5555
        }
        
        .main {
            grid-column: 2;
            grid-row: 1;
            overflow-y: auto;
            background: var(--bg2);
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .main::-webkit-scrollbar {
            width: 4px
        }
        
        .main::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 4px
        }
        
        .main-topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(18, 18, 18, .85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .nav-arrows {
            display: flex;
            gap: 6px
        }
        
        .nav-arrow-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, .6);
            border: none;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
            flex-shrink: 0;
        }
        
        .nav-arrow-btn:hover {
            background: rgba(255, 255, 255, .1)
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            flex: 1;
            max-width: 380px;
        }
        
        .search-icon {
            position: absolute;
            left: 13px;
            color: var(--muted2);
            font-size: .9rem;
            pointer-events: none;
            z-index: 1;
        }
        
        .search-box input {
            width: 100%;
            background: var(--surface3);
            border: 2px solid transparent;
            border-radius: 500px;
            padding: 10px 16px 10px 40px;
            color: var(--text);
            font-family: 'Circular Std', 'Circular', 'Spotify Mix', 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: .88rem;
            outline: none;
            transition: all .2s;
        }
        
        .search-box input:focus {
            border-color: var(--text);
            background: var(--surface3);
        }
        
        .search-box input::placeholder {
            color: var(--muted2)
        }
        
        .search-clear {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text2);
            font-size: .8rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            transition: color .15s;
        }
        
        .search-clear.visible {
            display: flex
        }
        
        .search-clear:hover {
            color: var(--text)
        }
        
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto
        }
        
        .topbar-icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0, 0, 0, .4);
            border: none;
            color: var(--text2);
            font-size: .9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }
        
        .topbar-icon-btn:hover {
            background: rgba(255, 255, 255, .1);
            color: var(--text)
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 24px 16px;
        }
        
        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -.3px;
        }
        
        .section-link {
            font-size: .75rem;
            font-weight: 700;
            color: var(--text2);
            background: none;
            border: none;
            cursor: pointer;
            transition: color .15s;
            letter-spacing: .5px;
            text-transform: uppercase;
        }
        
        .section-link:hover {
            color: var(--text);
            text-decoration: underline
        }
        
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            padding: 0 24px 24px;
        }
        
        .artist-card {
            cursor: pointer;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
            transition: background .2s;
            position: relative;
            padding: 16px;
        }
        
        .artist-card:hover {
            background: var(--surface3)
        }
        
        .artist-card-img-wrap {
            position: relative;
            margin-bottom: 12px;
        }
        
        .artist-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
        }
        
        .artist-card-name {
            font-size: .9rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .artist-card-count {
            font-size: .78rem;
            color: var(--text2);
        }
        
        .card-play-btn {
            position: absolute;
            bottom: -4px;
            right: 0;
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            color: #000;
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: translateY(8px);
            transition: all .25s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
        }
        
        .artist-card:hover .card-play-btn {
            opacity: 1;
            transform: translateY(0);
        }
        
        .artist-hero {
            position: relative;
            height: 280px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 32px 28px;
        }
        
        .artist-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 20%;
            filter: blur(0px) brightness(.35);
            transform: scale(1.03);
        }
        
        .artist-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg2) 0%, rgba(18, 18, 18, .6) 50%, transparent 100%);
        }
        
        .artist-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            gap: 24px;
            width: 100%;
        }
        
        .artist-hero-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 60px rgba(0, 0, 0, .8);
            flex-shrink: 0;
        }
        
        .artist-hero-tag {
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 8px;
            opacity: .8;
        }
        
        .artist-hero-name {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 12px;
        }
        
        .artist-hero-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 16px
        }
        
        .songs-section {
            padding: 0 24px 80px
        }
        
        .songs-table-header {
            display: grid;
            grid-template-columns: 40px 1fr auto;
            padding: 0 16px 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }
        
        .th {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text2);
        }
        
        .song-row {
            display: grid;
            grid-template-columns: 40px 1fr auto;
            align-items: center;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background .12s;
            gap: 8px;
        }
        
        .song-row:hover {
            background: rgba(255, 255, 255, .06)
        }
        
        .song-row.playing {
            background: rgba(200, 245, 66, .05)
        }
        
        .song-num {
            font-size: .85rem;
            color: var(--text2);
            text-align: center;
            font-family: 'Circular Std', 'Circular', 'Spotify Mix', 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        
        .song-row.playing .song-num {
            color: var(--accent)
        }
        
        .song-row-info {
            display: flex;
            align-items: center;
            gap: 14px
        }
        
        .song-row-info img {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .song-row-text h4 {
            font-size: .9rem;
            font-weight: 600
        }
        
        .song-row.playing .song-row-text h4 {
            color: var(--accent)
        }
        
        .song-row-text p {
            font-size: .78rem;
            color: var(--text2);
            margin-top: 2px
        }
        
        .song-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transition: opacity .15s;
        }
        
        .song-row:hover .song-actions {
            opacity: 1
        }
        
        .like-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: transform .2s;
            line-height: 1;
            color: var(--text2);
        }
        
        .like-btn:hover {
            transform: scale(1.2);
            color: var(--text)
        }
        
        .like-btn.liked {
            color: var(--accent)
        }
        
        .dl-btn {
            background: none;
            border: none;
            color: var(--text2);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .8rem;
            transition: all .2s;
        }
        
        .dl-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .1)
        }
        
        .dl-btn.downloaded {
            color: var(--accent)
        }
        
        .queue-btn {
            background: none;
            border: none;
            color: var(--text2);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .8rem;
            transition: all .2s;
        }
        
        .queue-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .1)
        }
        
        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
            width: 16px;
            margin: 0 auto
        }
        
        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            animation: eq .6s ease-in-out infinite alternate
        }
        
        .eq-bar:nth-child(1) {
            animation-delay: 0s
        }
        
        .eq-bar:nth-child(2) {
            animation-delay: .15s
        }
        
        .eq-bar:nth-child(3) {
            animation-delay: .3s
        }
        
        @keyframes eq {
            from {
                height: 3px
            }
            to {
                height: 13px
            }
        }
        
        .player {
            grid-column: 1/-1;
            grid-row: 2;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr 280px;
            align-items: center;
            padding: 0 16px;
            position: relative;
            z-index: 20;
        }
        
        .player-song {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px;
            overflow: hidden;
        }
        
        .player-poster {
            width: 56px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform .2s;
        }
        
        .player-poster:hover {
            transform: scale(1.05)
        }
        
        .player-song-title {
            font-size: .85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }
        
        .player-song-artist {
            font-size: .75rem;
            color: var(--text2);
            margin-top: 3px;
        }
        
        .player-song-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 3px
        }
        
        .offline-badge {
            display: inline-flex;

        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            overflow: hidden;
            background: radial-gradient(1200px 700px at 15% -10%, rgba(200, 245, 66, .14), transparent 60%), radial-gradient(900px 620px at 85% 110%, rgba(168, 217, 48, .12), transparent 62%), linear-gradient(160deg, #060606 0%, #0b0b0b 45%, #111 100%);
            animation: splashOut .7s cubic-bezier(.35, 0, .2, 1) 2.7s forwards;
        }
        
        #splash::before {
            content: "";
            position: absolute;
            inset: -20%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, .08), transparent 56%);
            animation: splashBgDrift 4.2s linear infinite;
            pointer-events: none;
        }
        
        .splash-inner {
            position: relative;
            width: min(430px, 88vw);
            text-align: center;
            padding: 34px 30px 28px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .02));
            box-shadow: 0 24px 80px rgba(0, 0, 0, .55), inset 0 1px 0 rgba(255, 255, 255, .1);
            backdrop-filter: blur(10px);
            animation: splashIn 1.05s cubic-bezier(.16, 1, .3, 1) both;
        }
        
        .splash-logo-wrap {
            width: 118px;
            height: 118px;
            border-radius: 50%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            position: relative;
            box-shadow: none;
            animation: splashFloat 2.6s ease-in-out infinite;
        }
        
        .splash-logo-wrap::after {
            content: none;
        }
        
        .splash-logo-wrap img {
            width: 108px;
            height: 108px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 14px 34px rgba(0, 0, 0, .45);
        }
        
        .splash-name {
            font-size: clamp(2rem, 4.8vw, 2.75rem);
            font-weight: 900;
            font-style: italic;
            letter-spacing: .42rem;
            text-transform: uppercase;
            opacity: 0;
            animation: splashTextReveal .8s ease .2s forwards;
        }
        
        .splash-name span {
            color: var(--accent)
        }
        
        .splash-tagline {
            font-family: 'Circular Std', 'Circular', 'Spotify Mix', 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: .58rem;
            color: #d5d5d5;
            letter-spacing: .22rem;
            margin-top: 10px;
            opacity: 0;
            animation: splashTextReveal .8s ease .36s forwards;
        }
        
        .splash-status {
            margin-top: 10px;
            font-size: .74rem;
            color: rgba(255, 255, 255, .75);
            letter-spacing: .04rem;
            opacity: 0;
            animation: splashTextReveal .8s ease .48s forwards;
        }
        
        .splash-bar {
            width: 170px;
            height: 3px;
            background: rgba(255, 255, 255, .16);
            border-radius: 999px;
            margin: 16px auto 0;
            overflow: hidden;
        }
        
        .splash-bar-fill {
            width: 0;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent2), var(--accent), #f0ffad);
            box-shadow: 0 0 18px rgba(200, 245, 66, .4);
            animation: splashLoad 1.85s cubic-bezier(.22, .61, .36, 1) .45s forwards;
        }
        
        @keyframes splashLoad {
            from {
                width: 0
            }
            to {
                width: 100%
            }
        }
        
        @keyframes splashIn {
            from {
                opacity: 0;
                transform: scale(.93) translateY(18px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }
        
        @keyframes splashOut {
            to {
                opacity: 0;
                visibility: hidden;
                transform: scale(1.02);
                filter: blur(2px)
            }
        }
        
        @keyframes splashBgDrift {
            0% {
                transform: translate3d(-1%, -1%, 0)
            }
            50% {
                transform: translate3d(1.5%, 1%, 0)
            }
            100% {
                transform: translate3d(-1%, -1%, 0)
            }
        }
        
        @keyframes splashFloat {
            0%,
            100% {
                transform: translateY(0)
            }
            50% {
                transform: translateY(-5px)
            }
        }
        
        @keyframes splashRingPulse {
            0% {
                opacity: .7;
                transform: scale(1)
            }
            100% {
                opacity: 0;
                transform: scale(1.14)
            }
        }
        
        @keyframes splashTextReveal {
            from {
                opacity: 0;
                transform: translateY(7px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }
        
        @media (max-width: 768px) {
            .splash-inner {
                padding: 28px 22px 22px;

            }
        }

        async function processQueue() {
            if (dlBusy || dlPaused) return;
            const next = dlQueue.find(i => i.status === 'queued');
            if (!next) return;
            dlBusy = true;
            next.status = 'active';
            next.progress = 10;
            renderDpItem(next);
            updateDpStats();
            try {
                const url = 'songs/' + next.song.file;
                let cache;
                try {
                    cache = await caches.open(CACHE_NAME);
                } catch (e) {
                    throw new Error('Cache API not available');
                }
                const resp = await fetch(url, {
                    method: 'GET'
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const contentLength = resp.headers.get('Content-Length');
                if (contentLength) {
                    const total = parseInt(contentLength, 10);
                    const reader = resp.body.getReader();
                    const chunks = [];
                    let received = 0;
                    while (true) {
                        const {
                            done,
                            value
                        } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        received += value.length;
                        next.progress = Math.round(10 + (received / total) * 85);
                        renderDpItem(next);
                    }
                    const blob = new Blob(chunks);
                    await cache.put(url, new Response(blob, {
                        headers: {
                            'Content-Type': 'audio/mpeg'
                        }
                    }));
                } else {
                    next.progress = 40;
                    renderDpItem(next);
                    await cache.put(url, resp);
                    next.progress = 80;
                    renderDpItem(next);
                }
                try {
                    const ir = await fetch(next.song.poster);
                    if (ir.ok) await cache.put(next.song.poster, ir);
                } catch (e) {}
                downloadedFiles.add(next.song.file);
                saveDownloaded();
                next.status = 'done';
                next.progress = 100;
                renderDpItem(next);
                updateDpStats();
                updatePlayerDlBtn();
                refreshSongRows();
                showToast('"' + next.song.title + '" saved ?');
                setTimeout(() => {
                    const el = document.getElementById('dpi_' + next.id);
                    if (el) {
                        el.style.opacity = '0';
                        el.style.transition = 'opacity .4s';
                        setTimeout(() => el.remove(), 400);
                    }
                    dlQueue = dlQueue.filter(i => i.id !== next.id);
                    updateDpStats();
                }, 3000);
            } catch (err) {
                next.status = 'error';
                next.progress = 0;
                renderDpItem(next);
                updateDpStats();
                showToast('Download failed');
                console.error('DL error:', err);
            }
            dlBusy = false;
            processQueue();
        }

            if (type === 'recent') return 'Recently Added';

        function getSortedPlaylistSongs(plId, type = currentPlaylistSortType) {
            const pl = playlists[plId];
            if (!pl || !Array.isArray(pl.songs)) return [];
            const base = pl.songs.map((song, index) => ({
                ...song,
                __baseIndex: index
            }));
            const sorted = [...base];
            if (type === 'recent') {
                sorted.sort((a, b) => {
                    const ad = Number.isFinite(a.addedAt) ? a.addedAt : 0;
                    const bd = Number.isFinite(b.addedAt) ? b.addedAt : 0;
                    if (bd !== ad) return bd - ad;
                    return b.__baseIndex - a.__baseIndex;
                });
            } else if (type === 'title') {
                sorted.sort((a, b) => a.title.localeCompare(b.title) || a.__baseIndex - b.__baseIndex);
            } else if (type === 'artist') {
                sorted.sort((a, b) => (a.artistName || '').localeCompare(b.artistName || '') || a.title.localeCompare(b.title) || a.__baseIndex - b.__baseIndex);
            } else if (type === 'plays') {
                sorted.sort((a, b) => {
                    const ap = songPlayCounts[a.file] || 0;
                    const bp = songPlayCounts[b.file] || 0;
                    if (bp !== ap) return bp - ap;
                    return a.title.localeCompare(b.title) || a.__baseIndex - b.__baseIndex;
                });
            }
            return sorted.map((song) => {
                const out = {...song};
                delete out.__baseIndex;

        function songRowHTML(song,i,artistName) { const playing=currentSong&&currentSong.file===song.file&&!audio.paused; const liked=likedSongs.has(song.file); const dl=isDownloaded(song.file); return`<div class="song-row${playing?' playing':''}" id="row_${i}" onclick="playSong(${i},true)"><div class="song-num">${playing?'<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>':i+1}</div><div class="song-row-info"><img src="${song.poster}" onerror="this.style.background='#282828'" loading="lazy"><div class="song-row-text"><h4>${escH(song.title)}</h4><p>${escH(artistName)}</p></div></div><div class="song-actions"><button class="like-btn${liked?' liked':''}" onclick="event.stopPropagation();toggleLike('${escA(song.file)}',${i})">${liked?'&#10084;':'&#9825;'}</button><button class="dl-btn${dl?' downloaded':''}" onclick="event.stopPropagation();handleDlBtn(this,'${escA(song.file)}')" title="${dl?'Remove':'Download'}">${dl?'&#10003;':'&#11015;'}</button><button class="queue-btn" onclick="event.stopPropagation();showAddToPlaylistMenu(event,'${escA(song.file)}',${i})" title="Add to playlist">&#127911;</button><button class="queue-btn" onclick="event.stopPropagation();addToQueue(${i})" title="Add to queue">+</button></div></div>`; }

        async function playSong(index, manualSelection = false) {
            if (!currentSongs[index]) return;
            currentIndex = index;
            const song = currentSongs[index];
            const previousSongFile = currentSong ? currentSong.file : null;
            if (manualSelection && isRepeat && previousSongFile && previousSongFile !== song.file) {
                isRepeat = false;
                localStorage.setItem('eq_repeat', 'false');
            }
            currentSong = song;
            trackSongPlay(song.file);
            if (crossfadeTimer) {
                clearInterval(crossfadeTimer);
                crossfadeTimer = null;
            }
            const targetVol = isMuted ? 0 : (parseFloat(volumeSlider.value) || 1);
            if (!audio.paused && audio.currentTime > 0) {
                audioFade.src = audio.src;
                audioFade.currentTime = audio.currentTime;
                audioFade.volume = targetVol;
                audioFade.play().catch(() => {});
                let fv = targetVol;
                crossfadeTimer = setInterval(() => {
                    fv = Math.max(0, fv - targetVol / 15);
                    audioFade.volume = fv;
                    if (fv <= 0) {
                        audioFade.pause();
                        audioFade.src = '';
                        clearInterval(crossfadeTimer);
                        crossfadeTimer = null;
                    }
                }, 50);
            }
            const src = await getAudioSrc('songs/' + song.file);
            audio.src = src;
            audio.volume = 0;
            posterEl.src = song.poster;
            playerTitle.textContent = song.title;
            const artistKey = currentArtistKey || Object.keys(artists).find((k) => artists[k].songs === currentSongs);
            const artistName = artistKey ? artists[artistKey].name : (song.artistName || '');
            playerArtist.textContent = artistName;
            updatePlayerLikeBtn(song.file);
            updatePlayerDlBtn();
            audio.play().then(() => {
                let v = 0;
                const fi = setInterval(() => {
                    v = Math.min(targetVol, v + targetVol / 15);
                    audio.volume = v;
                    if (v >= targetVol) {
                        audio.volume = targetVol;
                        clearInterval(fi);
                    }
                }, 50);
            }).catch(() => {
                audio.volume = targetVol;
            });
            playBtn.innerHTML = '&#9208;';
            document.getElementById('fsPoster').src = song.poster;
            document.getElementById('fsTitle').textContent = song.title;
            document.getElementById('fsArtist').textContent = artistName;
            document.getElementById('fsPlay').innerHTML = '&#9208;';
            if (currentArtistKey) refreshSongRows();
            if (currentPlaylistId && document.getElementById('playlistSongsList')) updatePlaylistPlayingState(true);
            shuffleHistory.push(song.file);
            if (shuffleHistory.length > 30) shuffleHistory = shuffleHistory.slice(-30);
            localStorage.setItem('eq_shuffle_history', JSON.stringify(shuffleHistory));
            const sh = {
                file: song.file,
                title: song.title,
                poster: song.poster,
                artistKey: currentArtistKey,
                artistName
            };
            const ei = continueListening.findIndex((s) => s.file === song.file);
            if (ei >= 0) continueListening.splice(ei, 1);

        }
        document.addEventListener('DOMContentLoaded', setupMobileNav);

        window.syncMobileAuthUI = syncMobileAuthUI;

        
        window.playSong = playSong; window.next = next; window.previous = previous;
        window.togglePlay = togglePlay; window.toggleShuffle = toggleShuffle; window.toggleRepeat = toggleRepeat; window.toggleMute = toggleMute;
        window.toggleQueuePanel = toggleQueuePanel; window.addToQueue = addToQueue;
        window.openArtist = openArtist; window.loadArtists = loadArtists; window.showLikedSongs = showLikedSongs; window.showDownloads = showDownloads; window.showPlaylists = showPlaylists; window.refreshLikedDisplay = refreshLikedDisplay;
        window.playArtist = playArtist; window.shuffleArtist = shuffleArtist; window.toggleLike = toggleLike; window.globalSearch = globalSearch;

        // -- INIT --
        buildSidebar();
        loadArtists();
        loadPlaybackMemory();
        renderQueuePanel();

        if(!('caches' in window)){ console.warn('Cache API not available.'); document.querySelectorAll('.dl-btn,.player-dl-btn,.dl-queue-btn').forEach(el=>el.style.display='none'); }

      
        if(window.innerWidth <= 768) {
            const playerEl = document.querySelector('.player');
            if(playerEl) {
                playerEl.addEventListener('click', function(e) {
                    if(e.target.closest('button')) return;
                    if(currentSong) openFullPlayer();
                });
            }
        }

        setTimeout(() => { document.body.classList.remove('loading'); }, 3200);
    </script>
