                <div class="songs-section" style="padding-top:20px">
                ${recentlyPlayed.length === 0
                    ? '<div class="empty-state"><div class="emoji">🕐</div><p>No recently played songs yet.</p></div>'
                    : `<div>${recentlyPlayed.map((s,i) => `
                        <div class="song-row" onclick="playRecentSong('${escAttr(s.file)}')">
                            <div class="song-num">${i+1}</div>
                            <div class="song-row-info">
                                <img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy">
                                <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div>
                            </div>
                            <div class="song-actions">
                                <button class="like-btn ${likedSongs[s.file] ? 'liked' : ''}" onclick="event.stopPropagation();toggleLike('${escAttr(s.file)}')">${likedSongs[s.file] ? '❤️' : '🤍'}</button>
                                <button class="dl-btn ${isDownloaded(s.file) ? 'downloaded' : ''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(s.file)}')" title="${isDownloaded(s.file) ? 'Downloaded' : 'Download'}">${isDownloaded(s.file) ? '✓' : '⬇'}</button>
                            </div>
                        </div>`).join('')}</div>`}
                </div>`;
        }

        /* ─── SIDEBAR ─────────────────────────── */
        function buildSidebar() {
            const sb = document.getElementById('sidebarArtists');
            sb.innerHTML = '';
            for (let key in artists) {
                const a = artists[key];
                sb.innerHTML += `<div class="artist-item" id="sb_${key}" onclick="openArtist('${key}')">
                    <img src="${a.image}" onerror="this.style.background='#16162a'">
                    <span class="artist-item-name">${a.name}</span>
                </div>`;
            }
        }

        /* ─── ARTISTS GRID ─────────────────────── */
        function loadArtists() {
            setNavActive('navHome');
            setMobileBack(false);
            const keys = Object.keys(artists);
            document.getElementById('mainArea').innerHTML = `
                <div class="main-header">
                    <div><div class="main-title">Artists</div><div class="main-subtitle">${keys.length} ARTISTS IN YOUR LIBRARY</div></div>
                    <div class="header-actions">
                        <button class="btn btn-outline" onclick="showLikedSongs()">❤️ Favorites</button>
                        <button class="btn btn-outline" onclick="showRecentlyPlayed()">🕐 Recent</button>
                    </div>
                </div>
                <div class="artists-grid">
                    ${keys.map(key => { const a = artists[key]; return `
                        <div class="artist-card" onclick="openArtist('${key}')">
                            <img src="${a.image}" onerror="this.style.background='#16162a'" loading="lazy">
                            <div class="artist-card-overlay">
                                <div class="artist-card-name">${a.name}</div>
                                <div class="artist-card-count">${a.songs.length} tracks</div>
                            </div>
                            <button class="card-play-btn" onclick="event.stopPropagation();playArtist('${key}')">▶</button>
                        </div>`; }).join('')}
                </div>`;
        }

        /* ─── OPEN ARTIST ─────────────────────── */
        function openArtist(key) {
            currentArtistKey = key;
            const a = artists[key];
            currentSongs = a.songs;
            setSidebarActive(key);
            setMobileBack(true);
            document.getElementById('mainArea').innerHTML = `
                <div class="artist-hero">
                    <div class="artist-hero-bg" style="background-image:url('${a.image}')"></div>
                    <div class="artist-hero-overlay"></div>
                    <div class="artist-hero-content">
                        <img class="artist-hero-img" src="${a.image}" onerror="this.style.background='#16162a'">
                        <div class="artist-hero-info">
                            <div class="artist-hero-tag">Artist</div>
                            <div class="artist-hero-name">${a.name}</div>
                            <div class="artist-hero-count">${a.songs.length} songs</div>
                            <div class="artist-hero-actions">
                                <button class="btn btn-accent" onclick="playArtist('${key}')">▶ Play All</button>
                                <button class="btn btn-outline" onclick="shuffleArtist('${key}')">⇄ Shuffle</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="songs-section" style="padding-top:20px">
                    <div class="songs-table-header">
                        <span class="th">#</span>
                        <span class="th">Title</span>
                        <span class="th"></span>
                    </div>
                    <div id="songsList">${a.songs.map((s,i) => songRowHTML(s, i, a.name)).join('')}</div>
                </div>`;
        }

        /* ─── SONG ROW ─────────────────────────── */
        function songRowHTML(song, i, artistName) {
            const playing = currentSong && currentSong.file === song.file && !audio.paused;
            const liked = likedSongs[song.file];
            const dl = isDownloaded(song.file);
            return `<div class="song-row${playing ? ' playing' : ''}" id="row_${i}" onclick="playSong(${i})">
                <div class="song-num">${playing ? '<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>' : i+1}</div>
                <div class="song-row-info">
                    <img src="${song.poster}" onerror="this.style.background='#16162a'" loading="lazy">
                    <div class="song-row-text"><h4>${escHtml(song.title)}</h4><p>${escHtml(artistName)}</p></div>
                </div>
                <div class="song-actions">
                    <button class="like-btn ${liked ? 'liked' : ''}" onclick="event.stopPropagation();toggleLike('${escAttr(song.file)}',${i})">${liked ? '❤️' : '🤍'}</button>
                    <button class="dl-btn ${dl ? 'downloaded' : ''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(song.file)}')" title="${dl ? 'Downloaded — click to remove' : 'Download for offline'}">${dl ? '✓' : '⬇'}</button>
                    <button class="queue-btn" onclick="event.stopPropagation();addToQueue(${i})" title="Add to queue">＋</button>
                </div>
            </div>`;
        }

        /* Handle dl-btn click: download or remove */
        window.handleDlBtn = async (btn, fileId) => {
            if (isDownloaded(fileId)) {
                btn.textContent = '↻';
                btn.classList.add('downloading');
                await removeCachedSong(fileId);
                btn.classList.remove('downloading', 'downloaded');
                btn.textContent = '⬇';
            } else {
                // find song object
                let song = null;
                for (let key in artists) {
                    song = artists[key].songs.find(s => s.file === fileId);
                    if (song) break;
                }
                if (song) await downloadSong(song, btn);
            }
        };

        function refreshSongRows() {
            if (!currentArtistKey) return;
            const list = document.getElementById('songsList');
            if (!list) return;
            list.innerHTML = artists[currentArtistKey].songs.map((s,i) => songRowHTML(s, i, artists[currentArtistKey].name)).join('');
        }

        /* ─── PLAY SONG ─────────────────────────── */
        async function playSong(index) {
            if (!currentSongs[index]) return;
            currentIndex = index;
            const song = currentSongs[index];
            currentSong = song;

            // Prefer cached version
            const src = await getAudioSrc('songs/' + song.file);
            audio.src = src;
            posterEl.src = song.poster;
            playerTitle.textContent = song.title;
            const artistKey = currentArtistKey || Object.keys(artists).find(k => artists[k].songs === currentSongs);
            const artistName = artistKey ? artists[artistKey].name : (song.artistName || '');
            playerArtist.textContent = artistName;

            updatePlayerLikeBtn(song.file);
            updatePlayerDlBtn();
            audio.play();
            playBtn.textContent = '⏸';

            document.getElementById('fsPoster').src = song.poster;
            document.getElementById('fsTitle').textContent = song.title;
            document.getElementById('fsArtist').textContent = artistName;
            document.getElementById('fsPlay').textContent = '⏸';

            refreshSongRows();
            addToRecentlyPlayed(song, artistName);

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title, artist: artistName,
                    artwork: [{ src: song.poster }]
                });
            }
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playBtn.textContent = '⏸'; document.getElementById('fsPlay').textContent = '⏸'; }
            else { audio.pause(); playBtn.textContent = '▶'; document.getElementById('fsPlay').textContent = '▶'; }
        }

        function next() {
            if (queue.length > 0) {
                const s = queue.shift();
                audio.src = 'songs/' + s.file;
                posterEl.src = s.poster;
                playerTitle.textContent = s.title;
                audio.play(); playBtn.textContent = '⏸'; return;
            }
            if (!currentSongs.length) return;
            currentIndex = isShuffle ? Math.floor(Math.random() * currentSongs.length) : (currentIndex + 1) % currentSongs.length;
            playSong(currentIndex);
        }

        function previous() {
            if (!currentSongs.length) return;
            if (audio.currentTime > 3) { audio.currentTime = 0; return; }
            currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
            playSong(currentIndex);
        }

        function playArtist(key) { currentSongs = artists[key].songs; currentArtistKey = key; currentIndex = 0; playSong(0); }
        function shuffleArtist(key) { currentSongs = artists[key].songs; currentArtistKey = key; currentIndex = Math.floor(Math.random() * currentSongs.length); playSong(currentIndex); }

        function seek(e) {
            if (!audio.duration) return;
            const r = document.getElementById('progressTrack').getBoundingClientRect();
            audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
        }

        function addToQueue(index) { queue.push(currentSongs[index]); showToast('Added to queue ✓'); }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffleBtn').classList.toggle('on', isShuffle); }
        function toggleRepeat() { isRepeat = !isRepeat; audio.loop = isRepeat; document.getElementById('repeatBtn').classList.toggle('on', isRepeat); }

        function toggleMute() {
            if (isMuted) { audio.volume = prevVol; volumeSlider.value = prevVol; isMuted = false; }
            else { prevVol = audio.volume || 1; audio.volume = 0; volumeSlider.value = 0; isMuted = true; }
        }

        /* ─── LIKES ─────────────────────────────── */
        function toggleLike(fileId, rowIndex) {
            if (likedSongs[fileId]) delete likedSongs[fileId]; else likedSongs[fileId] = true;
            window._saveLiked();
            if (rowIndex !== undefined) refreshSongRows();
            updatePlayerLikeBtn(fileId);
        }

        function togglePlayerLike() { if (!currentSong) return; toggleLike(currentSong.file); }
        function updatePlayerLikeBtn(f) { document.getElementById('playerLikeBtn').textContent = likedSongs[f] ? '❤️' : '🤍'; }

        /* ─── FAVORITES / PLAYLISTS ─────────────── */
        function showLikedSongs() {
            setNavActive('navFav');
            setMobileBack(true);
            currentSongs = [];
            const liked = [];
            for (let key in artists) artists[key].songs.forEach(s => { if (likedSongs[s.file]) liked.push({...s, artistName: artists[key].name, artistKey: key}); });
            const pNames = Object.keys(playlists);

            document.getElementById('mainArea').innerHTML = `
                <div class="main-header">
                    <div><div class="main-title">Favorites</div><div class="main-subtitle">${liked.length} LIKED</div></div>
                </div>
                <div class="songs-section" style="padding-top:20px">
                    <div class="playlist-create-wrap">
                        <div class="playlist-create-title">📁 Create New Playlist</div>
                        <div class="playlist-create-row">
                            <input type="text" id="newPlaylistInput" placeholder="Playlist name…" maxlength="40" onkeydown="if(event.key==='Enter')createPlaylistFromFav()">
                            <button onclick="createPlaylistFromFav()">Create</button>
                        </div>
                    </div>
                    ${pNames.length > 0 ? `<div class="playlists-list-wrap">
                        <div class="playlists-list-title">🎵 Your Playlists</div>
                        ${pNames.map(n => `<div class="playlist-item" onclick="openPlaylist('${escAttr(n)}')">
                            <div class="playlist-item-left"><div class="playlist-item-icon">🎵</div>
                                <div><div class="playlist-item-name">${escHtml(n)}</div><div class="playlist-item-count">${playlists[n].length} song${playlists[n].length !== 1 ? 's' : ''}</div></div>
                            </div>
                            <button class="playlist-item-delete" onclick="event.stopPropagation();deletePlaylist('${escAttr(n)}')">✕</button>
                        </div>`).join('')}
                    </div>` : ''}
                    <div class="fav-section-label">❤️ Liked Songs</div>
                    ${liked.length === 0
                        ? '<div class="empty-state"><div class="emoji">🎵</div><p>No favorites yet. Like songs to see them here.</p></div>'
                        : `<div>${liked.map((s,i) => `
                            <div class="song-row" onclick="playLikedSong(${i})">
                                <div class="song-num">${i+1}</div>
                                <div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy">
                                    <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div>
                                </div>
                                <div class="song-actions">
                                    <button class="like-btn liked" onclick="event.stopPropagation();toggleLikeFav('${escAttr(s.file)}',this)">❤️</button>
                                    <button class="dl-btn ${isDownloaded(s.file) ? 'downloaded' : ''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(s.file)}')" title="${isDownloaded(s.file) ? 'Downloaded' : 'Download'}">${isDownloaded(s.file) ? '✓' : '⬇'}</button>
                                    <div class="add-to-playlist-wrap" id="apw_${i}">
                                        <button class="queue-btn" onclick="event.stopPropagation();togglePlaylistDropdown(${i})">＋</button>
                                        <div class="add-to-playlist-dropdown" id="apd_${i}" style="display:none">
                                            ${Object.keys(playlists).length === 0
                                                ? '<span class="no-playlists">No playlists yet</span>'
                                                : Object.keys(playlists).map(p => `<button onclick="event.stopPropagation();addSongToPlaylist('${escAttr(p)}','${escAttr(s.file)}',${i})">${escHtml(p)}</button>`).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>`).join('')}</div>`}
                </div>`;
            window.__likedList = liked;
        }

        function playLikedSong(i) {
            const s = window.__likedList[i];
            currentSongs = window.__likedList; currentArtistKey = null; currentIndex = i;
            audio.src = 'songs/' + s.file;
            posterEl.src = s.poster;
            playerTitle.textContent = s.title;
            playerArtist.textContent = s.artistName || '';
            updatePlayerLikeBtn(s.file);
            updatePlayerDlBtn();
            audio.play(); playBtn.textContent = '⏸';
            addToRecentlyPlayed(s, s.artistName);
        }

        function toggleLikeFav(fileId, btn) {
            delete likedSongs[fileId]; window._saveLiked();
            btn.closest('.song-row').style.opacity = '0';
            btn.closest('.song-row').style.transition = 'opacity .3s';
            setTimeout(() => showLikedSongs(), 300);
        }

        function createPlaylistFromFav() {
            const input = document.getElementById('newPlaylistInput');
            const name = input.value.trim();
            if (!name) return;
            if (playlists[name] !== undefined) { showToast('Playlist already exists!'); return; }
            playlists[name] = []; window._savePlaylists(); input.value = '';
            showToast(`"${name}" created ✓`); showLikedSongs();
        }

        function deletePlaylist(name) { delete playlists[name]; window._savePlaylists(); showToast('Playlist deleted'); showLikedSongs(); }

        function togglePlaylistDropdown(index) {
            document.querySelectorAll('.add-to-playlist-dropdown').forEach((d,i) => { if (i !== index) d.style.display = 'none'; });
            const dd = document.getElementById('apd_' + index);
            if (dd) dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
        }

        document.addEventListener('click', () => document.querySelectorAll('.add-to-playlist-dropdown').forEach(d => d.style.display = 'none'));

        function addSongToPlaylist(pName, fileId, idx) {
            if (!playlists[pName]) return;
            if (playlists[pName].includes(fileId)) showToast('Already in playlist!');
            else { playlists[pName].push(fileId); window._savePlaylists(); showToast(`Added to "${pName}" ✓`); }
            const dd = document.getElementById('apd_' + idx);
            if (dd) dd.style.display = 'none';
        }

        function openPlaylist(name) {
            if (!playlists[name]) return;
            const songs = [];
            playlists[name].forEach(fileId => {
                for (let key in artists) {
                    const f = artists[key].songs.find(s => s.file === fileId);
                    if (f) { songs.push({...f, artistName: artists[key].name}); break; }
                }
            });
            setMobileBack(true);
            document.getElementById('mainArea').innerHTML = `
                <div class="main-header">
                    <div><div class="main-title">${escHtml(name)}</div><div class="main-subtitle">${songs.length} SONGS</div></div>
                    <div class="header-actions">
                        ${songs.length > 0 ? `<button class="btn btn-accent" onclick="playPlaylist()">▶ Play All</button>` : ''}
                        <button class="btn btn-outline" onclick="showLikedSongs()">← Back</button>
                    </div>
                </div>
                <div class="songs-section" style="padding-top:20px">
                    ${songs.length === 0
                        ? '<div class="empty-state"><div class="emoji">🎵</div><p>No songs yet. Go to Favorites and tap ＋ to add.</p></div>'
                        : `<div>${songs.map((s,i) => `
                            <div class="song-row" onclick="playPlaylistSong(${i})">
                                <div class="song-num">${i+1}</div>
                                <div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy">
                                    <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div>
                                </div>
                                <div class="song-actions">
                                    <button class="like-btn ${likedSongs[s.file] ? 'liked' : ''}" onclick="event.stopPropagation();toggleLike('${escAttr(s.file)}')">${likedSongs[s.file] ? '❤️' : '🤍'}</button>
                                    <button class="dl-btn ${isDownloaded(s.file) ? 'downloaded' : ''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(s.file)}')">${isDownloaded(s.file) ? '✓' : '⬇'}</button>
                                    <button class="queue-btn" onclick="event.stopPropagation();removeFromPlaylist('${escAttr(name)}','${escAttr(s.file)}')">✕</button>
                                </div>
                            </div>`).join('')}</div>`}
                </div>`;
            window.__playlistSongs = songs;
            window.__currentPlaylistName = name;
        }

        function playPlaylist() {
            if (!window.__playlistSongs?.length) return;
            currentSongs = window.__playlistSongs; currentArtistKey = null; currentIndex = 0;
            const s = currentSongs[0];
            audio.src = 'songs/' + s.file; posterEl.src = s.poster;
            playerTitle.textContent = s.title; playerArtist.textContent = s.artistName || '';
            updatePlayerLikeBtn(s.file); updatePlayerDlBtn();
            audio.play(); playBtn.textContent = '⏸';
            addToRecentlyPlayed(s, s.artistName);
        }

        function playPlaylistSong(i) {
            if (!window.__playlistSongs) return;
            currentSongs = window.__playlistSongs; currentArtistKey = null; currentIndex = i;
            const s = currentSongs[i];
            audio.src = 'songs/' + s.file; posterEl.src = s.poster;
            playerTitle.textContent = s.title; playerArtist.textContent = s.artistName || '';
            updatePlayerLikeBtn(s.file); updatePlayerDlBtn();
            audio.play(); playBtn.textContent = '⏸';
            addToRecentlyPlayed(s, s.artistName);
        }

        function removeFromPlaylist(pName, fileId) {
            playlists[pName] = playlists[pName].filter(f => f !== fileId);
            window._savePlaylists(); showToast('Removed'); openPlaylist(pName);
        }

        /* ─── SEARCH ─────────────────────────────── */
        function globalSearch() {
            const q = document.getElementById('searchBar').value.toLowerCase().trim();
            if (!q) { loadArtists(); return; }
            setMobileBack(false);
            let artistHtml = '', songHtml = '', ac = 0, sc = 0;
            for (let key in artists) {
                const a = artists[key];
                if (a.name.toLowerCase().includes(q)) {
                    artistHtml += `<div class="artist-card" onclick="openArtist('${key}')">
                        <img src="${a.image}">
                        <div class="artist-card-overlay">
                            <div class="artist-card-name">${a.name}</div>
                            <div class="artist-card-count">${a.songs.length} songs</div>
                        </div>
                        <button class="card-play-btn" onclick="event.stopPropagation();playArtist('${key}')">▶</button>
                    </div>`; ac++;
                }
                a.songs.forEach((s,i) => {
                    if (s.title.toLowerCase().includes(q)) {
                        songHtml += `<div class="song-row" style="background:var(--surface);border-radius:13px;margin-bottom:4px" onclick="openArtistAndPlay('${key}',${i})">
                            <div class="song-num">${sc+1}</div>
                            <div class="song-row-info">
                                <img src="${s.poster}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0">
                                <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(a.name)}</p></div>
                            </div>
                            <div class="song-actions" style="opacity:1">
                                <button class="like-btn ${likedSongs[s.file] ? 'liked' : ''}" onclick="event.stopPropagation();toggleLike('${escAttr(s.file)}')">${likedSongs[s.file] ? '❤️' : '🤍'}</button>
                                <button class="dl-btn ${isDownloaded(s.file) ? 'downloaded' : ''}" onclick="event.stopPropagation();handleDlBtn(this,'${escAttr(s.file)}')">${isDownloaded(s.file) ? '✓' : '⬇'}</button>
                            </div>
                        </div>`; sc++;
                    }
                });
            }
            const total = ac + sc;
            document.getElementById('mainArea').innerHTML = `
                <div class="main-header">
                    <div><div class="main-title">Search</div><div class="main-subtitle">${total} RESULTS FOR "${q.toUpperCase()}"</div></div>
                </div>
                ${ac > 0 ? `<div style="padding:20px 30px 0"><div style="font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px">Artists</div><div class="artists-grid" style="padding:0">${artistHtml}</div></div>` : ''}
                ${sc > 0 ? `<div class="songs-section" style="padding-top:20px"><div style="font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Songs</div>${songHtml}</div>` : ''}
                ${!total ? '<div class="empty-state"><div class="emoji">🔍</div><p>No results found.</p></div>' : ''}`;
        }

        function openArtistAndPlay(key, index) { currentSongs = artists[key].songs; currentArtistKey = key; openArtist(key); playSong(index); }

        /* ─── FULLSCREEN ─────────────────────────── */
        function openFullPlayer() {
            if (!currentSong) return;
            document.getElementById('fullscreenPlayer').style.display = 'flex';
        }
        function closeFullPlayer() { document.getElementById('fullscreenPlayer').style.display = 'none'; }

        /* ─── AUDIO EVENTS ─────────────────────── */
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
            document.getElementById('currentTime').textContent = fmt(audio.currentTime);
            document.getElementById('duration').textContent = fmt(audio.duration);
        });

        audio.addEventListener('ended', () => { if (!isRepeat) next(); });

        audio.addEventListener('play', () => {
            playBtn.textContent = '⏸';
            const fp = document.getElementById('fsPlay');
            if (fp) fp.textContent = '⏸';
        });

        audio.addEventListener('pause', () => {
            playBtn.textContent = '▶';
            const fp = document.getElementById('fsPlay');
            if (fp) fp.textContent = '▶';
        });

        volumeSlider.addEventListener('input', () => { audio.volume = +volumeSlider.value; isMuted = audio.volume === 0; });

        /* ─── MEDIA SESSION ─────────────────────── */
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            navigator.mediaSession.setActionHandler('nexttrack', () => next());
            navigator.mediaSession.setActionHandler('previoustrack', () => previous());
        }

        /* ─── HELPERS ─────────────────────────── */
        function fmt(s) { return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0'); }
        function setMobileBack(show) { const b = document.getElementById('mobileBackBtn'); if (b) b.classList.toggle('hidden', !show); }
        function setNavActive(id) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); const e = document.getElementById(id); if (e) e.classList.add('active'); }
        function setSidebarActive(key) { document.querySelectorAll('.artist-item').forEach(e => e.classList.remove('active')); const e = document.getElementById('sb_' + key); if (e) { e.classList.add('active'); e.scrollIntoView({ block: 'nearest' }); } }
        function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escAttr(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.opacity = '1';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.style.opacity = '0', 1900);
        }

        /* ─── INIT ─────────────────────────────── */
        buildSidebar();
        loadArtists();
        renderSidebarRecent();
        document.querySelector('.fav-mobile-btn') && (document.querySelector('.fav-mobile-btn').style.display = '');
    </script>
</body>

</html>
