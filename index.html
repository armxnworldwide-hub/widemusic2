<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
         :root {
            --bg: #080810;
            --surface: #0f0f1a;
            --surface2: #16162a;
            --surface3: #1e1e35;
            --surface4: #252542;
            --accent: #c8f542;
            --accent2: #a8d930;
            --accent3: rgba(200, 245, 66, 0.12);
            --text: #f0f0f8;
            --muted: #4a4a72;
            --muted2: #7a7aa8;
            --border: rgba(200, 245, 66, 0.08);
            --border2: rgba(255, 255, 255, 0.06);
            --player-h: 100px;
            --sidebar-w: 260px;
            --glow: 0 0 40px rgba(200, 245, 66, 0.15);
            --shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
        }
        
        html,
        body {
            height: 100%;
            overflow: hidden
        }
        
        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-rows: 1fr var(--player-h);
            height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: .4;
        }
        
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: splashOut 0.5s ease 2.2s forwards;
        }
        
        .splash-inner {
            text-align: center;
            animation: splashIn 1s cubic-bezier(.16, 1, .3, 1) both
        }
        
        .splash-logo-wrap {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 60px rgba(200, 245, 66, 0.4);
            animation: pulse 2s ease infinite;
        }
        
        .splash-logo-wrap img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover
        }
        
        .splash-name {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: var(--text)
        }
        
        .splash-name span {
            color: var(--accent)
        }
        
        .splash-tagline {
            font-family: 'Space Mono', monospace;
            font-size: .65rem;
            color: var(--muted2);
            letter-spacing: 3px;
            margin-top: 8px
        }
        
        @keyframes splashIn {
            from {
                opacity: 0;
                transform: scale(.9) translateY(20px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }
        
        @keyframes splashOut {
            to {
                opacity: 0;
                visibility: hidden
            }
        }
        
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 60px rgba(200, 245, 66, .4)
            }
            50% {
                box-shadow: 0 0 90px rgba(200, 245, 66, .7)
            }
        }
        
        .sidebar {
            grid-row: 1;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--accent), transparent);
            opacity: .3;
        }
        
        .logo-wrap {
            padding: 24px 20px 18px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 4px;
        }
        
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .logo-icon img {
            width: 38px;
            height: 38px;
            object-fit: cover;
            border-radius: 10px
        }
        
        .logo-text {
            color: var(--text)
        }
        
        .logo-text b {
            color: var(--accent)
        }
        
        .sync-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            color: var(--muted2);
            padding: 3px 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        
        .sync-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted)
        }
        
        .sync-dot.synced {
            background: var(--accent)
        }
        
        .sync-dot.syncing {
            background: #f5c842;
            animation: blink .7s infinite
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: .3
            }
        }
        
        .search-wrap {
            padding: 14px 16px 10px;
            flex-shrink: 0
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-icon {
            position: absolute;
            left: 12px;
            color: var(--muted);
            font-size: .9rem;
            pointer-events: none;
        }
        
        .search-box input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 9px 12px 9px 36px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .82rem;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        
        .search-box input:focus {
            border-color: rgba(200, 245, 66, .4);
            background: var(--surface3)
        }
        
        .search-box input::placeholder {
            color: var(--muted)
        }
        
        .sidebar-nav {
            padding: 4px 12px 6px;
            flex-shrink: 0
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 9px 12px;
            border-radius: 10px;
            background: none;
            border: none;
            color: var(--muted2);
            font-family: 'Syne', sans-serif;
            font-size: .84rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .18s;
            text-align: left;
            margin-bottom: 2px;
        }
        
        .nav-btn:hover {
            background: var(--surface2);
            color: var(--text)
        }
        
        .nav-btn.active {
            background: var(--accent3);
            color: var(--accent);
            border: 1px solid rgba(200, 245, 66, .15)
        }
        
        .nav-icon {
            font-size: .9rem;
            width: 18px;
            flex-shrink: 0
        }
        
        .sidebar-section-label {
            padding: 12px 24px 6px;
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
        }
        
        .artists-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        
        .artists-list::-webkit-scrollbar {
            width: 3px
        }
        
        .artists-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 3px
        }
        
        .artist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background .15s;
        }
        
        .artist-item:hover {
            background: var(--surface2)
        }
        
        .artist-item.active {
            background: var(--surface3)
        }
        
        .artist-item img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0
        }
        
        .artist-item-name {
            font-size: .78rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .recent-section {
            padding: 0 10px 8px;
            flex-shrink: 0
        }
        
        .recent-label {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 12px 5px;
        }
        
        .recent-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background .15s;
        }
        
        .recent-item:hover {
            background: var(--surface2)
        }
        
        .recent-item img {
            width: 26px;
            height: 26px;
            border-radius: 5px;
            object-fit: cover;
            flex-shrink: 0
        }
        
        .recent-item-title {
            font-size: .74rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .recent-item-artist {
            font-size: .65rem;
            color: var(--muted2)
        }
        
        .user-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .user-bar img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--accent);
            flex-shrink: 0
        }
        
        .user-bar-info {
            flex: 1;
            overflow: hidden
        }
        
        .user-bar-name {
            font-size: .78rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .user-bar-email {
            font-size: .66rem;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .signout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: .68rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .signout-btn:hover {
            color: #ff5555;
            border-color: #ff5555
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: calc(100% - 24px);
            margin: 12px;
            padding: 11px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        
        .google-btn:hover {
            border-color: rgba(200, 245, 66, .4);
            background: var(--surface3);
            transform: translateY(-1px)
        }
        
        .main {
            grid-column: 2;
            grid-row: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
            background: var(--bg);
            position: relative;
        }
        
        .main::-webkit-scrollbar {
            width: 4px
        }
        
        .main::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 4px
        }
        
        .main-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(8, 8, 16, .9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .main-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px
        }
        
        .main-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: .65rem;
            color: var(--muted2);
            margin-top: 3px;
            letter-spacing: 1px
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center
        }
        
        .btn {
            padding: 8px 18px;
            border-radius: 50px;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted2);
        }
        
        .btn-outline:hover {
            border-color: rgba(200, 245, 66, .4);
            color: var(--accent)
        }
        
        .btn-accent {
            background: var(--accent);
            color: #000
        }
        
        .btn-accent:hover {
            background: var(--accent2);
            transform: scale(1.04);
            box-shadow: 0 6px 24px rgba(200, 245, 66, .3)
        }
        
        .artist-hero {
            position: relative;
            height: 220px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 24px 28px;
        }
        
        .artist-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            filter: blur(2px) brightness(.35);
            transform: scale(1.05);
        }
        
        .artist-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, rgba(8, 8, 16, .6) 60%, transparent 100%);
        }
        
        .artist-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            gap: 20px;
            width: 100%
        }
        
        .artist-hero-img {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(200, 245, 66, .3);
            box-shadow: 0 0 40px rgba(0, 0, 0, .8);
            flex-shrink: 0;
        }
        
        .artist-hero-info {
            flex: 1
        }
        
        .artist-hero-tag {
            font-family: 'Space Mono', monospace;
            font-size: .58rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }
        
        .artist-hero-name {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1
        }
        
        .artist-hero-count {
            font-size: .78rem;
            color: var(--muted2);
            margin-top: 6px
        }
        
        .artist-hero-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 10px
        }
        
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 16px;
            padding: 24px 28px;
        }
        
        .artist-card {
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: transform .25s, box-shadow .25s, border-color .25s;
            position: relative;
            aspect-ratio: 1;
        }
        
        .artist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .6), 0 0 30px rgba(200, 245, 66, .08);
            border-color: rgba(200, 245, 66, .25);
        }
        
        .artist-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .4s
        }
        
        .artist-card:hover img {
            transform: scale(1.06)
        }
        
        .artist-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(8, 8, 16, .92) 40%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 14px;
        }
        
        .artist-card-name {
            font-size: .8rem;
            font-weight: 700;
            letter-spacing: .5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }
        
        .artist-card-count {
            font-family: 'Space Mono', monospace;
            font-size: .62rem;
            color: var(--muted2);
            margin-top: 3px
        }
        
        .card-play-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            color: #000;
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: scale(.7) translateY(6px);
            transition: all .2s;
            box-shadow: 0 4px 20px rgba(200, 245, 66, .4);
        }
        
        .artist-card:hover .card-play-btn {
            opacity: 1;
            transform: scale(1) translateY(0)
        }
        
        .songs-section {
            padding: 0 28px 28px
        }
        
        .songs-table-header {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            padding: 0 12px 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }
        
        .th {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }
        
        .song-row {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            padding: 7px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .15s;
            gap: 4px;
        }
        
        .song-row:hover {
            background: var(--surface)
        }
        
        .song-row.playing {
            background: rgba(200, 245, 66, .05);
            border: 1px solid rgba(200, 245, 66, .1)
        }
        
        .song-num {
            font-family: 'Space Mono', monospace;
            font-size: .78rem;
            color: var(--muted);
            text-align: center;
        }
        
        .song-row.playing .song-num {
            color: var(--accent)
        }
        
        .song-row-info {
            display: flex;
            align-items: center;
            gap: 12px
        }
        
        .song-row-info img {
            width: 44px;
            height: 44px;
            border-radius: 9px;
            object-fit: cover;
            flex-shrink: 0;
            transition: transform .2s;
        }
        
        .song-row:hover .song-row-info img {
            transform: scale(1.05)
        }
        
        .song-row-text h4 {
            font-size: .86rem;
            font-weight: 700
        }
        
        .song-row.playing .song-row-text h4 {
            color: var(--accent)
        }
        
        .song-row-text p {
            font-size: .72rem;
            color: var(--muted2);
            margin-top: 2px
        }
        
        .song-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity .2s;
        }
        
        .song-row:hover .song-actions {
            opacity: 1
        }
        
        .like-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 7px;
            transition: transform .2s;
            line-height: 1;
        }
        
        .like-btn:hover {
            transform: scale(1.25)
        }
        
        .like-btn.liked {
            opacity: 1!important
        }
        
        .queue-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted2);
            width: 28px;
            height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .85rem;
            transition: all .2s;
        }
        
        .queue-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }
        
        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 15px;
            width: 16px;
            margin: 0 auto
        }
        
        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            animation: eq .7s ease-in-out infinite alternate
        }
        
        .eq-bar:nth-child(1) {
            animation-delay: 0s
        }
        
        .eq-bar:nth-child(2) {
            animation-delay: .15s
        }
        
        .eq-bar:nth-child(3) {
            animation-delay: .3s
        }
        
        @keyframes eq {
            from {
                height: 3px
            }
            to {
                height: 13px
            }
        }
        
        .player {
            grid-column: 1/-1;
            grid-row: 2;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr 280px;
            align-items: center;
            padding: 0 20px 0 0;
            position: relative;
            z-index: 20;
        }
        
        .player::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;

            currentIndex = 0,
            currentSong = null,
            currentArtistKey = null;

            likedSongs = {},
            playlists = {},

        function updateMediaSession(song) {

            if ("mediaSession" in navigator) {

                navigator.mediaSession.metadata = new MediaMetadata({

                    title: song.title,
                    artist: currentArtist.name,

                    artwork: [{
                        src: song.poster,
                        sizes: "96x96",
                        type: "image/jpeg"
                    }, {
                        src: song.poster,
                        sizes: "192x192",
                        type: "image/jpeg"
                    }, {
                        src: song.poster,
                        sizes: "512x512",
                        type: "image/jpeg"
                    }]

                });

            }

        }

        function loadState() {
            try {
                likedSongs = JSON.parse(localStorage.getItem('eq_liked') || '{}')
            } catch (e) {}
            try {
                playlists = JSON.parse(localStorage.getItem('eq_playlists') || '{}')
            } catch (e) {}
            try {
                recentlyPlayed = JSON.parse(localStorage.getItem('eq_recent') || '[]')
            } catch (e) {}
        }
        window._saveLiked = () => localStorage.setItem('eq_liked', JSON.stringify(likedSongs));
        window._savePlaylists = () => localStorage.setItem('eq_playlists', JSON.stringify(playlists));
        window._saveRecent = () => localStorage.setItem('eq_recent', JSON.stringify(recentlyPlayed));
        loadState();

        function addToRecentlyPlayed(song, artistName) {
            recentlyPlayed = recentlyPlayed.filter(r => r.file !== song.file);
            recentlyPlayed.unshift({
                title: song.title,
                file: song.file,
                poster: song.poster,
                artistName
            });
            if (recentlyPlayed.length > 20) recentlyPlayed = recentlyPlayed.slice(0, 20);
            window._saveRecent();
            renderSidebarRecent();
        }

        function renderSidebarRecent() {
            const wrap = document.getElementById('sidebarRecent');
            const list = document.getElementById('sidebarRecentList');
            if (!recentlyPlayed.length) {
                wrap.style.display = 'none';
                return;
            }
            wrap.style.display = 'block';
            list.innerHTML = recentlyPlayed.slice(0, 5).map(r => `
    <div class="recent-item" onclick="playRecentSong('${escAttr(r.file)}')">
      <img src="${r.poster}" onerror="this.style.background='#16162a'">
      <div><div class="recent-item-title">${escHtml(r.title)}</div><div class="recent-item-artist">${escHtml(r.artistName)}</div></div>
    </div>`).join('');
        }

        function playRecentSong(fileId) {
            for (let key in artists) {
                const idx = artists[key].songs.findIndex(s => s.file === fileId);
                if (idx !== -1) {
                    currentSongs = artists[key].songs;
                    currentArtistKey = key;
                    openArtist(key);
                    playSong(idx);
                    return;
                }
            }
        }

        function showRecentlyPlayed() {
            setNavActive('navRecent');
            setMobileBack(true);
            document.getElementById('mainArea').innerHTML = `
    <div class="main-header">
      <div><div class="main-title">Recently Played</div><div class="main-subtitle">${recentlyPlayed.length} TRACKS</div></div>
    </div>
    <div class="songs-section" style="padding-top:20px">
    ${recentlyPlayed.length===0
      ?'<div class="empty-state"><div class="emoji">🕐</div><p>No recently played songs yet.</p></div>'
      :`<div>${recentlyPlayed.map((s,i)=>`
        <div class="song-row" onclick="playRecentSong('${escAttr(s.file)}')">
          <div class="song-num">${i+1}</div>
          <div class="song-row-info">
            <img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy">
            <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div>
          </div>
          <div class="song-actions">
            <button class="like-btn ${likedSongs[s.file]?'liked':''}" onclick="event.stopPropagation();toggleLike('${escAttr(s.file)}')">${likedSongs[s.file]?'❤️':'🤍'}</button>
          </div>
        </div>`).join('')}</div>`}
    </div>`;
}

      <img src="${a.image}" onerror="this.style.background='#16162a'">

            <div class="artist-card-count">${a.songs.length} tracks</div>
          </div>
          <button class="card-play-btn" onclick="event.stopPropagation();playArtist('${key}')">▶</button>
        </div>`;}).join('')}
    </div>`;
}

function openArtist(key){
  currentArtistKey=key;
  const a=artists[key];
  currentSongs=a.songs;
  setSidebarActive(key);setMobileBack(true);
  document.getElementById('mainArea').innerHTML=`
    <div class="artist-hero">
      <div class="artist-hero-bg" style="background-image:url('${a.image}')"></div>
      <div class="artist-hero-overlay"></div>
      <div class="artist-hero-content">
        <img class="artist-hero-img" src="${a.image}" onerror="this.style.background='#16162a'">
        <div class="artist-hero-info">
          <div class="artist-hero-tag">Artist</div>
          <div class="artist-hero-name">${a.name}</div>
          <div class="artist-hero-count">${a.songs.length} songs</div>
          <div class="artist-hero-actions">
            <button class="btn btn-accent" onclick="playArtist('${key}')">▶ Play All</button>
            <button class="btn btn-outline" onclick="shuffleArtist('${key}')">⇄ Shuffle</button>
          </div>
        </div>
      </div>
    </div>
    <div class="songs-section" style="padding-top:20px">
      <div class="songs-table-header">
        <span class="th">#</span>
        <span class="th">Title</span>
        <span class="th"></span>
      </div>
      <div id="songsList">${a.songs.map((s,i)=>songRowHTML(s,i,a.name)).join('')}</div>
    </div>`;
}

function songRowHTML(song,i,artistName){
  const playing=currentSong&&currentSong.file===song.file&&!audio.paused;
  const liked=likedSongs[song.file];
  return `<div class="song-row${playing?' playing':''}" id="row_${i}" onclick="playSong(${i})">
    <div class="song-num">${playing?'<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>':i+1}</div>
    <div class="song-row-info">
      <img src="${song.poster}" onerror="this.style.background='#16162a'" loading="lazy">
      <div class="song-row-text"><h4>${escHtml(song.title)}</h4><p>${escHtml(artistName)}</p></div>
    </div>
    <div class="song-actions">
      <button class="like-btn ${liked?'liked':''}" onclick="event.stopPropagation();toggleLike('${escAttr(song.file)}',${i})">${liked?'❤️':'🤍'}</button>
      <button class="queue-btn" onclick="event.stopPropagation();addToQueue(${i})" title="Add to queue">＋</button>
    </div>
  </div>`;
}

function refreshSongRows(){
  if(!currentArtistKey) return;
  const list=document.getElementById('songsList');
  if(!list) return;
  list.innerHTML=artists[currentArtistKey].songs.map((s,i)=>songRowHTML(s,i,artists[currentArtistKey].name)).join('');
}

function playSong(index){
  if(!currentSongs[index]) return;
  currentIndex=index;
  const song=currentSongs[index];
  currentSong=song;
  audio.src='songs/'+song.file;
  posterEl.src=song.poster;
  playerTitle.textContent=song.title;
  const artistKey=currentArtistKey||Object.keys(artists).find(k=>artists[k].songs===currentSongs);
  const artistName=artistKey?artists[artistKey].name:(song.artistName||'');
  playerArtist.textContent=artistName;
  updatePlayerLikeBtn(song.file);
  audio.play();
  playBtn.textContent='⏸';
  
  document.getElementById('fsPoster').src=song.poster;
  document.getElementById('fsTitle').textContent=song.title;
  document.getElementById('fsArtist').textContent=artistName;
  document.getElementById('fsPlay').textContent='⏸';
  refreshSongRows();
  addToRecentlyPlayed(song,artistName);

  if('mediaSession' in navigator){
    navigator.mediaSession.metadata=new MediaMetadata({title:song.title,artist:artistName,artwork:[{src:song.poster}]});
  }
}

function togglePlay(){
  if(audio.paused){audio.play();playBtn.textContent='⏸';document.getElementById('fsPlay').textContent='⏸';}
  else{audio.pause();playBtn.textContent='▶';document.getElementById('fsPlay').textContent='▶';}
}

function next(){
  if(queue.length>0){
    const s=queue.shift();
    audio.src='songs/'+s.file;posterEl.src=s.poster;playerTitle.textContent=s.title;
    audio.play();playBtn.textContent='⏸';return;
  }
  if(!currentSongs.length) return;
  currentIndex=isShuffle?Math.floor(Math.random()*currentSongs.length):(currentIndex+1)%currentSongs.length;
  playSong(currentIndex);
}

function previous(){
  if(!currentSongs.length) return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  currentIndex=(currentIndex-1+currentSongs.length)%currentSongs.length;
  playSong(currentIndex);
}

function playArtist(key){currentSongs=artists[key].songs;currentArtistKey=key;currentIndex=0;playSong(0);}
function shuffleArtist(key){
  currentSongs=artists[key].songs;currentArtistKey=key;
  currentIndex=Math.floor(Math.random()*currentSongs.length);
  playSong(currentIndex);
}

function seek(e){
  if(!audio.duration) return;
  const r=document.getElementById('progressTrack').getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
}

function addToQueue(index){queue.push(currentSongs[index]);showToast('Added to queue ✓');}
function toggleShuffle(){isShuffle=!isShuffle;document.getElementById('shuffleBtn').classList.toggle('on',isShuffle);}
function toggleRepeat(){isRepeat=!isRepeat;audio.loop=isRepeat;document.getElementById('repeatBtn').classList.toggle('on',isRepeat);}

function toggleMute(){
  if(isMuted){audio.volume=prevVol;volumeSlider.value=prevVol;isMuted=false;}
  else{prevVol=audio.volume||1;audio.volume=0;volumeSlider.value=0;isMuted=true;}
}

function toggleLike(fileId,rowIndex){
  if(likedSongs[fileId]) delete likedSongs[fileId]; else likedSongs[fileId]=true;
  window._saveLiked();
  if(rowIndex!==undefined) refreshSongRows();
  updatePlayerLikeBtn(fileId);
}
function togglePlayerLike(){if(!currentSong) return;toggleLike(currentSong.file);}
function updatePlayerLikeBtn(f){document.getElementById('playerLikeBtn').textContent=likedSongs[f]?'❤️':'🤍';}


function showLikedSongs(){
  setNavActive('navFav');setMobileBack(true);currentSongs=[];
  const liked=[];
  for(let key in artists) artists[key].songs.forEach(s=>{if(likedSongs[s.file]) liked.push({...s,artistName:artists[key].name,artistKey:key});});
  const pNames=Object.keys(playlists);
  document.getElementById('mainArea').innerHTML=`
    <div class="main-header">
      <div><div class="main-title">Favorites</div><div class="main-subtitle">${liked.length} LIKED</div></div>
    </div>
    <div class="songs-section" style="padding-top:20px">
      <div class="playlist-create-wrap">
        <div class="playlist-create-title">📁 Create New Playlist</div>
        <div class="playlist-create-row">
          <input type="text" id="newPlaylistInput" placeholder="Playlist name…" maxlength="40" onkeydown="if(event.key==='Enter')createPlaylistFromFav()">
          <button onclick="createPlaylistFromFav()">Create</button>
        </div>
      </div>
      ${pNames.length>0?`<div class="playlists-list-wrap">
        <div class="playlists-list-title">🎵 Your Playlists</div>
        ${pNames.map(n=>`<div class="playlist-item" onclick="openPlaylist('${escAttr(n)}')">
          <div class="playlist-item-left"><div class="playlist-item-icon">🎵</div>
            <div><div class="playlist-item-name">${escHtml(n)}</div><div class="playlist-item-count">${playlists[n].length} song${playlists[n].length!==1?'s':''}</div></div>
          </div>
          <button class="playlist-item-delete" onclick="event.stopPropagation();deletePlaylist('${escAttr(n)}')">✕</button>
        </div>`).join('')}
      </div>`:''}
      <div class="fav-section-label">❤️ Liked Songs</div>
      ${liked.length===0
        ?'<div class="empty-state"><div class="emoji">🎵</div><p>No favorites yet. Like songs to see them here.</p></div>'
        :`<div>${liked.map((s,i)=>`
          <div class="song-row" onclick="playLikedSong(${i})">
            <div class="song-num">${i+1}</div>
            <div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy">
              <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div>
            </div>
            <div class="song-actions">
              <button class="like-btn liked" onclick="event.stopPropagation();toggleLikeFav('${escAttr(s.file)}',this)">❤️</button>
              <div class="add-to-playlist-wrap" id="apw_${i}">
                <button class="queue-btn" onclick="event.stopPropagation();togglePlaylistDropdown(${i})">＋</button>
                <div class="add-to-playlist-dropdown" id="apd_${i}" style="display:none">
                  ${Object.keys(playlists).length===0
                    ?'<span class="no-playlists">No playlists yet</span>'
                    :Object.keys(playlists).map(p=>`<button onclick="event.stopPropagation();addSongToPlaylist('${escAttr(p)}','${escAttr(s.file)}',${i})">${escHtml(p)}</button>`).join('')}
                </div>
              </div>
            </div>
          </div>`).join('')}</div>`}
    </div>`;
  window.__likedList=liked;
}

function playLikedSong(i){
  const s=window.__likedList[i];
  currentSongs=window.__likedList;currentArtistKey=null;currentIndex=i;
  audio.src='songs/'+s.file;posterEl.src=s.poster;
  playerTitle.textContent=s.title;playerArtist.textContent=s.artistName||'';
  updatePlayerLikeBtn(s.file);audio.play();playBtn.textContent='⏸';
  addToRecentlyPlayed(s,s.artistName);
}

function toggleLikeFav(fileId,btn){
  delete likedSongs[fileId];window._saveLiked();
  btn.closest('.song-row').style.opacity='0';btn.closest('.song-row').style.transition='opacity .3s';
  setTimeout(()=>showLikedSongs(),300);
}

function createPlaylistFromFav(){
  const input=document.getElementById('newPlaylistInput');
  const name=input.value.trim();if(!name)return;
  if(playlists[name]!==undefined){showToast('Playlist already exists!');return;}
  playlists[name]=[];window._savePlaylists();input.value='';
  showToast(`"${name}" created ✓`);showLikedSongs();
}

function deletePlaylist(name){delete playlists[name];window._savePlaylists();showToast('Playlist deleted');showLikedSongs();}

function togglePlaylistDropdown(index){
  document.querySelectorAll('.add-to-playlist-dropdown').forEach((d,i)=>{if(i!==index)d.style.display='none';});
  const dd=document.getElementById('apd_'+index);
  if(dd) dd.style.display=dd.style.display==='none'?'block':'none';
}

document.addEventListener('click',()=>document.querySelectorAll('.add-to-playlist-dropdown').forEach(d=>d.style.display='none'));

function addSongToPlaylist(pName,fileId,idx){
  if(!playlists[pName]) return;
  if(playlists[pName].includes(fileId)) showToast('Already in playlist!');
  else{playlists[pName].push(fileId);window._savePlaylists();showToast(`Added to "${pName}" ✓`);}
  const dd=document.getElementById('apd_'+idx);if(dd) dd.style.display='none';
}

function openPlaylist(name){
  if(!playlists[name]) return;
  const songs=[];
  playlists[name].forEach(fileId=>{
    for(let key in artists){const f=artists[key].songs.find(s=>s.file===fileId);if(f){songs.push({...f,artistName:artists[key].name});break;}}
  });
  setMobileBack(true);
  document.getElementById('mainArea').innerHTML=`
    <div class="main-header">
      <div><div class="main-title">${escHtml(name)}</div><div class="main-subtitle">${songs.length} SONGS</div></div>
      <div class="header-actions">
        ${songs.length>0?`<button class="btn btn-accent" onclick="playPlaylist()">▶ Play All</button>`:''}
        <button class="btn btn-outline" onclick="showLikedSongs()">← Back</button>
      </div>
    </div>
    <div class="songs-section" style="padding-top:20px">
      ${songs.length===0
        ?'<div class="empty-state"><div class="emoji">🎵</div><p>No songs yet. Go to Favorites and tap ＋ to add.</p></div>'
        :`<div>${songs.map((s,i)=>`
          <div class="song-row" onclick="playPlaylistSong(${i})">
            <div class="song-num">${i+1}</div>
            <div class="song-row-info"><img src="${s.poster}" onerror="this.style.background='#16162a'" loading="lazy">
              <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(s.artistName)}</p></div>
            </div>
            <div class="song-actions">
              <button class="like-btn ${likedSongs[s.file]?'liked':''}" onclick="event.stopPropagation();toggleLike('${escAttr(s.file)}')">${likedSongs[s.file]?'❤️':'🤍'}</button>
              <button class="queue-btn" onclick="event.stopPropagation();removeFromPlaylist('${escAttr(name)}','${escAttr(s.file)}')">✕</button>
            </div>
          </div>`).join('')}</div>`}
    </div>`;
  window.__playlistSongs=songs;window.__currentPlaylistName=name;
}

function playPlaylist(){
  if(!window.__playlistSongs?.length) return;
  currentSongs=window.__playlistSongs;currentArtistKey=null;currentIndex=0;
  const s=currentSongs[0];
  audio.src='songs/'+s.file;posterEl.src=s.poster;
  playerTitle.textContent=s.title;playerArtist.textContent=s.artistName||'';
  updatePlayerLikeBtn(s.file);audio.play();playBtn.textContent='⏸';
  addToRecentlyPlayed(s,s.artistName);
}

function playPlaylistSong(i){
  if(!window.__playlistSongs) return;
  currentSongs=window.__playlistSongs;currentArtistKey=null;currentIndex=i;
  const s=currentSongs[i];
  audio.src='songs/'+s.file;posterEl.src=s.poster;
  playerTitle.textContent=s.title;playerArtist.textContent=s.artistName||'';
  updatePlayerLikeBtn(s.file);audio.play();playBtn.textContent='⏸';
  addToRecentlyPlayed(s,s.artistName);
}

function removeFromPlaylist(pName,fileId){
  playlists[pName]=playlists[pName].filter(f=>f!==fileId);
  window._savePlaylists();showToast('Removed');openPlaylist(pName);
}

function globalSearch(){
  const q=document.getElementById('searchBar').value.toLowerCase().trim();
  if(!q){loadArtists();return;}setMobileBack(false);
  let artistHtml='',songHtml='',ac=0,sc=0;
  for(let key in artists){
    const a=artists[key];
    if(a.name.toLowerCase().includes(q)){
      artistHtml+=`<div class="artist-card" onclick="openArtist('${key}')">
        <img src="${a.image}"><div class="artist-card-overlay">
        <div class="artist-card-name">${a.name}</div><div class="artist-card-count">${a.songs.length} songs</div></div>
        <button class="card-play-btn" onclick="event.stopPropagation();playArtist('${key}')">▶</button></div>`;ac++;
    }
    a.songs.forEach((s,i)=>{
      if(s.title.toLowerCase().includes(q)){
        songHtml+=`<div class="song-row" style="background:var(--surface);border-radius:12px;margin-bottom:4px" onclick="openArtistAndPlay('${key}',${i})">
          <div class="song-num">${sc+1}</div>
          <div class="song-row-info"><img src="${s.poster}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0">
            <div class="song-row-text"><h4>${escHtml(s.title)}</h4><p>${escHtml(a.name)}</p></div>
          </div>
          <div class="song-actions" style="opacity:1">
            <button class="like-btn ${likedSongs[s.file]?'liked':''}" onclick="event.stopPropagation();toggleLike('${escAttr(s.file)}')">${likedSongs[s.file]?'❤️':'🤍'}</button>
          </div>
        </div>`;sc++;
      }
    });
  }
  const total=ac+sc;
  document.getElementById('mainArea').innerHTML=`
    <div class="main-header">
      <div><div class="main-title">Search</div><div class="main-subtitle">${total} RESULTS FOR "${q.toUpperCase()}"</div></div>
    </div>
    ${ac>0?`<div style="padding:20px 28px 0"><div style="font-family:'Space Mono',monospace;font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Artists</div><div class="artists-grid" style="padding:0">${artistHtml}</div></div>`:''}
    ${sc>0?`<div class="songs-section" style="padding-top:20px"><div style="font-family:'Space Mono',monospace;font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Songs</div>${songHtml}</div>`:''}
    ${!total?`<div class="empty-state"><div class="emoji">🔍</div><p>No results found.</p></div>`:''}`;
}

function openArtistAndPlay(key,index){currentSongs=artists[key].songs;currentArtistKey=key;openArtist(key);playSong(index);}

function openFullPlayer(){
  if(!currentSong) return;
  document.getElementById('fullscreenPlayer').style.display='flex';
}
function closeFullPlayer(){document.getElementById('fullscreenPlayer').style.display='none';}

audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  progressBar.style.width=(audio.currentTime/audio.duration*100)+'%';
  document.getElementById('currentTime').textContent=fmt(audio.currentTime);
  document.getElementById('duration').textContent=fmt(audio.duration);
});
audio.addEventListener('ended',()=>{if(!isRepeat)next();});
audio.addEventListener('play',()=>{playBtn.textContent='⏸';if(document.getElementById('fsPlay'))document.getElementById('fsPlay').textContent='⏸';});
audio.addEventListener('pause',()=>{playBtn.textContent='▶';if(document.getElementById('fsPlay'))document.getElementById('fsPlay').textContent='▶';});
volumeSlider.addEventListener('input',()=>{audio.volume=+volumeSlider.value;isMuted=audio.volume===0;});


if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',()=>{audio.play();});
  navigator.mediaSession.setActionHandler('pause',()=>{audio.pause();});
  navigator.mediaSession.setActionHandler('nexttrack',()=>next());
  navigator.mediaSession.setActionHandler('previoustrack',()=>previous());
}


function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function setMobileBack(show){const b=document.getElementById('mobileBackBtn');if(b)b.classList.toggle('hidden',!show);}
function setNavActive(id){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const e=document.getElementById(id);if(e)e.classList.add('active');}
function setSidebarActive(key){document.querySelectorAll('.artist-item').forEach(e=>e.classList.remove('active'));const e=document.getElementById('sb_'+key);if(e){e.classList.add('active');e.scrollIntoView({block:'nearest'});}}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.style.opacity='0',1800);
}


buildSidebar();
loadArtists();
renderSidebarRecent();


document.querySelector('.fav-mobile-btn') && (document.querySelector('.fav-mobile-btn').style.display='');
    </script>
</body>

</html>
